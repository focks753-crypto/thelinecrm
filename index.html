function dlSalesCSV(rows,total){
  const isSes=salMode==='sessions';
  const trName=salTrainer?(trainers.find(t=>t.id===salTrainer)||{}).name||'':'전체';
  if(typeof XLSX==='undefined'){alert('잠시 후 다시 시도해주세요.');return;}
  const wb=XLSX.utils.book_new();
  const titleStr='TheLine CRM 매출 내역 ('+(isSes?'수업 진행':'수업권 판매')+')';
  const periodStr='기간: '+salStartDate+' ~ '+salEndDate+'  /  트레이너: '+trName;
  const wsData=[];
  wsData.push([null,null,null,null,null,null,null]);
  wsData.push([null,titleStr,null,null,null,null,null]);
  wsData.push([null,periodStr,null,null,null,null,null]);
  wsData.push([null,null,null,null,null,null,null]);
  wsData.push(isSes?[null,'계약일','회원명','세션','계약료','세션단가','수업료']:[null,'등록일','트레이너','회원명','수업시간','수업권','결제금액']);
  rows.forEach(r=>{
    if(isSes){
      const mb=members.find(m=>m.name===r.memberName&&m.trainerId===r.trainerId);
      const plan=mb?(mb.plans||[]).find(p=>(p.sessions+'회권')===r.planLabel):null;
      wsData.push([null,r.date,r.memberName,plan?plan.sessions:0,plan?plan.totalPrice:0,r.revenue,r.revenue]);
    } else {wsData.push([null,r.date,r.trainerName,r.memberName,r.phone||'',r.inflow||'',r.payment||'',r.planLabel,r.revenue||0]);}
  });
  wsData.push([null,null,null,null,null,null,null]);
  wsData.push([null,null,null,null,null,'합계',total]);
  wsData.push([null,null,null,null,null,null,null]);
  wsData.push([null,'트레이너별 요약',null,null,null,null,null]);
  wsData.push([null,'트레이너','수업 수','합계',null,null,null]);
  const byTr={};rows.forEach(r=>{if(!byTr[r.trainerName])byTr[r.trainerName]={cnt:0,sum:0};byTr[r.trainerName].cnt++;byTr[r.trainerName].sum+=r.revenue;});
  Object.entries(byTr).forEach(([nm,d])=>wsData.push([null,nm,d.cnt,d.sum,null,null,null]));
  const ws=XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols']=[{wch:2},{wch:14},{wch:12},{wch:10},{wch:14},{wch:12},{wch:12}];
  ws['!merges']=[{s:{r:1,c:1},e:{r:1,c:6}},{s:{r:2,c:1},e:{r:2,c:6}}];
  ws['!autofilter']={ref:'B5:G5'};
  XLSX.utils.book_append_sheet(wb,ws,isSes?'수업진행':'수업권판매');
  XLSX.writeFile(wb,(isSes?'수업진행_':'수업권판매_')+salStartDate+'_'+salEndDate+'.xlsx');
}

function pcMbStatus(mb){
  const plans=mb.plans||[];if(!plans.length)return'none';
  // membership(헬스이용권): 날짜 기반
  const mPlan=plans.find(p=>p.productType==='membership'&&p.endDate);
  if(mPlan){const rem=Math.ceil((new Date(mPlan.endDate)-new Date())/(1000*60*60*24));if(rem<=0)return'expired';if(rem<=25)return'expiring';return'active';}
  // PT 수업권: 잔여 횟수 기반
  let total=0;plans.forEach(p=>{if(p.productType!=='membership')total+=getPlanRemain(p);});
  if(total>0)return'active';return'expired';
}

  const hist=c.history||[];
  pcModal((box,close)=>{
    box.appendChild(Object.assign(document.createElement('div'),{className:'pcm-ttl',textContent:'상담 이력'}));
    box.appendChild(Object.assign(document.createElement('div'),{className:'pcm-sub',textContent:c.name+' · '+(c.phone||'')+(c.inflow?' · '+c.inflow:'')}));
    if(!hist.length){box.appendChild(Object.assign(document.createElement('div'),{textContent:'이력이 없습니다.'})).style.cssText='color:#3a3f58;font-size:13px;padding:20px 0;';}
    hist.slice().reverse().forEach(h=>{
      const row=box.appendChild(document.createElement('div'));row.style.cssText='padding:12px 0;border-bottom:1px solid #1e2026;';
      const top=row.appendChild(document.createElement('div'));top.style.cssText='display:flex;align-items:center;gap:10px;margin-bottom:5px;';
      top.innerHTML='<span class="pbs '+(h.type==='done'?'pbs-on':'pbs-ex')+'">'+(h.type==='done'?'연락완료':'부재중')+'</span><span style="font-size:11px;color:#3a3f58;">'+fmtTs(h.ts)+'</span>';
      if(h.memo)row.appendChild(Object.assign(document.createElement('div'),{textContent:h.memo})).style.cssText='font-size:13px;color:#8892aa;';
    });
    box.appendChild(Object.assign(document.createElement('button'),{className:'pcm-btn-pri',textContent:'닫기'})).onclick=close;
    box.lastChild.style.marginTop='16px';
  },{});
}

function openPcAssignTrainer(cid,cb){
  const c=consultations.find(x=>x.id===cid);if(!c)return;
  let selTrId=c.assignedTrainer||'';
  pcModal((box,close)=>{
    box.appendChild(Object.assign(document.createElement('div'),{className:'pcm-ttl',textContent:'트레이너 지정'}));
    box.appendChild(Object.assign(document.createElement('div'),{className:'pcm-sub',textContent:c.name+' · '+(c.phone||'')}));
    const trGrid=box.appendChild(document.createElement('div'));trGrid.style.cssText='display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;';
    const trBtns=[];
    trainers.filter(t=>t.showInMem!==false).forEach(tr=>{
      const col=getTrainerColor(tr);const btn=trGrid.appendChild(document.createElement('button'));
      btn.style.cssText='padding:12px;border-radius:9px;border:1.5px solid '+(selTrId===tr.id?col.dot:'#1e2026')+';background:'+(selTrId===tr.id?'rgba('+parseInt(col.dot.slice(1,3),16)+','+parseInt(col.dot.slice(3,5),16)+','+parseInt(col.dot.slice(5,7),16)+',0.1)':'#0f1117')+';color:'+(selTrId===tr.id?col.dot:'#6b7494')+';font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;';
      btn.textContent=tr.name;trBtns.push({btn,tr,col});
      btn.onclick=()=>{selTrId=tr.id;trBtns.forEach(({btn:b,tr:t2,col:c2})=>{b.style.borderColor=selTrId===t2.id?c2.dot:'#1e2026';b.style.color=selTrId===t2.id?c2.dot:'#6b7494';});};
    });
    const btns=box.appendChild(document.createElement('div'));btns.className='pcm-btns';
    btns.appendChild(Object.assign(document.createElement('button'),{className:'pcm-btn-sec',textContent:'취소'})).onclick=close;
    btns.appendChild(Object.assign(document.createElement('button'),{className:'pcm-btn-pri',textContent:'지정만'})).onclick=()=>{c.assignedTrainer=selTrId;sv('og10_cs',consultations);close();if(cb)cb();};
  },{wide:true});
}

let pcConKw='';let pcConInflow='';let pcConStatus='';

function todayStrPC(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function fmtTs(ts){if(!ts)return'-';const d=new Date(ts);return d.getFullYear()+'.'+(d.getMonth()+1)+'.'+d.getDate()+' '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');}

function renderConsultTable(container,list){
  const tbl=container.appendChild(document.createElement('table'));tbl.className='pc-tbl';tbl.style.cssText='font-size:12px;';
  const thead=tbl.appendChild(document.createElement('thead'));const hr=thead.appendChild(document.createElement('tr'));
  ['이름','연락처','유입경로','연락예정일','상태','메모','액션'].forEach(h=>hr.appendChild(Object.assign(document.createElement('th'),{textContent:h})));
  const tbody=tbl.appendChild(document.createElement('tbody'));
  const stMap={pending:'대기',missed:'부재중',done:'완료'};const stCls={pending:'pbs-pd',missed:'pbs-ex',done:'pbs-on'};
  list.forEach(c=>{
    const row=tbody.appendChild(document.createElement('tr'));
    [c.name,c.phone||'-',c.inflow||'-',c.contactDate||'-'].forEach(v=>row.appendChild(Object.assign(document.createElement('td'),{textContent:v})));
    const stTd=row.appendChild(document.createElement('td'));stTd.innerHTML='<span class="pbs '+stCls[c.status||'pending']+'">'+stMap[c.status||'pending']+'</span>';
    const mTd=row.appendChild(document.createElement('td'));mTd.textContent=(c.memo||'').slice(0,20)+(c.memo&&c.memo.length>20?'...':'');mTd.style.color='#6b7494';
    const actTd=row.appendChild(document.createElement('td'));actTd.style.cssText='white-space:nowrap;';
    if(c.status!=='done'){
      const doneBtn=actTd.appendChild(document.createElement('button'));doneBtn.className='pc-tbtn';doneBtn.style.cssText='padding:5px 10px;font-size:11px;margin-right:4px;border-color:#34d399;color:#34d399;';doneBtn.textContent='완료';doneBtn.onclick=()=>openPcConsultHistory(c.id,'done',()=>renderPcContent());
      if(c.status==='pending'){const missBtn=actTd.appendChild(document.createElement('button'));missBtn.className='pc-tbtn';missBtn.style.cssText='padding:5px 10px;font-size:11px;margin-right:4px;border-color:#6496ff;color:#6496ff;';missBtn.textContent='부재중';missBtn.onclick=()=>openPcConsultHistory(c.id,'missed',()=>renderPcContent());}

    const trBtn=actTd.appendChild(document.createElement('button'));trBtn.className='pc-tbtn';trBtn.style.cssText='padding:5px 10px;font-size:11px;border-color:#ab47bc;color:#ce93d8;margin-right:4px;';trBtn.textContent='지정';trBtn.onclick=()=>openPcAssignTrainer(c.id,()=>renderPcContent());
    const delBtn=actTd.appendChild(document.createElement('button'));delBtn.style.cssText='padding:5px 8px;font-size:11px;border-radius:6px;border:1px solid #1e2026;background:transparent;color:#f87171;cursor:pointer;';delBtn.textContent='×';delBtn.onclick=()=>{if(confirm(c.name+' 삭제?')){consultations=consultations.filter(x=>x.id!==c.id);sv('og10_cs',consultations);renderPcContent();}};
  });
  if(!list.length){const tr2=tbody.appendChild(document.createElement('tr'));const td=tr2.appendChild(document.createElement('td'));td.colSpan=7;td.style.cssText='text-align:center;padding:20px;color:#2a2d45;font-size:12px;';td.textContent='없음';}

function renderPcConsult(ct,acts){
  if(acts){acts.appendChild(Object.assign(document.createElement('button'),{className:'pc-tbtn pri',textContent:'+ 상담 등록'})).onclick=()=>openPcAddConsult(()=>renderPcContent());}
  const today=todayStrPC();
  const todayList=consultations.filter(c=>c.contactDate===today&&c.status==='pending');
  const missedList=consultations.filter(c=>c.status==='missed');
  const pastList=consultations.filter(c=>c.contactDate<today&&c.status==='pending');
  const upcomingList=consultations.filter(c=>c.contactDate>today&&c.status==='pending');
  const todayCard=ct.appendChild(document.createElement('div'));todayCard.style.cssText='background:#111318;border:1px solid #1e2026;border-radius:12px;padding:16px 20px;margin-bottom:16px;';
  const th=todayCard.appendChild(document.createElement('div'));th.style.cssText='display:flex;align-items:center;gap:10px;margin-bottom:14px;';
  th.innerHTML='<span style="background:#818cf8;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;">TODAY</span><span style="font-size:14px;font-weight:700;color:#e2e8f0;">금일 연락 대상 '+todayList.length+'명</span>'+(pastList.length>0?'<span style="background:#f87171;color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;">미연락 '+pastList.length+'명</span>':'')+(missedList.length>0?'<span style="background:#6496ff;color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;">부재중 '+missedList.length+'명</span>':'');
  const combined=[...pastList,...todayList,...missedList];
  if(!combined.length){todayCard.appendChild(Object.assign(document.createElement('div'),{textContent:'오늘 연락할 상담자가 없습니다.'})).style.cssText='font-size:13px;color:#3a3f58;';}
  else{const tw=todayCard.appendChild(Object.assign(document.createElement('div'),{className:'pc-tw'}));renderConsultTable(tw,combined);}
  if(upcomingList.length){
    ct.appendChild(Object.assign(document.createElement('div'),{textContent:'예정된 상담'})).style.cssText='font-size:11px;font-weight:700;color:#3a3f58;letter-spacing:1px;margin:16px 0 8px;';
    const tw=ct.appendChild(Object.assign(document.createElement('div'),{className:'pc-tw'}));renderConsultTable(tw,upcomingList);
  }
}

function openPcAddConsult(cb){
  pcModal((box,close)=>{
    box.appendChild(Object.assign(document.createElement('div'),{className:'pcm-ttl',textContent:'상담 등록'}));
    const r2=box.appendChild(document.createElement('div'));r2.className='pcm-row2';
    const nF=r2.appendChild(_f('이름',true));const nI=nF.appendChild(_inp('이름'));
    const pF=r2.appendChild(_f('연락처'));const pI=pF.appendChild(_inp('010-'));pI.oninput=function(){this.value=fmtPhone(this.value);};
    const r3=box.appendChild(document.createElement('div'));r3.className='pcm-row2';
    const iF=r3.appendChild(_f('유입경로'));const iS=iF.appendChild(_sel([{v:'',l:'선택 안함'},...(INFLOW_OPTIONS||[]).map(v=>({v,l:v}))]));
    const dF=r3.appendChild(_f('연락 예정일'));const dI=dF.appendChild(_inp(''));dI.type='date';
    const n=new Date();dI.value=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
    const mF=box.appendChild(_f('상담 내용'));const mT=mF.appendChild(document.createElement('textarea'));mT.className='pcm-textarea';mT.placeholder='상담 내용 또는 특이사항...';
    const btns=box.appendChild(document.createElement('div'));btns.className='pcm-btns';btns.style.marginTop='20px';
    btns.appendChild(Object.assign(document.createElement('button'),{className:'pcm-btn-sec',textContent:'취소'})).onclick=close;
    btns.appendChild(Object.assign(document.createElement('button'),{className:'pcm-btn-pri',textContent:'등록'})).onclick=()=>{
      const name=nI.value.trim();if(!name){alert('이름을 입력해주세요.');return;}
      consultations.unshift({id:'c'+Date.now(),name,phone:pI.value.trim(),inflow:iS.value,memo:mT.value.trim(),contactDate:dI.value,status:'pending',createdAt:Date.now(),history:[]});
      sv('og10_cs',consultations);close();if(cb)cb();

}

  pcModal((box,close)=>{

// ═══ 환불/양도 시스템 ═══

// 회원 상세 이용권 카드에 환불/양도 버튼 추가
function renderMbPlanCard(container, mb, p, box, close) {
  const card = container.appendChild(document.createElement('div'));
  card.style.cssText = 'background:#0f1117;border:1px solid #1e2026;border-radius:10px;padding:14px 16px;margin-bottom:8px;';
  const rem = getPlanRemain(p); const used = getPlanUsed(p.id);
  const pct = p.sessions > 0 ? Math.round(used / p.sessions * 100) : 0;
  const isActive = rem > 0;
  const pDate = p.paymentDate || (p.addedAt ? new Date(p.addedAt).toLocaleDateString('ko-KR', {year:'2-digit',month:'2-digit',day:'2-digit'}) : '');

  // 상단: 이름 + 상태 + 버튼
  const top = card.appendChild(document.createElement('div'));
  top.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:8px;';
  top.appendChild(Object.assign(document.createElement('div'), {textContent: p.productName || p.duration + '분 ' + p.sessions + '회권'})).style.cssText = 'font-size:13px;font-weight:700;color:#e2e8f0;flex:1;';
  const stBdg = top.appendChild(document.createElement('span'));
  stBdg.className = 'pbs ' + (isActive ? 'pbs-on' : 'pbs-off');
  stBdg.textContent = isActive ? '유효' : '만료';

  // 환불/양도 버튼 (오른쪽)
  const refBtn = top.appendChild(document.createElement('button'));
  refBtn.style.cssText = 'padding:4px 10px;border-radius:6px;border:1px solid rgba(248,113,113,.4);background:transparent;color:#f87171;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;';
  refBtn.textContent = '환불/양도';
  refBtn.onclick = () => openPcRefund(mb, p, box, close);

  // 상세 정보
  const info = card.appendChild(document.createElement('div'));
  info.style.cssText = 'font-size:11px;color:#4a5068;line-height:1.8;';
  info.innerHTML = '결제: ' + (p.totalPrice||0).toLocaleString() + '원' + (p.paymentMethod ? ' · ' + p.paymentMethod : '') + (pDate ? ' · ' + pDate : '') + '<br>'
    + '사용 ' + used + '회 / 잔여 ' + rem + '회'
    + (p.startDate ? '<br>기간: ' + p.startDate + ' ~ ' + (p.endDate||'') : '');

  // 진행 바
  const bar = card.appendChild(document.createElement('div'));
  bar.style.cssText = 'height:4px;background:#1e2026;border-radius:2px;overflow:hidden;margin-top:8px;';
  const fill = bar.appendChild(document.createElement('div'));
  fill.style.cssText = 'height:100%;width:' + pct + '%;background:' + (isActive ? '#818cf8' : '#3a3f58') + ';border-radius:2px;';
}

// 환불 모달
function openPcRefund(mb, plan, parentBox, parentClose) {
  const used = getPlanUsed(plan.id);
  const rem = getPlanRemain(plan);
  const paid = plan.totalPrice || 0;
  const perSession = plan.pricePerSession || (plan.sessions > 0 ? Math.round(paid / plan.sessions) : 0);
  const usedAmt = used * perSession;
  const suggested = Math.max(0, paid - usedAmt);

  pcModal((box, close) => {
    box.appendChild(Object.assign(document.createElement('div'), {className:'pcm-ttl', textContent:'환불 / 양도'}));
    box.appendChild(Object.assign(document.createElement('div'), {className:'pcm-sub', textContent: mb.name + ' · ' + (plan.productName || plan.sessions + '회권')}));

    // 요약 카드
    const sumCard = box.appendChild(document.createElement('div'));
    sumCard.style.cssText = 'background:#0f1117;border:1px solid #1e2026;border-radius:10px;padding:14px 16px;margin-bottom:20px;display:grid;grid-template-columns:1fr 1fr;gap:10px;';

function openPcLogin() {

  }

    box.appendChild(Object.assign(document.createElement('div'), {className:'pcm-sub', textContent:'담당자를 선택하고 로그인 번호를 입력하세요'}));

    const trF = box.appendChild(_f('담당자', true));
    const trS = trF.appendChild(_sel([{v:'',l:'선택 안함'},...trainers.map(t=>({v:t.id,l:t.name+(t.role?' · '+t.role:'')}))]));
    const pinF = box.appendChild(_f('로그인 번호'));
    const pinI = pinF.appendChild(_inp('••••'));
    pinI.type = 'password'; pinI.maxLength = 4;
    pinI.oninput = function(){this.value = this.value.replace(/\D/g,'');};
    pinI.onkeydown = e => {if(e.key==='Enter') doLogin();};
    const errDiv = box.appendChild(document.createElement('div'));
    errDiv.style.cssText = 'color:#f87171;font-size:12px;min-height:18px;margin-top:6px;';
    function doLogin() {
      const tr2 = trainers.find(t => t.id === trS.value);
      if (!tr2) {errDiv.textContent = '담당자를 선택해주세요.'; return;}
      if (tr2.saban && pinI.value !== tr2.saban) {errDiv.textContent = '로그인 번호가 올바르지 않습니다.'; pinI.value=''; return;}
      curUser = tr2.id; sv('og10_cu', curUser); close(); updatePcUser(); renderPcContent();
    }
    const btns = box.appendChild(document.createElement('div')); btns.className = 'pcm-btns'; btns.style.marginTop = '20px';
    btns.appendChild(Object.assign(document.createElement('button'), {className:'pcm-btn-sec', textContent:'취소'})).onclick = close;
    btns.appendChild(Object.assign(document.createElement('button'), {className:'pcm-btn-pri', textContent:'로그인'})).onclick = doLogin;
  }, {});
}

// ── 수업진행 엑셀 다운로드 ───────────────────────────────────────────────
function dlSessionsXLSX(){
  if(typeof XLSX==='undefined'){alert('잠시 후 다시 시도해주세요.');return;}
  const wb=XLSX.utils.book_new();
  const wsData=[['TheLine CRM - 수업 진행 내역'],['기간: '+pcSalStart+' ~ '+pcSalEnd],[]];
  wsData.push(['날짜','시간','트레이너','회원','유형','수업권','잔여']);
  const sd=new Date(pcSalStart),ed=new Date(pcSalEnd);ed.setHours(23,59,59);
  slots.filter(s=>{
    const d=new Date(s.date);return d>=sd&&d<=ed&&s.type!=='OT'&&s.type!=='상담'&&s.memberId&&(!pcSalTr||s.trainerId===pcSalTr);
  }).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time)).forEach(s=>{
    const tr2=trainers.find(t=>t.id===s.trainerId);const mb=members.find(m=>m.id===s.memberId);
    const plan=s.planId&&mb?(mb.plans||[]).find(p=>p.id===s.planId):null;
    wsData.push([s.date,s.time,tr2?tr2.name:'-',mb?mb.name:'-',s.type||'-',plan?(plan.productName||plan.sessions+'회권'):'-',plan?getPlanRemain(plan):'-']);
  });
  const ws=XLSX.utils.aoa_to_sheet(wsData);XLSX.utils.book_append_sheet(wb,ws,'수업진행');
  XLSX.writeFile(wb,'수업진행_'+pcSalStart+'_'+pcSalEnd+'.xlsx');
}

    editForm.style.display='none';

    function showEditForm(){
      editForm.innerHTML='';editForm.style.display='block';infoCard.style.display='none';

      const r2=editForm.appendChild(document.createElement('div'));r2.className='pcm-row2';
      const dtF=r2.appendChild(_f('날짜'));const dtI=dtF.appendChild(_inp(''));dtI.type='date';dtI.value=s.date;dtI.className='pcm-input';
      const tmF=r2.appendChild(_f('시간'));
      const tmS=tmF.appendChild(_sel(TIMES.map(t=>({v:t,l:t}))));tmS.value=s.time;

      const r3=editForm.appendChild(document.createElement('div'));r3.className='pcm-row2';
      const tyF=r3.appendChild(_f('유형'));const tyS=tyF.appendChild(_sel(['OT','25분 수업','50분 수업','상담'].map(v=>({v,l:v}))));tyS.value=s.type||'25분 수업';
      const trF=r3.appendChild(_f('트레이너'));const trS=trF.appendChild(_sel([{v:'',l:'선택'},...trainers.map(t=>({v:t.id,l:t.name}))]));if(s.trainerId)trS.value=s.trainerId;

      // 수업권 선택
      if(mb&&(mb.plans||[]).length){
        const plF=editForm.appendChild(_f('사용 수업권'));
        const plS=plF.appendChild(_sel([{v:'',l:'없음 (OT/상담)'},...(mb.plans||[]).map(p=>({v:p.id,l:(p.productName||p.sessions+'회권')+' · 잔여 '+getPlanRemain(p)+'회'}))]));
        if(s.planId)plS.value=s.planId;
        plS.onchange=()=>s.planId=plS.value;
      }

      const meF=editForm.appendChild(_f('메모'));const meI=meF.appendChild(_inp('메모'));meI.value=s.memo||'';meI.className='pcm-input';

      const fb=editForm.appendChild(document.createElement('div'));fb.className='pcm-btns';fb.style.marginTop='16px';
      fb.appendChild(Object.assign(document.createElement('button'),{className:'pcm-btn-sec',textContent:'취소'})).onclick=()=>{editForm.style.display='none';infoCard.style.display='block';editBtn.textContent='수정';};
      fb.appendChild(Object.assign(document.createElement('button'),{className:'pcm-btn-pri',textContent:'저장'})).onclick=()=>{
        s.date=dtI.value;s.time=tmS.value;s.type=tyS.value;s.trainerId=trS.value;s.memo=meI.value.trim();
        sv('og10_sl',slots);closeModal();renderPcContent();
      };
    }

    editBtn.onclick=()=>{
      if(editForm.style.display==='none'){showEditForm();editBtn.textContent='수정 취소';}
      else{editForm.style.display='none';infoCard.style.display='block';editBtn.textContent='수정';}
    };

    // 하단 삭제 버튼
    const delBtn=box.appendChild(document.createElement('button'));
    delBtn.style.cssText='width:100%;padding:12px;border-radius:10px;border:1px solid rgba(248,113,113,.3);background:transparent;color:#f87171;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit;';
    delBtn.textContent='이 일정 삭제';
    delBtn.onclick=()=>{
      if(!confirm('일정을 삭제하시겠습니까?'))return;
      slots=slots.filter(x=>x.id!==slotId);sv('og10_sl',slots);
      closeModal();renderPcContent();
    };
  },{});
}

// ── PC 일정 추가 모달 ─────────────────────────────────────────────────────
function openPcAddSchedule(initDate){
  const today=new Date();
  const defDate=initDate||(today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0'));
  let selMbId='';let selPlanId='';

  pcModal((box,close)=>{
    box.style.cssText+='width:520px;max-height:90vh;';
    box.appendChild(Object.assign(document.createElement('div'),{className:'pcm-ttl',textContent:'일정 추가'}));

    const r2=box.appendChild(document.createElement('div'));r2.className='pcm-row2';
    // 트레이너
    const trF=r2.appendChild(_f('트레이너',true));
    const trS=trF.appendChild(_sel([{v:'',l:'선택'},...trainers.map(t=>({v:t.id,l:t.name}))]));
    if(curUser)trS.value=curUser;

    // 날짜
    const dtF=r2.appendChild(_f('날짜',true));
    const dtI=dtF.appendChild(_inp(''));dtI.type='date';dtI.value=defDate;dtI.className='pcm-input';

    const r3=box.appendChild(document.createElement('div'));r3.className='pcm-row2';
    // 시간
    const tmF=r3.appendChild(_f('시간',true));
    const tmS=tmF.appendChild(_sel(TIMES.map(t=>({v:t,l:t}))));tmS.value='09:00';

    // 유형 (수업권 선택 시 자동)
    const tyF=r3.appendChild(_f('유형'));
    const tyS=tyF.appendChild(_sel(['25분 수업','50분 수업','OT','상담'].map(v=>({v,l:v}))));

    // 회원 선택 (드롭다운, 담당자만 선택 가능)
    const mbF=box.appendChild(_f('회원 선택'));
    const isMgr=isAdminUser();
    const tid=trS.value||curUser;
    // 드롭다운으로 회원 목록 표시
    let mbSel=mbF.appendChild(document.createElement('select'));mbSel.className='pcm-select';
    mbSel.style.cssText='width:100%;padding:12px 14px;';

    function rebuildMemberDropdown(){
      const currentTid=trS.value||curUser;
      // 관리자: 선택한 트레이너 담당 회원만 / 트레이너: 본인 담당 회원만
      const mList=members.filter(m=>m.trainerId===currentTid);
      mbSel.innerHTML='';
      [{v:'',l:'회원 없음 (OT/상담)'},...mList.map(m=>({v:m.id,l:m.name+(m.phone?' · '+m.phone.slice(-4):'')}))].forEach(({v,l})=>{
        const o=mbSel.appendChild(document.createElement('option'));o.value=v;o.textContent=l;
      });
      // 첫번째 회원 자동 선택 (있을 때)
      if(mList.length>0){
        mbSel.value=mList[0].id;
        selMbId=mList[0].id;
      } else {
        mbSel.value='';selMbId='';
      }
      mbSel.onchange=()=>{selMbId=mbSel.value;rebuildPlanDropdown();};
      rebuildPlanDropdown();
    }

    trS.onchange=()=>rebuildMemberDropdown();

    // 수업권 선택
    const plF=box.appendChild(_f('수업권'));
    let plSel=plF.appendChild(document.createElement('select'));plSel.className='pcm-select';plSel.style.cssText='width:100%;padding:12px 14px;';

    function rebuildPlanDropdown(){
      plSel.innerHTML='';
      selMbId=mbSel.value;
      const mb=selMbId?members.find(m=>m.id===selMbId):null;
      const plans=mb?(mb.plans||[]).filter(p=>getPlanRemain(p)>0):[];
      [{v:'',l:'없음 (OT/상담)'},...plans.map(p=>({v:p.id,l:(p.productName||p.sessions+'회권')+' · 잔여 '+getPlanRemain(p)+'회'}))].forEach(({v,l})=>{
        const o=plSel.appendChild(document.createElement('option'));o.value=v;o.textContent=l;
      });
      // 수업권 있으면 첫번째 수업권 자동 선택
      if(plans.length>0){
        plSel.value=plans[0].id;
        selPlanId=plans[0].id;
        if(plans[0].duration){tyS.value=plans[0].duration+'분 수업';}
      } else {
        plSel.value='';selPlanId='';
      }
      plSel.onchange=()=>{
        selPlanId=plSel.value;
        if(selPlanId&&mb){
          const plan=(mb.plans||[]).find(p=>p.id===selPlanId);
          if(plan&&plan.duration){tyS.value=plan.duration+'분 수업';}
        }
      };
    }

    rebuildMemberDropdown();

    // 메모
    const meF=box.appendChild(_f('메모'));
    const meI=meF.appendChild(_inp('메모 (OT 대상자 이름 등)'));meI.className='pcm-input';

    const btns=box.appendChild(document.createElement('div'));btns.className='pcm-btns';btns.style.marginTop='20px';
    btns.appendChild(Object.assign(document.createElement('button'),{className:'pcm-btn-sec',textContent:'취소'})).onclick=close;
    btns.appendChild(Object.assign(document.createElement('button'),{className:'pcm-btn-pri',textContent:'일정 등록'})).onclick=()=>{
      if(!trS.value){alert('트레이너를 선택해주세요.');return;}
      if(!dtI.value){alert('날짜를 선택해주세요.');return;}
      const slot={id:'sl'+Date.now(),trainerId:trS.value,date:dtI.value,time:tmS.value,type:tyS.value,
        memberId:mbSel.value||null,planId:plSel.value||null,memo:meI.value.trim()};
      slots.push(slot);sv('og10_sl',slots);
      close();renderPcContent();
    };
  },{wide:true});
}

</script>
