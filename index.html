// ── MEMBER TAB ──
function renderMem(){
  const ct=document.getElementById('pg-mem').querySelector('.pad');ct.innerHTML='';
  if(!curUser&&!isAdminUser()){
    const lb=ct.appendChild(el('div','lockbox'));lb.appendChild(mk('p','','회원관리는 로그인이 필요합니다.'));lb.appendChild(mk('button','','로그인하기')).onclick=()=>openLogin(()=>{renderMem();});return;
  }

  // 서브탭 (PC와 동일)
  const stWrap=ct.appendChild(el('div','mem-subtabs'));
  [['member','회원 관리'],['consult','상담 관리'],['chist','상담 내역']].forEach(([v,l])=>{
    const b=stWrap.appendChild(mk('button','mem-stab'+(memSubTab===v?' on':''),l));b.onclick=()=>{
      const oldIdx=memSubTabOrder.indexOf(memSubTab);
      const newIdx=memSubTabOrder.indexOf(v);
      _lastMemSubTab=memSubTab;
      window._memSlideDir=newIdx>oldIdx?'right':'left';
      memSubTab=v;renderMem();
    };
  });
  // 콘텐츠 래퍼 (탭바 제외, 콘텐츠만 슬라이드)
  const memContent=ct.appendChild(Object.assign(document.createElement('div'),{style:'position:relative;'}));
  if(window._memSlideDir){
    memContent.style.animation=(window._memSlideDir==='right'?'slideInRight':'slideInLeft')+' .22s ease forwards';
    window._memSlideDir=null;
  }
  if(memSubTab==='consult'){renderConsult(memContent);return;}
  if(memSubTab==='chist'){renderConsultHistory(memContent);return;}

  // 회원 관리 탭 - PC 스타일
  // 상단: 서브필터 + 등록 버튼
  const toolbar=memContent.appendChild(document.createElement('div'));
  toolbar.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;';
  
  // 상태 필터 버튼
  let mobMemFilter=window._mobMemFilter||'all';
  const filterMap={all:'전체',active:'활성',expiring:'만료임박',expired:'만료',none:'미등록'};
  const filterBar=toolbar.appendChild(document.createElement('div'));
  filterBar.style.cssText='display:flex;gap:6px;flex:1;overflow-x:auto;';
  Object.entries(filterMap).forEach(([k,l])=>{
    const btn=filterBar.appendChild(document.createElement('button'));
    btn.style.cssText='padding:6px 12px;border-radius:8px;border:1px solid '+(mobMemFilter===k?'#818cf8':'#1e2026')+';background:'+(mobMemFilter===k?'rgba(129,140,248,.1)':'transparent')+';color:'+(mobMemFilter===k?'#818cf8':'#6b7494')+';font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;';
    btn.textContent=l;
    btn.onclick=()=>{window._mobMemFilter=k;renderMem();};
  });

  // 등록 버튼
  const regBtn=toolbar.appendChild(document.createElement('button'));
  regBtn.style.cssText='padding:8px 14px;border-radius:8px;border:none;background:#818cf8;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;';
  regBtn.textContent='+ 등록';
  regBtn.onclick=()=>openPcAddMember();

  // 검색
  const searchWrap=memContent.appendChild(document.createElement('div'));
  searchWrap.style.cssText='margin-bottom:12px;';
  const searchInp=searchWrap.appendChild(document.createElement('input'));
  searchInp.style.cssText='width:100%;padding:10px 14px;border:1px solid #1e2026;border-radius:10px;background:#111318;color:#e2e8f0;font-size:14px;outline:none;box-sizing:border-box;font-family:inherit;';
  searchInp.placeholder='이름 또는 연락처 검색...';
  searchInp.value=window._mobMemKw||'';
  searchInp.oninput=e=>{window._mobMemKw=e.target.value;};
  searchInp.onkeydown=e=>{if(e.key==='Enter')renderMem();};

  // 회원 목록
  let list=members.slice();
  const kw=(window._mobMemKw||'').trim();
  if(kw)list=list.filter(m=>m.name.includes(kw)||(m.phone||'').includes(kw));
  const flt=window._mobMemFilter||'all';
  if(flt==='expiring')list=list.filter(m=>{let t=0;(m.plans||[]).forEach(p=>{t+=getPlanRemain(p);});return t>0&&t<=3;});
  else if(flt!=='all')list=list.filter(m=>pcMbStatus&&pcMbStatus(m)===flt);

  memContent.appendChild(Object.assign(document.createElement('div'),{textContent:'총 '+list.length+'명'})).style.cssText='font-size:12px;color:#4a5068;margin-bottom:8px;';

  if(!list.length){
    memContent.appendChild(Object.assign(document.createElement('div'),{textContent:'회원이 없습니다.'})).style.cssText='text-align:center;padding:40px;color:#2a2d45;font-size:14px;';
    return;
  }

  // 회원 카드 리스트
  list.forEach(m=>{
    const tr2=trainers.find(t=>t.id===m.trainerId);
    const col=tr2?getTrainerColor(tr2):{bg:'#1e2026',text:'#8892aa',dot:'#8892aa'};
    const st=pcMbStatus?pcMbStatus(m):'none';
    const stLbl={active:'활성',expiring:'만료임박',expired:'만료',none:'미등록'};
    const stCl={active:'#68d391',expiring:'#f6ad55',expired:'#4a5068',none:'#2a2d45'};
    const card=memContent.appendChild(document.createElement('div'));
    card.style.cssText='background:#111318;border:1px solid #1e2026;border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;';
    card.onclick=()=>openMobMemberDetail(m.id);
    // 아바타
    const av=card.appendChild(document.createElement('div'));
    av.style.cssText='width:40px;height:40px;border-radius:50%;background:'+col.bg+';color:'+col.text+';display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;';
    av.textContent=(m.name||'?').slice(0,2);
    // 정보
    const info=card.appendChild(document.createElement('div'));info.style.cssText='flex:1;min-width:0;';
    info.innerHTML='<div style="font-size:14px;font-weight:700;color:#e2e8f0;margin-bottom:3px;">'+m.name+'</div>'
      +'<div style="font-size:12px;color:#4a5068;">'+(tr2?tr2.name:'-')+' · '+(m.phone||'-')+'</div>';
    // 상태
    const stBadge=card.appendChild(document.createElement('div'));
    stBadge.style.cssText='font-size:11px;font-weight:700;color:'+stCl[st]+';background:rgba(255,255,255,.05);padding:3px 8px;border-radius:6px;border:1px solid '+stCl[st]+'40;white-space:nowrap;';
    stBadge.textContent=stLbl[st]||st;
  });
}

// 모바일 회원 상세 (PC 모달 그대로 활용)
function openMobMemberDetail(mbId){
  // PC 회원 상세 모달 사용
  pcDetailMbId=mbId;
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;display:flex;align-items:flex-end;';
  document.body.appendChild(ov);
  const box=ov.appendChild(document.createElement('div'));
  box.style.cssText='background:#111318;width:100%;max-height:90vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:20px;animation:pcPageFadeIn .28s cubic-bezier(.22,1,.36,1) forwards;';
  const close=()=>{if(document.body.contains(ov))document.body.removeChild(ov);};
  ov.onclick=e=>{if(e.target===ov)close();};
  renderMbDetailModal(box,close,mbId);
}

function renderMemView(ct){
  const tr=trainers.find(t=>t.id===mvTr);if(!tr)return;
  const hdr=ct.appendChild(el('div','mvhdr'));
  hdr.appendChild(mk('button','backbtn','← 뒤로')).onclick=()=>{mvTr=null;renderMem();};
  hdr.appendChild(mk('div','mvttl',tr.name+' 트레이너'));
  if(canAccessTrainer(mvTr)){const addBtn=hdr.appendChild(mk('button','memplanbtb','+ 회원 등록'));addBtn.style.cssText='white-space:nowrap;flex-shrink:0;';addBtn.onclick=()=>openAddMem(mvTr);}
  const dlbar=ct.appendChild(el('div','dlbar'));
  const dlsel=dlbar.appendChild(el('select','dlsel'));
  const now=new Date();
  for(let i=0;i<12;i++){const d=new Date(now.getFullYear(),now.getMonth()-i,1);const o=dlsel.appendChild(document.createElement('option'));o.value=d.getFullYear()+'-'+(d.getMonth()+1);o.textContent=d.getFullYear()+'년 '+(d.getMonth()+1)+'월';}
  dlbar.appendChild(mk('button','dlbtn','엑셀 다운로드')).onclick=()=>{const[y,m]=dlsel.value.split('-').map(Number);dlCSV(mvTr,y,m);};
  const myM=members.filter(m=>m.trainerId===mvTr);
  if(!myM.length)ct.appendChild(mk('div','','등록된 회원이 없습니다.')).style.cssText='color:#555;font-size:13px;padding:1rem 0;';
  myM.forEach(m=>{
    const card=ct.appendChild(el('div','memcard'));
    const top=card.appendChild(el('div','memtop'));
    top.appendChild(mk('div','memnm',m.name));
    const topBtns=top.appendChild(el('div'));topBtns.style.cssText='display:flex;gap:5px;align-items:center;';
    topBtns.appendChild(mk('button','memeditbtn','회원수정')).onclick=()=>openEditMember(m.id);
    topBtns.appendChild(mk('button','memplanbtb','+ 현장판매')).onclick=()=>openPcPayment(m.id,null,null);
    topBtns.appendChild(mk('button','mdel','×')).onclick=()=>{if(confirm(m.name+' 삭제?')){members=members.filter(x=>x.id!==m.id);sv('og10_mb',members);renderMem();}};
    const minfo=card.appendChild(el('div',''));minfo.style.cssText='display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px;';
    if(m.phone)minfo.appendChild(mk('div','mphone',m.phone));
    if(m.inflow){const ib=minfo.appendChild(mk('div','',m.inflow));ib.style.cssText='font-size:11px;color:#ce93d8;background:rgba(171,71,188,.12);padding:2px 7px;border-radius:5px;font-weight:600;';}
    if(m.payment){const pb=minfo.appendChild(mk('div','',m.payment));pb.style.cssText='font-size:11px;color:#4a9eff;background:rgba(74,158,255,.12);padding:2px 7px;border-radius:5px;font-weight:600;';}
    (m.plans||[]).forEach(p=>{
      const rem=getPlanRemain(p);
      const pr=card.appendChild(el('div','planrow'));const pi=pr.appendChild(el('div'));
      const dateStr=p.paymentDate||(p.addedAt?new Date(p.addedAt).toLocaleDateString('ko-KR',{year:'2-digit',month:'2-digit',day:'2-digit'}):'');
      pi.appendChild(mk('div','planinfo',(p.duration||'?')+'분 '+p.sessions+'회권'+(dateStr?' · '+dateStr:'')));
      pi.appendChild(mk('div','planprice',(p.totalPrice||0).toLocaleString()+'원 ('+(p.pricePerSession||0).toLocaleString()+'원/회)'+(p.paymentMethod?' · '+p.paymentMethod:'')));
      const pright=pr.appendChild(el('div'));pright.style.cssText='display:flex;align-items:center;gap:6px;';
      pright.appendChild(mk('div','planrem'+(rem<3&&rem>=0?' warn':' ok'),'잔여 '+rem+'회'));
      pright.appendChild(mk('button','memeditbtn','수정')).onclick=()=>openEditPlan(m.id,p.id);
      if(!p.refunded){const refBtn=pright.appendChild(mk('button','memeditbtn','환불'));refBtn.style.cssText='color:#f87171;border-color:rgba(248,113,113,.4);white-space:nowrap;';refBtn.onclick=()=>openPcRefund(m,p,null,null);}
    });
    if(getMemberWarn(m))card.appendChild(mk('div','memwarn','⚠ 연장 상담 대상자'));
  });

}

function openEditMember(memberId){
  const mb=members.find(m=>m.id===memberId);if(!mb)return;
  showSheet(function(sheet,close){
    sheet.appendChild(el('div','shdl'));sheet.appendChild(mk('h3','','회원 정보 수정'));sheet.appendChild(mk('div','shsub',mb.name));
    sheet.appendChild(mk('label','','이름'));const ni=sheet.appendChild(el('input'));ni.type='text';ni.value=mb.name;
    sheet.appendChild(mk('label','','연락처'));const pi=sheet.appendChild(el('input'));pi.type='tel';pi.value=fmtPhone(mb.phone||'');pi.oninput=function(){this.value=fmtPhone(this.value);};
    sheet.appendChild(mk('label','','유입경로'));
    const ii=sheet.appendChild(el('select'));ii.style.cssText='width:100%;padding:13px 14px;border:1px solid var(--bd2);border-radius:10px;background:var(--bg2);color:var(--t1);font-size:15px;';
    INFLOW_OPTIONS.forEach(v=>{const o=ii.appendChild(document.createElement('option'));o.value=v;o.textContent=v;if(v===mb.inflow)o.selected=true;});
    sheet.appendChild(mk('label','','결제방법'));
    const pyi=sheet.appendChild(el('select'));pyi.style.cssText='width:100%;padding:13px 14px;border:1px solid var(--bd2);border-radius:10px;background:var(--bg2);color:var(--t1);font-size:15px;';
    const noneOpt=pyi.appendChild(document.createElement('option'));noneOpt.value='';noneOpt.textContent='선택안함';
    PAYMENT_OPTIONS.forEach(v=>{const o=pyi.appendChild(document.createElement('option'));o.value=v;o.textContent=v;if(v===mb.payment)o.selected=true;});
    const btns=sheet.appendChild(el('div','shbtns'));
    btns.appendChild(mk('button','shno','취소')).onclick=close;
    btns.appendChild(mk('button','shok','저장')).onclick=()=>{
      const name=ni.value.trim();if(!name){alert('이름을 입력해주세요.');return;}
      mb.name=name;mb.phone=pi.value.trim();mb.inflow=ii.value;mb.payment=pyi.value;sv('og10_mb',members);close();renderMem();
    };
  });
}

function openAddMem(tid){
  const tr=trainers.find(t=>t.id===tid);
  showSheet(function(sheet,close){
    sheet.appendChild(el('div','shdl'));sheet.appendChild(mk('h3','','회원 등록'));sheet.appendChild(mk('div','shsub',tr?tr.name+' 트레이너':''));
    sheet.appendChild(mk('label','','이름'));const ni=sheet.appendChild(el('input'));ni.type='text';ni.placeholder='홍길동';
    sheet.appendChild(mk('label','','연락처'));const pi=sheet.appendChild(el('input'));pi.type='tel';pi.placeholder='010-0000-0000';pi.oninput=function(){this.value=fmtPhone(this.value);};
    sheet.appendChild(mk('label','','유입경로'));
    const ii=sheet.appendChild(el('select'));ii.style.cssText='width:100%;padding:13px 14px;border:1px solid var(--bd2);border-radius:10px;background:var(--bg2);color:var(--t1);font-size:15px;';
    INFLOW_OPTIONS.forEach(v=>{const o=ii.appendChild(document.createElement('option'));o.value=v;o.textContent=v;});
    sheet.appendChild(mk('label','','결제방법'));
    const pi2=sheet.appendChild(el('select'));pi2.style.cssText='width:100%;padding:13px 14px;border:1px solid var(--bd2);border-radius:10px;background:var(--bg2);color:var(--t1);font-size:15px;';
    PAYMENT_OPTIONS.forEach(v=>{const o=pi2.appendChild(document.createElement('option'));o.value=v;o.textContent=v;});
    sheet.appendChild(mk('label','','결제일자'));
    const rdi=sheet.appendChild(el('input'));rdi.type='date';
    const _nd=new Date();rdi.value=_nd.getFullYear()+'-'+String(_nd.getMonth()+1).padStart(2,'0')+'-'+String(_nd.getDate()).padStart(2,'0');
    rdi.style.cssText='width:100%;padding:13px 14px;border:1px solid var(--bd2);border-radius:10px;background:var(--bg2);color:var(--t1);font-size:15px;';
    sheet.appendChild(mk('div','sec','첫 번째 수업권'));
    renderPlanForm(sheet);
    const btns=sheet.appendChild(el('div','shbtns'));
    btns.appendChild(mk('button','shno','취소')).onclick=close;
    btns.appendChild(mk('button','shok','등록')).onclick=()=>{
      const name=ni.value.trim();if(!name){alert('이름을 입력해주세요.');return;}
      const plan=getPlanFormValue();if(!plan){alert('수업권 정보를 입력해주세요.');return;}
      const regTs=rdi.value?(()=>{const d=new Date(rdi.value);d.setHours(new Date().getHours(),new Date().getMinutes());return d.getTime();})():Date.now();
      plan.addedAt=regTs;plan.paymentDate=rdi.value;plan.paymentMethod=pi2.value;
      members.push({id:'m'+Date.now(),trainerId:tid,name,phone:pi.value.trim(),inflow:ii.value,payment:pi2.value,plans:[{id:'pl'+Date.now(),...plan}],registeredAt:regTs});
      sv('og10_mb',members);close();renderMem();
    };
  });
}


function openEditPlan(memberId,planId){
  const mb=members.find(m=>m.id===memberId);if(!mb)return;
  const p=(mb.plans||[]).find(x=>x.id===planId);if(!p)return;
  const iSt='width:100%;padding:13px 14px;border:1px solid var(--bd2);border-radius:10px;background:var(--bg2);color:var(--t1);font-size:15px;';
  showSheet(function(sheet,close){
    sheet.appendChild(el('div','shdl'));sheet.appendChild(mk('h3','','수업권 수정'));sheet.appendChild(mk('div','shsub',mb.name));
    sheet.appendChild(mk('label','','수업 시간'));
    const dsel=sheet.appendChild(el('select'));dsel.style.cssText=iSt;
    [{v:25,l:'25분'},{v:50,l:'50분'}].forEach(opt=>{const o=dsel.appendChild(document.createElement('option'));o.value=opt.v;o.textContent=opt.l;if(opt.v===(p.duration||25))o.selected=true;});
    sheet.appendChild(mk('label','','수업 횟수'));
    const ssel=sheet.appendChild(el('select'));ssel.style.cssText=iSt;
    SESSION_OPTIONS.forEach(n=>{const o=ssel.appendChild(document.createElement('option'));o.value=n;o.textContent=n+'회권';if(n===p.sessions)o.selected=true;});
    sheet.appendChild(mk('label','','결제 금액'));
    const pInput=sheet.appendChild(el('input'));pInput.type='text';pInput.style.cssText=iSt;
    pInput.value=fmtMoney(p.totalPrice||0);
    const priceHint=sheet.appendChild(mk('div','',''));
    priceHint.style.cssText='font-size:11px;color:#555;margin-top:3px;margin-bottom:4px;';
    function updateHint(){const total=parseMoney(pInput.value);const sess=parseInt(ssel.value)||1;priceHint.textContent=total?'회당 단가: '+fmtMoney(Math.round(total/sess))+'원':'';}
    pInput.oninput=function(){this.value=fmtMoney(this.value);updateHint();};
    ssel.onchange=updateHint;
    updateHint();
    sheet.appendChild(mk('label','','결제방법'));
    const pymSel=sheet.appendChild(el('select'));pymSel.style.cssText=iSt;
    const nOpt=pymSel.appendChild(document.createElement('option'));nOpt.value='';nOpt.textContent='선택안함';
    PAYMENT_OPTIONS.forEach(v=>{const o=pymSel.appendChild(document.createElement('option'));o.value=v;o.textContent=v;if(v===(p.paymentMethod||mb.payment||''))o.selected=true;});
    sheet.appendChild(mk('label','','결제일자'));
    const dateInput=sheet.appendChild(el('input'));dateInput.type='date';dateInput.style.cssText=iSt;
    if(p.paymentDate){dateInput.value=p.paymentDate;}
    else if(p.addedAt){const d=new Date(p.addedAt);dateInput.value=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
    else{const d=new Date();dateInput.value=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
    const btns=sheet.appendChild(el('div','shbtns'));
    btns.appendChild(mk('button','shno','취소')).onclick=close;
    btns.appendChild(mk('button','shok','저장')).onclick=()=>{
      const totalPrice=parseMoney(pInput.value);if(!totalPrice){alert('금액을 입력해주세요.');return;}
      const sessions=parseInt(ssel.value)||p.sessions;
      p.duration=parseInt(dsel.value)||p.duration;p.sessions=sessions;
      p.totalPrice=totalPrice;p.pricePerSession=Math.round(totalPrice/sessions);
      p.paymentMethod=pymSel.value;
      if(dateInput.value){p.paymentDate=dateInput.value;const d=new Date(dateInput.value);d.setHours(new Date().getHours(),new Date().getMinutes());p.addedAt=d.getTime();}
      sv('og10_mb',members);close();renderMem();
    };
    const delBtn=sheet.appendChild(mk('button','','이 수업권 삭제'));
    delBtn.style.cssText='width:100%;padding:11px;border-radius:10px;border:1px solid #3d1a1a;background:transparent;color:#e05555;font-size:13px;cursor:pointer;margin-top:8px;';
    delBtn.onclick=()=>{if(confirm('삭제할까요?')){mb.plans=mb.plans.filter(x=>x.id!==planId);sv('og10_mb',members);close();renderMem();}};
  });
}

function openAddPlan(memberId){
  const mb=members.find(m=>m.id===memberId);if(!mb)return;
  showSheet(function(sheet,close){
    sheet.appendChild(el('div','shdl'));sheet.appendChild(mk('h3','','권종 추가'));sheet.appendChild(mk('div','shsub',mb.name));
    renderPlanForm(sheet);
    sheet.appendChild(mk('label','','결제방법'));
    const pymSel=sheet.appendChild(el('select'));pymSel.style.cssText='width:100%;padding:13px 14px;border:1px solid var(--bd2);border-radius:10px;background:var(--bg2);color:var(--t1);font-size:15px;';
    PAYMENT_OPTIONS.forEach(v=>{const o=pymSel.appendChild(document.createElement('option'));o.value=v;o.textContent=v;if(v===mb.payment)o.selected=true;});
    sheet.appendChild(mk('label','','결제일자'));
    const rdi2=sheet.appendChild(el('input'));rdi2.type='date';
    const _nd2=new Date();rdi2.value=_nd2.getFullYear()+'-'+String(_nd2.getMonth()+1).padStart(2,'0')+'-'+String(_nd2.getDate()).padStart(2,'0');
    rdi2.style.cssText='width:100%;padding:13px 14px;border:1px solid var(--bd2);border-radius:10px;background:var(--bg2);color:var(--t1);font-size:15px;';
    const btns=sheet.appendChild(el('div','shbtns'));
    btns.appendChild(mk('button','shno','취소')).onclick=close;
    btns.appendChild(mk('button','shok','추가')).onclick=()=>{
      const plan=getPlanFormValue();if(!plan){alert('수업권 정보를 입력해주세요.');return;}

function dlCSV(tid,year,month){
  const tr=trainers.find(t=>t.id===tid);if(!tr)return;
  const msl=slots.filter(s=>{if(s.trainerId!==tid)return false;const p=s.date.split('-').map(Number);return p[0]===year&&p[1]===month;}).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  let csv='\uFEFF트레이너: '+tr.name+'\n'+year+'년 '+month+'월\n\n날짜,요일,시간,회원명,일정유형,권종,단가(원),잔여횟수,메모\n';
  let total=0;
  msl.forEach(s=>{
    const p=s.date.split('-').map(Number);const d=new Date(p[0],p[1]-1,p[2]);const dow=['일','월','화','수','목','금','토'][d.getDay()];
    const mb=s.memberId?members.find(m=>m.id===s.memberId):null;
    const plan=s.planId&&mb?(mb.plans||[]).find(x=>x.id===s.planId):null;
    const price=plan&&s.type!=='OT'?plan.pricePerSession:0;total+=price;
    const rem=plan?getPlanRemain(plan):'';
    csv+=s.date+','+dow+','+s.time+','+(mb?mb.name:'')+','+s.type+','+(plan?plan.sessions+'회권':'')+','+(price?price.toLocaleString():'')+','+(rem!==''?rem:'')+','+(s.memo||'')+'\n';
  });
  csv+='\n총 '+msl.length+'회 / 합계: '+total.toLocaleString()+'원\n';
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=tr.name+'_'+year+'년'+month+'월.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function openTrainerOffSheet(trId){

      offDates.forEach(d=>{

      btns.appendChild(mk('button','shok','저장')).onclick=()=>{
        const s=startSel.value,e=endSel.value;

    if(!name||!price){alert('상품명과 금액을 입력해주세요.');return;}
    const prod={
      id:'pr_mob_'+Date.now(),name,price,type:typeS.value,
      sessions:parseInt(sessI.value)||0,
      duration:parseInt(durS.value)||0,
      createdAt:Date.now()
    };
    products.push(prod);
    // PT 수강권이면 packages에도 등록 (기존 모바일 권종 폼 호환)
    if(prod.type==='pt'&&prod.sessions&&prod.duration){
      const pkg={id:'p_mob_'+Date.now(),duration:prod.duration,sessions:prod.sessions,price:prod.price};
      packages.push(pkg);
      prod.fromPkg=pkg.id;
      sv('og10_pkg',packages);
    }
    sv('og10_pr',products);ni.value='';priceI.value='';sessI.value='';renderAdm();
  };

  // 등록된 상품 목록
  ct.appendChild(mk('div','sec','PT 수강권'));
  const ptList=products.filter(p=>p.type==='pt');
  if(!ptList.length){ct.appendChild(mk('div','','등록된 PT 수강권 없음')).style.cssText='color:#555;font-size:13px;padding:4px 0 12px;';}
  ptList.forEach(p=>{
    const card=ct.appendChild(el('div','pkgcard'));
    const info=card.appendChild(el('div'));
    info.appendChild(mk('div','pkginfo',p.name));
    info.appendChild(mk('div','pkgprice',p.price.toLocaleString()+'원'+(p.sessions?' · '+p.sessions+'회':'')));
    card.appendChild(mk('button','pkgdel','삭제')).onclick=()=>{
      if(confirm(p.name+' 삭제?')){
        if(p.fromPkg)packages=packages.filter(x=>x.id!==p.fromPkg);
        products=products.filter(x=>x.id!==p.id);
        sv('og10_pkg',packages);sv('og10_pr',products);renderAdm();
      }
    };
  });

  ct.appendChild(mk('div','sec','헬스 이용권'));
  const msList=products.filter(p=>p.type==='membership');
  if(!msList.length){ct.appendChild(mk('div','','등록된 헬스 이용권 없음')).style.cssText='color:#555;font-size:13px;padding:4px 0 12px;';}
  msList.forEach(p=>{
    const card=ct.appendChild(el('div','pkgcard'));
    const info=card.appendChild(el('div'));
    info.appendChild(mk('div','pkginfo',p.name));
    info.appendChild(mk('div','pkgprice',p.price.toLocaleString()+'원'));
    card.appendChild(mk('button','pkgdel','삭제')).onclick=()=>{
      if(confirm(p.name+' 삭제?')){
        products=products.filter(x=>x.id!==p.id);
        sv('og10_pr',products);renderAdm();
      }
    };
  });
}

function showConfirm(msg,onOk,onCancel){
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;';
  const box=ov.appendChild(document.createElement('div'));
  box.style.cssText='background:#161b22;border:1px solid #30363d;border-radius:16px;padding:28px 24px 22px;width:100%;max-width:320px;box-shadow:0 20px 60px rgba(0,0,0,.7);';
  const txt=box.appendChild(document.createElement('div'));
  txt.style.cssText='font-size:15px;font-weight:600;color:#e6edf3;margin-bottom:22px;line-height:1.5;word-break:keep-all;';
  txt.textContent=msg;
  const row=box.appendChild(document.createElement('div'));
  row.style.cssText='display:flex;gap:10px;justify-content:flex-end;';
  const cancelBtn=row.appendChild(document.createElement('button'));
  cancelBtn.textContent='취소';
  cancelBtn.style.cssText='padding:9px 20px;border-radius:9px;border:1px solid #30363d;background:transparent;color:#8b949e;font-size:14px;font-weight:600;cursor:pointer;';
  const okBtn=row.appendChild(document.createElement('button'));
  okBtn.textContent='확인';
  okBtn.style.cssText='padding:9px 24px;border-radius:9px;border:none;background:#818cf8;color:#fff;font-size:14px;font-weight:700;cursor:pointer;';
  function close(){document.body.removeChild(ov);}
  cancelBtn.onclick=()=>{close();if(onCancel)onCancel();};
  okBtn.onclick=()=>{close();onOk();};
  ov.onclick=(e)=>{if(e.target===ov){close();if(onCancel)onCancel();}};
  document.body.appendChild(ov);
  okBtn.focus();
}

function renderAdmAvail(ct){
  const db2=firebase.firestore();
  const dayKeys=['mon','tue','wed','thu','fri','sat','sun'];
  const dayLabels=['월','화','수','목','금','토','일'];

  function normRanges(v){
    if(v===false)return false;
    if(v===undefined||v===null)return [];
    if(Array.isArray(v))return v;
    if(v&&v.start)return [v];
    return [];
  }

  let saveTimer=null;
  function saveAvail(w,wo){
    clearTimeout(saveTimer);
    saveTimer=setTimeout(()=>{
      const finalWh={};dayKeys.forEach(dk=>{const n=normRanges(w[dk]);finalWh[dk]=(n===false)?false:(n||[]);});
      db2.collection('og10_avail').doc(selTrId).set({workHours:finalWh,weeklyOff:wo})
        .then(()=>{const t=document.createElement('div');t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(22,30,40,.97);color:#e6edf3;padding:10px 22px;border-radius:20px;font-size:14px;font-weight:600;z-index:9999;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.5);';t.textContent='✅ 자동 저장됐습니다.';document.body.appendChild(t);setTimeout(()=>t.remove(),2000);})
        .catch(()=>{const t=document.createElement('div');t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(248,113,113,.95);color:#fff;padding:10px 22px;border-radius:20px;font-size:14px;font-weight:600;z-index:9999;pointer-events:none;';t.textContent='❌ 저장 실패';document.body.appendChild(t);setTimeout(()=>t.remove(),2500);});
    },800);
  }

  function isInRanges(time,ranges){
    if(!ranges||ranges===false||!ranges.length)return false;
    const[th,tm]=time.split(':').map(Number),tMin=th*60+tm;
    return ranges.some(r=>{const[sh,sm]=r.start.split(':').map(Number),[eh,em]=r.end.split(':').map(Number);return tMin>=sh*60+sm&&tMin<eh*60+em;});
  }
  function timeOpts(sel,val){
    sel.innerHTML='';
    for(let h=6;h<=23;h++){for(let m=0;m<60;m+=30){const t=p2(h)+':'+p2(m);const o=sel.appendChild(document.createElement('option'));o.value=t;o.textContent=t;if(t===val)o.selected=true;}}
  }

  // ── 즉시 헤더 표시 (renderAdmBookings 패턴) ──
  ct.appendChild(mk('div','sec','예약 설정'));

  if(!trainers.length){
    ct.appendChild(mk('div','sal-empty','직원 탭에서 담당자를 먼저 등록해주세요.'));
    return;
  }

  let selTrId=trainers[0].id;

  function buildAll(){
    if(!ct.isConnected)return;  // 이미 DOM에서 제거된 경우 무시
    ct.innerHTML='';
    ct.appendChild(mk('div','sec','예약 설정'));

    // 담당자 선택
    const trLbl=ct.appendChild(mk('div','','담당자 선택'));
    trLbl.style.cssText='font-size:11px;color:var(--t3);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;';
    const trRow=ct.appendChild(el('div'));
    trRow.style.cssText='display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;';
    trainers.forEach(tr=>{
      const on=tr.id===selTrId;
      const btn=trRow.appendChild(mk('button','',tr.name));
      btn.style.cssText='padding:8px 18px;border-radius:10px;font-size:13px;font-weight:700;border:1.5px solid;cursor:pointer;'
        +'background:'+(on?'var(--pr)':'var(--bg2)')+';color:'+(on?'#fff':'var(--t2)')+';border-color:'+(on?'var(--pr)':'var(--bd)')+';';
      btn.onclick=()=>{selTrId=tr.id;loadAvail();};
    });

    const secDiv=ct.appendChild(el('div'));
    const selTrName=(trainers.find(t=>t.id===selTrId)||{name:''}).name;
    secDiv.textContent=(selTrName?selTrName+' ':'')+'예약 설정';
    secDiv.style.cssText='font-size:11px;color:var(--t3);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--bd);';

    ct.appendChild(mk('div','','불러오는 중...')).style.cssText='padding:24px 0;text-align:center;color:#666;font-size:13px;';
  }

  function renderBody(wh,weeklyOff,selDay){
    if(!ct.isConnected)return;
    ct.innerHTML='';
    ct.appendChild(mk('div','sec','예약 설정'));

    // 담당자 버튼
    const trLbl=ct.appendChild(mk('div','','담당자 선택'));
    trLbl.style.cssText='font-size:11px;color:var(--t3);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;';
    const trRow=ct.appendChild(el('div'));
    trRow.style.cssText='display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;';
    trainers.forEach(tr=>{
      const on=tr.id===selTrId;
      const btn=trRow.appendChild(mk('button','',tr.name));
      btn.style.cssText='padding:8px 18px;border-radius:10px;font-size:13px;font-weight:700;border:1.5px solid;cursor:pointer;'
        +'background:'+(on?'var(--pr)':'var(--bg2)')+';color:'+(on?'#fff':'var(--t2)')+';border-color:'+(on?'var(--pr)':'var(--bd)')+';';
      btn.onclick=()=>{selTrId=tr.id;loadAvail();};
    });

    const secDiv=ct.appendChild(el('div'));
    const selTrName=(trainers.find(t=>t.id===selTrId)||{name:''}).name;
    secDiv.textContent=(selTrName?selTrName+' ':'')+'예약 설정';
    secDiv.style.cssText='font-size:11px;color:var(--t3);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--bd);';

    const isDayOff=wh[selDay]===false;
    const selDayLabel=dayLabels[dayKeys.indexOf(selDay)];

    // 요일별 근무시간 제목
    ct.appendChild(mk('div','','요일별 근무 시간')).style.cssText='font-size:13px;font-weight:700;color:var(--t1);margin-bottom:10px;';

    // 요일▼ + 하루 전체 OFF
    const row1=ct.appendChild(el('div'));
    row1.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:10px;';
    const daySel=row1.appendChild(el('select'));
    daySel.style.cssText='flex:1;padding:10px 12px;border-radius:10px;border:1.5px solid var(--bd);background:var(--bg2);color:var(--t1);font-size:14px;font-weight:700;';
    dayKeys.forEach((dk,i)=>{const o=daySel.appendChild(document.createElement('option'));o.value=dk;o.textContent=dayLabels[i]+'요일';if(dk===selDay)o.selected=true;});
    daySel.onchange=()=>renderBody(wh,weeklyOff,daySel.value);

    const dayOffBtn=row1.appendChild(mk('button','',(isDayOff?'✓ ':'')+'하루 전체 OFF'));
    dayOffBtn.style.cssText='padding:10px 14px;border-radius:10px;font-size:13px;font-weight:700;border:1.5px solid;cursor:pointer;white-space:nowrap;flex-shrink:0;'
      +'background:'+(isDayOff?'rgba(248,113,113,.18)':'var(--bg2)')+';color:'+(isDayOff?'#f87171':'var(--t2)')+';border-color:'+(isDayOff?'rgba(248,113,113,.5)':'var(--bd)')+';';
    dayOffBtn.onclick=()=>{wh[selDay]=isDayOff?[]:false;renderBody(wh,weeklyOff,selDay);saveAvail(wh,weeklyOff);};

    // 시간범위 off설정
    const row2=ct.appendChild(el('div'));
    row2.style.cssText='display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap;';
    const ss='flex:1;min-width:72px;padding:10px 6px;border-radius:10px;border:1.5px solid var(--bd);background:var(--bg2);color:var(--t1);font-size:13px;text-align:center;';
    const offSSel=row2.appendChild(el('select'));offSSel.style.cssText=ss;timeOpts(offSSel,'09:00');
    row2.appendChild(mk('span','','~')).style.cssText='color:var(--t3);font-size:15px;font-weight:700;flex-shrink:0;';
    const offESel=row2.appendChild(el('select'));offESel.style.cssText=ss;timeOpts(offESel,'21:00');
    const offBtn=row2.appendChild(mk('button','','off설정'));
    offBtn.style.cssText='padding:10px 16px;border-radius:10px;font-size:13px;font-weight:700;border:1.5px solid rgba(248,113,113,.4);background:rgba(248,113,113,.15);color:#f87171;cursor:pointer;white-space:nowrap;flex-shrink:0;';
    offBtn.onclick=()=>{
      const[sh,sm]=offSSel.value.split(':').map(Number),[eh,em]=offESel.value.split(':').map(Number);
      if(sh*60+sm>=eh*60+em){showConfirm('종료 시간이 시작 시간보다 늦어야 합니다.',()=>{});return;}
      weeklyOff[selDay]=weeklyOff[selDay]||[];
      for(let m2=sh*60+sm;m2<eh*60+em;m2+=30){const t=p2(Math.floor(m2/60))+':'+p2(m2%60);if(!weeklyOff[selDay].includes(t))weeklyOff[selDay].push(t);}
      renderBody(wh,weeklyOff,selDay);saveAvail(wh,weeklyOff);
    };

    // off 태그
    const offSlots=(weeklyOff[selDay]||[]).slice().sort();
    const offGroups=[];
    offSlots.forEach(t=>{
      const[h,m]=t.split(':').map(Number),min=h*60+m;
      const last=offGroups[offGroups.length-1];
      if(last&&min===last.endMin){last.endMin=min+30;last.slots.push(t);}
      else offGroups.push({start:t,endMin:min+30,slots:[t]});
    });
    const tagWrap=ct.appendChild(el('div'));
    tagWrap.style.cssText='display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;min-height:24px;';
    const ts='display:inline-flex;align-items:center;gap:6px;background:rgba(248,113,113,.18);color:#f87171;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;';
    const xs='cursor:pointer;font-size:16px;line-height:1;opacity:.8;';
    if(isDayOff){
      const tag=tagWrap.appendChild(el('div'));tag.style.cssText=ts;
      tag.appendChild(mk('span','',selDayLabel+'요일 (하루 전체 OFF)'));
      const x=tag.appendChild(mk('span','','×'));x.style.cssText=xs;
      x.onclick=()=>{wh[selDay]=[];renderBody(wh,weeklyOff,selDay);saveAvail(wh,weeklyOff);};
    }
    offGroups.forEach(g=>{
      const endStr=p2(Math.floor(g.endMin/60))+':'+p2(g.endMin%60);
      const tag=tagWrap.appendChild(el('div'));tag.style.cssText=ts;
      tag.appendChild(mk('span','',selDayLabel+'요일 ('+g.start+'~'+endStr+')'));
      const x=tag.appendChild(mk('span','','×'));x.style.cssText=xs;
      x.onclick=()=>{weeklyOff[selDay]=(weeklyOff[selDay]||[]).filter(t=>!g.slots.includes(t));renderBody(wh,weeklyOff,selDay);saveAvail(wh,weeklyOff);};
    });
    if(!isDayOff&&!offGroups.length)
      tagWrap.appendChild(mk('div','','off설정된 시간 없음')).style.cssText='font-size:12px;color:#555;padding:4px 0;';

    // 주간 그리드
    ct.appendChild(mk('div','','주간 예약 가능 시간 그리드')).style.cssText='font-size:13px;font-weight:700;color:var(--t1);margin-bottom:4px;';
    ct.appendChild(mk('div','','초록=예약가능  빨간=off설정  회색=근무외  셀 클릭으로 on/off')).style.cssText='font-size:11px;color:#555;margin-bottom:8px;';
    const gWrap=ct.appendChild(el('div'));
    gWrap.style.cssText='overflow-x:auto;margin-bottom:16px;border:1px solid var(--bd);border-radius:10px;-webkit-overflow-scrolling:touch;';
    const grid=gWrap.appendChild(el('div'));
    grid.style.cssText='display:grid;grid-template-columns:38px repeat(7,1fr);min-width:320px;';
    grid.appendChild(el('div')).style.cssText='height:26px;background:var(--bg2);border-bottom:1px solid var(--bd);border-radius:9px 0 0 0;';
    dayKeys.forEach((dk,i)=>{
      const h2=grid.appendChild(mk('div','',dayLabels[i]));
      h2.style.cssText='height:26px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:'+(wh[dk]===false?'#333':'var(--t2)')+';border-bottom:1px solid var(--bd);border-left:1px solid var(--bd);background:var(--bg2);'+(i===6?'border-radius:0 9px 0 0;':'');
    });
    TIMES.forEach(time=>{
      const half=time.endsWith(':30');
      const tl=grid.appendChild(el('div'));
      tl.style.cssText='height:30px;display:flex;align-items:center;justify-content:flex-end;padding-right:3px;font-size:9px;color:#444;border-bottom:1px solid '+(half?'#1a1a1a':'#252525')+';';
      tl.textContent=half?'':time;
      dayKeys.forEach(dk=>{
        const cell=grid.appendChild(el('div'));
        const doff=wh[dk]===false;
        const rng=normRanges(wh[dk])||[];
        const inR=!doff&&(rng.length===0||isInRanges(time,rng));
        const moff=(weeklyOff[dk]||[]).includes(time);
        cell.style.cssText='height:30px;border-bottom:1px solid '+(half?'#1a1a1a':'#252525')+';border-left:1px solid #1e1e1e;background:'+(doff?'#111':!inR?'#141414':moff?'rgba(248,113,113,.35)':'rgba(74,222,128,.12)')+';cursor:'+((!doff&&inR)?'pointer':'default')+';box-sizing:border-box;';
        if(!doff&&inR){
          const[th2,tm2]=time.split(':').map(Number),nm=(th2*60+tm2)+30,nt=p2(Math.floor(nm/60))+':'+p2(nm%60);
          cell.onclick=()=>{
            if(moff){showConfirm(time+'~'+nt+' off 해제하시겠습니까?',()=>{weeklyOff[dk]=(weeklyOff[dk]||[]).filter(t=>t!==time);renderBody(wh,weeklyOff,selDay);saveAvail(wh,weeklyOff);});}
            else{showConfirm(time+'~'+nt+' off설정하시겠습니까?',()=>{(weeklyOff[dk]=weeklyOff[dk]||[]).push(time);renderBody(wh,weeklyOff,selDay);saveAvail(wh,weeklyOff);});}
          };
        }
      });
    });

  }

  function loadAvail(){
    buildAll();
    db2.collection('og10_avail').doc(selTrId).get().then(doc=>{
      if(!ct.isConnected)return;
      const d=doc.exists?doc.data():{};
      const rawWh=d.workHours||{};
      const wh={};dayKeys.forEach(dk=>{const n=normRanges(rawWh[dk]);wh[dk]=(n===false)?false:(n||[]);});
      const weeklyOff=JSON.parse(JSON.stringify(d.weeklyOff||{}));
      renderBody(wh,weeklyOff,'mon');
    }).catch(()=>{
      if(!ct.isConnected)return;
      const wh={};dayKeys.forEach(dk=>{wh[dk]=[];});
      renderBody(wh,{},'mon');
    });
  }
  loadAvail();
}

function markAllRead(){
  if(!curUser)return;

// ── 매출 ──────────────────────────────────────────────────────────────────
let salPeriod='daily';
let salMode='sales';
const salSubTabOrder=['sales','bypkg','bypay','sessions','refund'];
let salSubTab='sales'; // 매출내역|sessions|bypkg|bypay|refund
let mobSesType=''; // 세션로그 유형 필터 (mobile)
let salStartDate='';let salEndDate='';let salTrainer='';let salSearch='';

function initSalDates(){
  const now=new Date();const y=now.getFullYear(),m=now.getMonth();
  if(!salStartDate)salStartDate=y+'-'+String(m+1).padStart(2,'0')+'-01';
  if(!salEndDate){const lastDay=new Date(y,m+1,0).getDate();salEndDate=y+'-'+String(m+1).padStart(2,'0')+'-'+String(lastDay).padStart(2,'0');}
}
function parseSalDate(str){const p=str.split('-').map(Number);return new Date(p[0],p[1]-1,p[2]);}
function getSalLabel(dateStr){
  const d=parseSalDate(dateStr);
  if(salPeriod==='daily')return(d.getMonth()+1)+'/'+(d.getDate());
  if(salPeriod==='weekly')return(d.getMonth()+1)+'월'+getWeekNum(d)+'주';
  const p=dateStr.split('-');return p[0]+'.'+(+p[1]);
}
function getGroupKey(dateStr){
  if(salPeriod==='daily')return dateStr;
  if(salPeriod==='weekly'){const d=parseSalDate(dateStr);return d.getFullYear()+'-'+(d.getMonth()+1)+'-w'+getWeekNum(d);}
  const p=dateStr.split('-');return p[0]+'-'+p[1];
}

function computeSales(){
  initSalDates();
  const sd=parseSalDate(salStartDate),ed=parseSalDate(salEndDate);ed.setHours(23,59,59);
  const diffDays=Math.ceil((ed-sd)/(1000*60*60*24));
  salPeriod=diffDays<=31?'daily':diffDays<=90?'weekly':'monthly';
  const rows=[];
  if(salMode==='sales'){
    members.forEach(mb=>{
      if(salTrainer&&mb.trainerId!==salTrainer)return;
      if(salSearch&&!mb.name.includes(salSearch))return;
      const tr=trainers.find(t=>t.id===mb.trainerId);
      (mb.plans||[]).forEach(plan=>{
        const pDate=new Date(plan.addedAt||0);if(pDate<sd||pDate>ed)return;
        const ds=pDate.getFullYear()+'-'+String(pDate.getMonth()+1).padStart(2,'0')+'-'+String(pDate.getDate()).padStart(2,'0');
        rows.push({date:ds,time:p2(pDate.getHours())+':'+p2(pDate.getMinutes()),trainerId:mb.trainerId,trainerName:tr?tr.name:'?',memberName:mb.name,phone:mb.phone||'',type:plan.duration+'분',planLabel:plan.sessions+'회권',revenue:plan.totalPrice||0,groupKey:getGroupKey(ds),inflow:mb.inflow||'',payment:plan.paymentMethod||mb.payment||''});
      });
    });
  } else {
    slots.forEach(s=>{
      if(s.type==='OT'||s.type==='상담')return;if(!s.memberId)return;
      if(salTrainer&&s.trainerId!==salTrainer)return;
      const parts=s.date.split('-').map(Number);const slotDate=new Date(parts[0],parts[1]-1,parts[2]);
      if(slotDate<sd||slotDate>ed)return;
      const mb=members.find(m=>m.id===s.memberId);const plan=mb?(mb.plans||[]).find(p=>p.id===s.planId):null;
      if(salSearch&&mb&&!mb.name.includes(salSearch))return;
      const tr=trainers.find(t=>t.id===s.trainerId);
      const planLabel=plan?(plan.sessions+'회권'):(s.type||'-');
      const revenue=plan?(plan.pricePerSession||0):0;
      rows.push({date:s.date,time:s.time,trainerId:s.trainerId,trainerName:tr?tr.name:'?',memberName:mb?mb.name:'?',type:s.type,planLabel,revenue,groupKey:getGroupKey(s.date)});
    });
  }
  // ── 환불 내역 마이너스 추가 (수업권판매 모드에서만) ────────────────────
  if(salMode==='sales'){
    refunds.forEach(r=>{
      if(!r.processedAt)return;
      const rDate=new Date(r.processedAt);if(rDate<sd||rDate>ed)return;
      const ds=rDate.getFullYear()+'-'+String(rDate.getMonth()+1).padStart(2,'0')+'-'+String(rDate.getDate()).padStart(2,'0');
      const tm=String(rDate.getHours()).padStart(2,'0')+':'+String(rDate.getMinutes()).padStart(2,'0');
      rows.push({date:ds,time:tm,trainerId:'',trainerName:'-',memberName:r.memberName,phone:r.phone||'',
        type:r.type==='transfer'?'양도':'환불',planLabel:r.planName||'-',revenue:-(r.refundAmount||0),
        groupKey:getGroupKey(ds),inflow:'',payment:'',isRefund:true});
    });
  }
  rows.sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  const grouped={};
  rows.forEach(r=>{if(!grouped[r.groupKey])grouped[r.groupKey]={key:r.groupKey,revenue:0,count:0,label:getSalLabel(r.date)};grouped[r.groupKey].revenue+=r.revenue;grouped[r.groupKey].count++;});
  const totalRevenue=rows.reduce((s,r)=>s+r.revenue,0);
  const totalSessions=rows.length;
  const uniqueMembers=new Set(rows.filter(r=>!r.isRefund).map(r=>r.memberName)).size;
  return{rows,grouped,totalRevenue,totalSessions,uniqueMembers};
}

function drawSalChart(canvas,keys,grouped){
  const W=canvas.width=canvas.offsetWidth||300;const H=canvas.height=180;const ctx=canvas.getContext('2d');if(!ctx)return;
  const vals=keys.map(k=>grouped[k].revenue);const maxVal=Math.max(...vals,1);
  const pad={t:16,r:10,b:36,l:56};const cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  const barW=Math.max(4,Math.min(32,cW/keys.length*0.6));const step=cW/keys.length;
  ctx.fillStyle='#1a1a1a';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#2a2a2a';ctx.lineWidth=1;
  [0,.25,.5,.75,1].forEach(p=>{const y=pad.t+cH*(1-p);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.fillStyle='#555';ctx.font='9px sans-serif';ctx.textAlign='right';const lv=Math.round(maxVal*p);ctx.fillText(lv>=10000?(lv/10000).toFixed(1)+'만':''+lv,pad.l-4,y+3);});
  keys.forEach((k,i)=>{const v=grouped[k].revenue;const barH=cH*(v/maxVal);const x=pad.l+i*step+(step-barW)/2;const y=pad.t+cH-barH;const grad=ctx.createLinearGradient(0,y,0,y+barH);grad.addColorStop(0,'#ab47bc');grad.addColorStop(1,'#6a1b9a');ctx.fillStyle=grad;ctx.beginPath();if(ctx.roundRect)ctx.roundRect(x,y,barW,barH,3);else ctx.rect(x,y,barW,barH);ctx.fill();if(barH>20){ctx.fillStyle='#fff';ctx.font='bold 9px sans-serif';ctx.textAlign='center';const txt=v>=10000?(v/10000).toFixed(0)+'만':''+v;ctx.fillText(txt,x+barW/2,y+12);}});
  ctx.fillStyle='#666';ctx.font='10px sans-serif';ctx.textAlign='center';
  const maxLabels=Math.floor(cW/28);const skip=Math.ceil(keys.length/maxLabels);
  keys.forEach((k,i)=>{if(i%skip!==0&&i!==keys.length-1)return;const x=pad.l+i*step+step/2;ctx.fillText(grouped[k].label,x,H-pad.b+14);});
  ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,H-pad.b);ctx.lineTo(W-pad.r,H-pad.b);ctx.stroke();
}

      const i=p.appendChild(el('input'));i.type='text';i.id='pf-p';i.placeholder='예: 450,000';i.style.cssText=iSt;i.oninput=function(){this.value=fmtMoney(this.value);};
    } else if(match.length===1){
      // 자동 채워지지만 직접 수정 가능
      const i=p.appendChild(el('input'));i.type='text';i.id='pf-p';i.style.cssText=iSt;
      i.value=fmtMoney(match[0].price);
      i.oninput=function(){this.value=fmtMoney(this.value);};
      const hint=p.appendChild(mk('div','','패키지 기준가 · 직접 수정 가능'));
      hint.style.cssText='font-size:11px;color:#555;margin-top:4px;';
    } else {
      const sel=p.appendChild(el('select'));sel.id='pf-p';sel.style.cssText=iSt;
      match.forEach(x=>{const o=sel.appendChild(document.createElement('option'));o.value=x.price;o.textContent=fmtMoney(x.price)+'원';});
    }
  }
  dsel.onchange=buildSess;buildSess();
}

function getPlanFormValue(){
  const dsel=document.getElementById('pf-d');const se=document.getElementById('pf-s');const pe=document.getElementById('pf-p');
  if(!dsel||!se||!pe)return null;
  const duration=parseInt(dsel.value);const sessions=parseInt(se.value)||0;const totalPrice=parseMoney(pe.value);
  if(!sessions||!totalPrice)return null;
  return{duration,sessions,totalPrice,pricePerSession:Math.round(totalPrice/sessions),addedAt:Date.now()};
}

function dlSalesCSV(rows,total){
  const isSes=salMode==='sessions';
  const trName=salTrainer?(trainers.find(t=>t.id===salTrainer)||{}).name||'':'전체';
  if(typeof XLSX==='undefined'){alert('잠시 후 다시 시도해주세요.');return;}
  const wb=XLSX.utils.book_new();
  const titleStr='TheLine CRM 매출 내역 ('+(isSes?'세션로그':'수업권 판매')+')';
  const periodStr='기간: '+salStartDate+' ~ '+salEndDate+'  /  트레이너: '+trName;
  const wsData=[];
  wsData.push([null,null,null,null,null,null,null]);
  wsData.push([null,titleStr,null,null,null,null,null]);
  wsData.push([null,periodStr,null,null,null,null,null]);
  wsData.push([null,null,null,null,null,null,null]);
  wsData.push(isSes?[null,'계약일','회원명','세션','계약료','세션단가','수업료']:[null,'등록일','트레이너','회원명','수업시간','수업권','결제금액']);
  rows.forEach(r=>{
    if(isSes){
      const mb=members.find(m=>m.name===r.memberName&&m.trainerId===r.trainerId);
      const plan=mb?(mb.plans||[]).find(p=>(p.sessions+'회권')===r.planLabel):null;
      wsData.push([null,r.date,r.memberName,plan?plan.sessions:0,plan?plan.totalPrice:0,r.revenue,r.revenue]);
    } else {wsData.push([null,r.date,r.trainerName,r.memberName,r.phone||'',r.inflow||'',r.payment||'',r.planLabel,r.revenue||0]);}
  });
  wsData.push([null,null,null,null,null,null,null]);
  wsData.push([null,null,null,null,null,'합계',total]);
  wsData.push([null,null,null,null,null,null,null]);
  wsData.push([null,'트레이너별 요약',null,null,null,null,null]);
  wsData.push([null,'트레이너','수업 수','합계',null,null,null]);
  const byTr={};rows.forEach(r=>{if(!byTr[r.trainerName])byTr[r.trainerName]={cnt:0,sum:0};byTr[r.trainerName].cnt++;byTr[r.trainerName].sum+=r.revenue;});
  Object.entries(byTr).forEach(([nm,d])=>wsData.push([null,nm,d.cnt,d.sum,null,null,null]));
  const ws=XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols']=[{wch:2},{wch:14},{wch:12},{wch:10},{wch:14},{wch:12},{wch:12}];
  ws['!merges']=[{s:{r:1,c:1},e:{r:1,c:6}},{s:{r:2,c:1},e:{r:2,c:6}}];
  ws['!autofilter']={ref:'B5:G5'};
  XLSX.utils.book_append_sheet(wb,ws,isSes?'세션로그':'수업권판매');
  XLSX.writeFile(wb,(isSes?'세션로그_':'수업권판매_')+salStartDate+'_'+salEndDate+'.xlsx');
}

        +'<span style="font-size:12px;font-weight:700;color:#e2e8f0;min-width:36px;text-align:right;">'+v+'명</span>';
    });
  });

  // ── 오늘 일정 ──
  const todayList=slots.filter(s=>s.date===todayStr).sort((a,b)=>a.time.localeCompare(b.time));
  const schDiv=hp.appendChild(document.createElement('div'));
  schDiv.style.cssText='margin:0 16px 14px;';
  schDiv.innerHTML='<div style="font-size:11px;font-weight:700;color:#4a5068;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;">오늘 일정</div>';
  if(!todayList.length){
    schDiv.innerHTML+='<div style="font-size:13px;color:#2a2d45;text-align:center;padding:20px;background:#111318;border:1px solid #1e2026;border-radius:12px;">오늘 등록된 일정이 없습니다</div>';
  } else {
    todayList.slice(0,5).forEach(s=>{
      const tr3=trainers.find(t=>t.id===s.trainerId);const mb=s.memberId?members.find(m=>m.id===s.memberId):null;
      const col=tr3?getTrainerColor(tr3):{bg:'#1e2026',text:'#8892aa',dot:'#8892aa'};

        +'<div style="flex:1;min-width:0;"><div style="font-size:12px;font-weight:700;color:#c4cde8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+(mb?mb.name:(s.memo||s.type||'일정'))+'</div>'
        +'<div style="font-size:11px;color:#4a5068;">'+(tr3?tr3.name:'')+'  '+(s.type||'')+'</div></div>'
        +'<div style="font-size:13px;font-weight:700;color:#e2e8f0;flex-shrink:0;">'+s.time.slice(0,5)+'</div>';
      item.onclick=()=>openSlotDetail(s.id);
    });
    if(todayList.length>5)schDiv.innerHTML+='<div style="font-size:12px;color:#3a3f58;text-align:center;padding:8px;">+ '+(todayList.length-5)+'건 더보기</div>';

  // ── 만료임박 ──
  if(expiringMembers>0){
    const expDiv=hp.appendChild(document.createElement('div'));expDiv.style.cssText='margin:0 16px 14px;';
    expDiv.innerHTML='<div style="font-size:11px;font-weight:700;color:#f6ad55;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;">⚠ 만료임박 회원</div>';
    members.filter(m=>pcMbStatus&&pcMbStatus(m)==='expiring').forEach(m=>{
      const item=expDiv.appendChild(document.createElement('div'));
      item.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#111318;border:1px solid rgba(246,173,85,.2);border-radius:10px;margin-bottom:8px;';
      const rem=Math.max(0,...(m.plans||[]).map(p=>getPlanRemain(p)));
      item.innerHTML='<div style="font-size:14px;font-weight:700;color:#e2e8f0;">'+m.name+'</div><div style="font-size:12px;color:#f6ad55;">잔여 '+rem+'회</div>';
    });
  }
}

let pcSalStart='';let pcSalEnd='';let pcSalTr='';

const PC_NAV=[

  {id:'settings',label:'센터설정',icon:'',subs:[{id:'staff',label:'직원관리'},{id:'pkg',label:'상품관리'},{id:'book',label:'예약관리'},{id:'avail',label:'예약설정'}]},
];
function _mk(tag,cls,txt){const e=document.createElement(tag);if(cls)e.className=cls;if(txt!==undefined)e.textContent=txt;return e;}
function initPcNav(){
  const nav=document.getElementById('pc-nav');if(!nav)return;nav.innerHTML='';
  PC_NAV.forEach(item=>{
    const el=nav.appendChild(_mk('div','pc-nav-item'+(pcV===item.id?' on':'')));
    el.innerHTML=item.icon?'<span class="ni">'+item.icon+'</span>'+item.label:item.label;
    el.onclick=()=>{pcV=item.id;pcSV=item.subs?item.subs[0].id:'';initPcNav();renderPcContent();};
    if(item.subs&&pcV===item.id){
      const sub=nav.appendChild(_mk('div','pc-nav-sub'));
      item.subs.forEach(s=>{const si=sub.appendChild(_mk('div','pc-nav-sub-item'+(pcSV===s.id?' on':''),s.label));si.onclick=e=>{e.stopPropagation();pcSV=s.id;initPcNav();renderPcContent();};});
    }
  });
}
function updatePcUser(){
  const av=document.getElementById('pc-uav'),nm=document.getElementById('pc-unm'),rl=document.getElementById('pc-url');if(!av)return;
  if(curUser){const tr=trainers.find(t=>t.id===curUser);if(tr){av.textContent=initials(tr.name);nm.textContent=tr.name;rl.textContent=tr.role;return;}}
  av.textContent='?';nm.textContent='로그인';rl.textContent='클릭하여 로그인';
}
function renderPcContent(){
  const ct=document.getElementById('pc-ct'),ttl=document.getElementById('pc-ttl'),acts=document.getElementById('pc-acts');
  const stbar=document.getElementById('pc-subtabbar');if(!ct)return;ct.innerHTML='';if(acts)acts.innerHTML='';if(stbar){stbar.innerHTML='';stbar.style.display='none';}
  ct.classList.remove('pc-content-anim');void ct.offsetHeight;ct.classList.add('pc-content-anim');
  updatePcUser();
  const nav=PC_NAV.find(n=>n.id===pcV);
  if(ttl)ttl.textContent=nav?nav.label:'홈';
  if(pcV==='home')renderPcHome(ct,acts);
  else if(pcV==='customers'&&pcSV==='consult')renderPcConsult(ct,acts);
  else if(pcV==='customers'&&pcSV==='consult_hist')renderPcConsultHist(ct,acts);
  else if(pcV==='customers')renderPcCust(ct,acts);
  else if(pcV==='calendar')renderPcCal(ct,acts);
  else if(pcV==='sales')renderPcSales(ct,acts);
  else if(pcV==='settings')renderPcSettings(ct,acts);
}
function pcMbStatus(mb){
  const plans=mb.plans||[];if(!plans.length)return'none';
  // membership(헬스이용권): 날짜 기반
  const mPlan=plans.find(p=>p.productType==='membership'&&p.endDate);
  if(mPlan){const rem=Math.ceil((new Date(mPlan.endDate)-new Date())/(1000*60*60*24));if(rem<=0)return'expired';if(rem<=25)return'expiring';return'active';}
  // PT 수업권: 잔여 횟수 기반
  let total=0;plans.forEach(p=>{if(p.productType!=='membership')total+=getPlanRemain(p);});
  if(total>0)return'active';return'expired';
}
function pcSLbl(s){return{active:'활성',expired:'만료',none:'미등록'}[s]||'미등록';}
function pcSCls(s){return{active:'pbs-on',expired:'pbs-off',none:'pbs-no'}[s]||'pbs-no';}
function renderPcHome(ct,acts){

  const expiring=members.filter(m=>{let tot=0;(m.plans||[]).forEach(p=>{tot+=getPlanRemain(p);});return tot>0&&tot<=3;}).length;
  const ar=total>0?Math.round(active/total*100):0,er=total>0?Math.round(expiring/total*100):0,xr=total>0?Math.round(expired/total*100):0;

  const n=new Date(),y=n.getFullYear(),m2=n.getMonth();

  members.forEach(mb=>{(mb.plans||[]).forEach(p=>{const d=new Date(p.addedAt||0);if(d.getFullYear()===y&&d.getMonth()===m2){mRev+=p.totalPrice||0;mCnt++;}});});

// ── PC 모달 유틸 ──────────────────────────────────────────────────────────
function pcModal(builder,opts){
  opts=opts||{};
  const ov=document.createElement('div');
  ov.className='pcm-ov';
  const box=document.createElement('div');
  box.className='pcm-box';
  if(opts.wide)box.style.width='720px';
  if(opts.full)box.style.cssText+=';width:92vw;max-width:1100px;';
  ov.appendChild(box);
  document.body.appendChild(ov);
  const close=()=>{if(document.body.contains(ov))document.body.removeChild(ov);};
  ov.onclick=e=>{if(e.target===ov)close();};
  const xBtn=box.appendChild(document.createElement('button'));
  xBtn.className='pcm-close';xBtn.textContent='×';xBtn.onclick=close;
  builder(box,close);
  return close;
}
function _f(label,required){
  const d=document.createElement('div');d.className='pcm-field';
  const lb=document.createElement('label');lb.className='pcm-label';
  lb.innerHTML=label+(required?'<span class="req"> *</span>':'');
  d.appendChild(lb);return d;
}
function _inp(placeholder,type){
  const i=document.createElement('input');i.className='pcm-input';
  i.placeholder=placeholder||'';i.type=type||'text';return i;
}
function _sel(options){
  const s=document.createElement('select');s.className='pcm-select';
  options.forEach(o=>{const op=document.createElement('option');op.value=o.v!==undefined?o.v:o;op.textContent=o.l||o;s.appendChild(op);});
  return s;
}

function renderPcCust(ct,acts){
  if(acts){const ab=acts.appendChild(Object.assign(document.createElement('button'),{className:'pc-tbtn pri',textContent:'+ 회원 등록'}));ab.onclick=()=>openPcAddMember();}

  subs.forEach(s=>{
    let cnt;
    if(s.id==='all')cnt=members.length;
    else if(s.id==='expiring')cnt=members.filter(m=>{let t=0;(m.plans||[]).forEach(p=>{t+=getPlanRemain(p);});return t>0&&t<=3;}).length;
    else cnt=members.filter(m=>pcMbStatus(m)===s.id).length;
    const tab=sb.appendChild(Object.assign(document.createElement('div'),{className:'pc-stab'+(custSV===s.id?' on':''),textContent:s.label+' '+cnt}));
    tab.onclick=()=>{custSV=s.id;pcDetailMbId=null;renderPcContent();};
  });
  const fb=ct.appendChild(Object.assign(document.createElement('div'),{className:'pc-fbar'}));
  const si=fb.appendChild(document.createElement('input'));si.className='pcm-input';si.style.cssText='width:220px;padding:9px 12px;font-size:13px;';
  si.placeholder='이름 또는 연락처...';si.value=pcCustKw;
  si.oninput=e=>pcCustKw=e.target.value;si.onkeydown=e=>{if(e.key==='Enter')renderPcContent();};
  fb.appendChild(Object.assign(document.createElement('button'),{className:'pc-tbtn',textContent:'조회'})).onclick=()=>renderPcContent();

  let list=members;
  if(custSV==='expiring')list=list.filter(m=>{let t=0;(m.plans||[]).forEach(p=>{t+=getPlanRemain(p);});return t>0&&t<=3;});
  else if(custSV&&custSV!=='all')list=list.filter(m=>pcMbStatus(m)===custSV);
  if(pcCustKw)list=list.filter(m=>m.name.includes(pcCustKw)||(m.phone||'').includes(pcCustKw));

  const tw=ct.appendChild(Object.assign(document.createElement('div'),{className:'pc-tw'}));
  const tbl=tw.appendChild(Object.assign(document.createElement('table'),{className:'pc-tbl'}));
  const thead=tbl.appendChild(document.createElement('thead'));const hr=thead.appendChild(document.createElement('tr'));
  const custHdrs=['No','상태','이름','연락처','성별','담당','유입','수업권','잔여','금액','등록일'];
  const custSortKeys=[null,null,'name','phone','gender','trainer','inflow','plan','remain','totalPaid','regDate'];
  custHdrs.forEach((h,hi)=>{
    const th=hr.appendChild(document.createElement('th'));
    const sk=custSortKeys[hi];
    if(sk){
      th.style.cssText='cursor:pointer;user-select:none;white-space:nowrap;';
      th.innerHTML=h+'<span style="margin-left:4px;opacity:.5;font-size:10px;">'+(pcCustSortCol===sk?(pcCustSortDir===1?'▲':'▼'):'⇅')+'</span>';
      th.onmouseenter=()=>{th.style.color='#c4cde8';};
      th.onmouseleave=()=>{th.style.color='';};
      th.onclick=()=>{
        if(pcCustSortCol===sk){pcCustSortDir*=-1;}else{pcCustSortCol=sk;pcCustSortDir=1;}
        renderPcContent();
      };
    } else { th.textContent=h; }
  });
  const tbody=tbl.appendChild(document.createElement('tbody'));
  // 정렬 적용
  if(pcCustSortCol){
    list.sort((a,b)=>{
      const ga=(mb)=>{
        const tr2b=trainers.find(t=>t.id===mb.trainerId);
        const plans=mb.plans||[];const latest=plans[plans.length-1];
        const rem=plans.reduce((s,p)=>s+getPlanRemain(p),0);
        const totalPaid=plans.reduce((s,p)=>s+(p.totalPrice||0),0);
        const regDate=mb.registeredAt||0;
        return{name:mb.name||'',phone:mb.phone||'',gender:mb.gender||'',
          trainer:tr2b?tr2b.name:'',inflow:mb.inflow||'',
          plan:latest?(latest.productName||latest.duration+'분 '+latest.sessions+'회권'):'',
          remain:rem,totalPaid,regDate};
      };
      const va=ga(a)[pcCustSortCol],vb=ga(b)[pcCustSortCol];
      if(typeof va==='number')return (va-vb)*pcCustSortDir;
      return String(va).localeCompare(String(vb),'ko')*pcCustSortDir;
    });
  }
  list.forEach((mb,i)=>{
    const tr2=trainers.find(t=>t.id===mb.trainerId);const st=pcMbStatus(mb);
    const plans=mb.plans||[];const latest=plans[plans.length-1];const rem=plans.reduce((s,p)=>s+getPlanRemain(p),0);
    const row=tbody.appendChild(document.createElement('tr'));row.style.cursor='pointer';
    row.onclick=()=>openPcMemberDetail(mb.id);
    const totalPaid=(mb.plans||[]).reduce((s,p)=>s+(p.totalPrice||0),0);
    const regDate=mb.registeredAt?new Date(mb.registeredAt).toLocaleDateString('ko-KR',{year:'2-digit',month:'2-digit',day:'2-digit'}):'-';
    [i+1,'',mb.name,mb.phone||'-',mb.gender||'-',tr2?tr2.name:'-',mb.inflow||'-',latest?(latest.productName||latest.duration+'분 '+latest.sessions+'회권'):'-',rem+'회',totalPaid?totalPaid.toLocaleString()+'원':'-',regDate].forEach((v,ci)=>{
      const td=document.createElement('td');if(ci===9)td.style.fontWeight='700';if(ci===1)td.innerHTML='<span class="pbs '+pcSCls(st)+'">'+pcSLbl(st)+'</span>';else td.textContent=v;if(ci===9)td.style.fontWeight='700';row.appendChild(td);
    });
  });
  if(!list.length){const tr3=tbody.appendChild(document.createElement('tr'));const td=document.createElement('td');td.colSpan=11;td.style.cssText='text-align:center;padding:40px;color:#2a2d45;';td.textContent='회원이 없습니다.';tr3.appendChild(td);}
}

    return true; // 전체 (PT + OT + 상담 + 기타)
  }).sort((a,b)=>b.date.localeCompare(a.date)||b.time.localeCompare(a.time));

  // ── 요약 카드 (유형별 건수) ──

  const trSet=new Set(filtered.map(s=>s.trainerId));
  const sg=ct.appendChild(Object.assign(document.createElement('div'),{className:'pc-dash-g4'}));
  [{v:filtered.length+'건',l:'전체 세션'},{v:ptCnt+'건',l:'PT 수업'},{v:otCnt+'건',l:'OT'},{v:conCnt+'건',l:'상담'}].forEach(c=>{

  });

  // ── 테이블 ──
  const tw=ct.appendChild(Object.assign(document.createElement('div'),{className:'pc-tw'}));
  const tbl=tw.appendChild(Object.assign(document.createElement('table'),{className:'pc-tbl'}));

    hr.appendChild(Object.assign(document.createElement('th'),{textContent:h}));
  });

  filtered.forEach((s,idx)=>{
    const tr2=trainers.find(t=>t.id===s.trainerId);
    const mb=s.memberId?members.find(m=>m.id===s.memberId):null;
    const plan=s.planId&&mb?(mb.plans||[]).find(p=>p.id===s.planId):null;
    const rem=plan?getPlanRemain(plan):'-';
    const nameVal=mb?mb.name:(s.memo&&s.type==='상담'?s.memo.split('\n')[0]:s.memo||'-');
    const planMemo=s.type==='상담'?'💬 '+(s.memo||'-'):
                   s.type==='OT'?'OT'+(s.memo?' · '+s.memo:''):
                   plan?(plan.productName||plan.sessions+'회권'):(s.memo||'-');
    const remVal=s.type==='상담'||s.type==='OT'?'-':rem+'';

    const row=tbody.appendChild(document.createElement('tr'));
    // 유형별 색상 강조
    if(s.type==='OT')row.style.cssText='background:rgba(251,191,36,.04);';
    else if(s.type==='상담')row.style.cssText='background:rgba(129,140,248,.04);';

    [s.date,s.time.slice(0,5),tr2?tr2.name:'-',nameVal,s.type||'-',planMemo,remVal].forEach((v,ci)=>{
      const td=row.appendChild(document.createElement('td'));
      td.textContent=v;
      // 유형 컬럼 배지색
      if(ci===4){
        if((s.type||'').includes('수업'))td.style.cssText='color:#3dc87a;font-weight:700;';
        else if(s.type==='OT')td.style.cssText='color:#fbbf24;font-weight:700;';
        else if(s.type==='상담')td.style.cssText='color:#818cf8;font-weight:700;';
      }
    });
  });
  if(!filtered.length){
    const tr3=tbody.appendChild(document.createElement('tr'));
    const td=tr3.appendChild(document.createElement('td'));
    td.colSpan=7;td.style.cssText='text-align:center;padding:40px;color:#2a2d45;font-size:13px;';
    td.textContent='해당 기간 세션 기록이 없습니다.';
  }
}

// ── 캘린더 ──────────────────────────────────────────────────────────────
function renderPcCal(ct,acts){
  if(acts){acts.appendChild(Object.assign(document.createElement('button'),{className:'pc-tbtn pri',textContent:'+ 일정 추가'})).onclick=()=>openPcAddSchedule();}
  const hdr=ct.appendChild(Object.assign(document.createElement('div'),{style:'display:flex;align-items:center;gap:12px;margin-bottom:16px;'}));
  hdr.appendChild(Object.assign(document.createElement('button'),{className:'pc-tbtn',textContent:'◀'})).onclick=()=>{pcCalM--;if(pcCalM<0){pcCalM=11;pcCalY--;}renderPcContent();};
  const ttlDiv=hdr.appendChild(Object.assign(document.createElement('div'),{}));ttlDiv.style.cssText='font-size:18px;font-weight:800;flex:1;';ttlDiv.textContent=pcCalY+'년 '+(pcCalM+1)+'월';
  hdr.appendChild(Object.assign(document.createElement('button'),{className:'pc-tbtn',textContent:'오늘'})).onclick=()=>{const n=new Date();pcCalY=n.getFullYear();pcCalM=n.getMonth();renderPcContent();};
  hdr.appendChild(Object.assign(document.createElement('button'),{className:'pc-tbtn',textContent:'▶'})).onclick=()=>{pcCalM++;if(pcCalM>11){pcCalM=0;pcCalY++;}renderPcContent();};
  const grid=ct.appendChild(Object.assign(document.createElement('div'),{className:'pc-cal-g'}));
  ['월','화','수','목','금','토','일'].forEach(d=>grid.appendChild(Object.assign(document.createElement('div'),{className:'pc-cal-hdr',textContent:d})));
  const firstDow=new Date(pcCalY,pcCalM,1).getDay();const startOff=firstDow===0?6:firstDow-1;
  const dim=new Date(pcCalY,pcCalM+1,0).getDate();const today=new Date();
  for(let i=0;i<startOff;i++){const c=grid.appendChild(Object.assign(document.createElement('div'),{className:'pc-cal-cell'}));c.style.background='#0a0c10';}
  for(let d=1;d<=dim;d++){
    const isT=today.getFullYear()===pcCalY&&today.getMonth()===pcCalM&&today.getDate()===d;
    const cell=grid.appendChild(Object.assign(document.createElement('div'),{className:'pc-cal-cell'+(isT?' tod':'')}));
    cell.appendChild(Object.assign(document.createElement('div'),{className:'pc-cal-num',textContent:''+d}));
    const ds=pcCalY+'-'+String(pcCalM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    slots.filter(s=>s.date===ds).sort((a,b)=>a.time.localeCompare(b.time)).slice(0,3).forEach(s=>{
      const tr2=trainers.find(t=>t.id===s.trainerId);if(!tr2)return;
      const mb=s.memberId?members.find(m=>m.id===s.memberId):null;const col=getTrainerColor(tr2);
      const ev=cell.appendChild(Object.assign(document.createElement('div'),{className:'pc-cal-ev'}));ev.style.cssText='background:'+col.bg+';color:'+col.text+';';
      const planC=s.planId&&mb?(mb.plans||[]).find(p=>p.id===s.planId):null;
      const usedC=planC?getPlanUsed(planC.id):null;const sessC=planC?planC.sessions:null;
      ev.textContent=s.time.slice(0,5)+' '+(mb?mb.name:s.memo||tr2.name)+(usedC!==null?' '+usedC+'/'+sessC:'');
      ev.onclick=e=>{e.stopPropagation();openPcSlotDetail(s.id);};
    });
    const all=slots.filter(s=>s.date===ds).length;if(all>3){const m=cell.appendChild(Object.assign(document.createElement('div'),{}));m.style.cssText='font-size:9px;color:#6496ff;margin-top:1px;cursor:pointer;font-weight:600;';m.textContent='+'+(all-3)+'개 더';m.onclick=e=>{e.stopPropagation();openPcDayView(ds);};}
    cell.onclick=()=>openPcDayView(ds);
  }
}

// ── 매출관리 ─────────────────────────────────────────────────────────────
function renderPcSales(ct,acts){

  const d2=fb.appendChild(document.createElement('input'));d2.type='date';d2.value=pcSalEnd;d2.className='pcm-input';d2.style.cssText='width:160px;padding:9px 12px;font-size:13px;';d2.onchange=e=>pcSalEnd=e.target.value;
  const trs=fb.appendChild(document.createElement('select'));trs.className='pcm-select';trs.style.cssText='width:130px;padding:9px 12px;';

  trainers.forEach(t=>{const o=trs.appendChild(document.createElement('option'));o.value=t.id;o.textContent=t.name;if(t.id===pcSalTr)o.selected=true;});trs.onchange=e=>pcSalTr=e.target.value;
  fb.appendChild(Object.assign(document.createElement('button'),{className:'pc-tbtn pri',textContent:'조회'})).onclick=()=>renderPcContent();
  fb.appendChild(Object.assign(document.createElement('button'),{className:'pc-tbtn',textContent:'엑셀 다운로드'})).onclick=()=>{salMode='sales';salStartDate=pcSalStart;salEndDate=pcSalEnd;salTrainer=pcSalTr;salSearch='';const r=computeSales();dlSalesCSV(r.rows,r.totalRevenue);};
  // 퀵버튼
  const qb=ct.appendChild(Object.assign(document.createElement('div'),{}));qb.style.cssText='display:flex;gap:8px;margin-bottom:12px;';
  function setQuick(s,e){pcSalStart=s;pcSalEnd=e;renderPcContent();}
  function fmtD(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  [{l:'오늘',fn:()=>{const t=new Date();setQuick(fmtD(t),fmtD(t));}},
   {l:'이번주',fn:()=>{const t=new Date();const dow=t.getDay()||7;const mon=new Date(t);mon.setDate(t.getDate()-dow+1);const sun=new Date(mon);sun.setDate(mon.getDate()+6);setQuick(fmtD(mon),fmtD(sun));}},
   {l:'이번달',fn:()=>{const t=new Date();const s=new Date(t.getFullYear(),t.getMonth(),1);const e=new Date(t.getFullYear(),t.getMonth()+1,0);setQuick(fmtD(s),fmtD(e));}},
  ].forEach(({l,fn})=>{const btn=qb.appendChild(document.createElement('button'));btn.className='pc-tbtn';btn.textContent=l;btn.style.cssText='padding:8px 16px;font-size:13px;font-weight:600;border-color:#818cf8;color:#818cf8;';btn.onclick=fn;});
  const sd=new Date(pcSalStart),ed=new Date(pcSalEnd);ed.setHours(23,59,59);const rows=[];let total=0;
  members.forEach(mb=>{if(pcSalTr&&mb.trainerId!==pcSalTr)return;const tr2=trainers.find(t=>t.id===mb.trainerId);(mb.plans||[]).forEach(p=>{const pd=new Date(p.addedAt||0);if(pd<sd||pd>ed)return;rows.push({mb,p,tr2,ds:pd.toLocaleDateString('ko-KR',{year:'2-digit',month:'2-digit',day:'2-digit'}),tm:String(pd.getHours()).padStart(2,'0')+':'+String(pd.getMinutes()).padStart(2,'0')});total+=p.totalPrice||0;});});
  const sd2=new Date(pcSalStart),ed2=new Date(pcSalEnd);ed2.setHours(23,59,59);
  const refundTotal=refunds.filter(r=>{if(!r.processedAt)return false;const d=new Date(r.processedAt);return d>=sd2&&d<=ed2;}).reduce((s,r)=>s+(r.refundAmount||0),0);
  const netTotal=total-refundTotal;
  const sg=ct.appendChild(Object.assign(document.createElement('div'),{className:'pc-dash-g3'}));
  [{v:netTotal.toLocaleString()+'원',l:'순 매출 (환불 제외)',sub:refundTotal>0?'환불: -'+refundTotal.toLocaleString()+'원':''},{v:total.toLocaleString()+'원',l:'총 결제 매출'},{v:refundTotal>0?('-'+refundTotal.toLocaleString()+'원'):'0원',l:'환불 합계'}].forEach(c=>{
    const card=sg.appendChild(Object.assign(document.createElement('div'),{className:'pc-card'}));
    card.innerHTML='<div class="pc-card-ttl">'+c.l+'</div><div class="pc-card-val" style="color:'+(c.l.includes('환불')&&refundTotal>0?'#f87171':'#e2e8f0')+'">'+c.v+'</div>'+(c.sub?'<div class="pc-card-sub" style="color:#f87171;">'+c.sub+'</div>':'');
  });
  const tw=ct.appendChild(Object.assign(document.createElement('div'),{className:'pc-tw'}));const tbl=tw.appendChild(Object.assign(document.createElement('table'),{className:'pc-tbl'}));
  const thead=tbl.appendChild(document.createElement('thead'));const hr=thead.appendChild(document.createElement('tr'));const tbody=tbl.appendChild(document.createElement('tbody'));
  if(pcSV==='all'){
    const hdrs=['No','결제일','시간','트레이너','회원','연락처','유입','결제방법','수업권','금액'];
    if(isAdminUser())hdrs.push('');
    // 정렬 가능한 컬럼 인덱스 (No,관리 제외)
    const salSortKeys=[null,'date','tm','tr','mbName','phone','inflow','pay','plan','amount'];
    hdrs.forEach((h,hi)=>{
      const th=hr.appendChild(document.createElement('th'));
      const sk=salSortKeys[hi];
      if(sk){
        th.style.cssText='cursor:pointer;user-select:none;white-space:nowrap;';
        th.innerHTML=h+'<span style="margin-left:4px;opacity:.5;font-size:10px;">'+(pcSalSortCol===sk?(pcSalSortDir===1?'▲':'▼'):'⇅')+'</span>';
        th.title=h+' 기준 정렬';
        th.onmouseenter=()=>{th.style.color='#c4cde8';};
        th.onmouseleave=()=>{th.style.color='';};
        th.onclick=()=>{
          if(pcSalSortCol===sk){pcSalSortDir*=-1;}else{pcSalSortCol=sk;pcSalSortDir=1;}
          renderPcContent();
        };
      } else { th.textContent=h; }
    });
    // PC 매출 테이블은 computeSales rows 기반으로 재렌더
    {
      const{rows:allRows}=(()=>{
        const sd2=new Date(pcSalStart),ed2=new Date(pcSalEnd);ed2.setHours(23,59,59);const r2=[];
        members.forEach(mb=>{if(pcSalTr&&mb.trainerId!==pcSalTr)return;const tr3=trainers.find(t=>t.id===mb.trainerId);
          (mb.plans||[]).forEach(p=>{const pd=new Date(p.addedAt||0);if(pd<sd2||pd>ed2)return;r2.push({date:pd.toLocaleDateString('ko-KR',{year:'2-digit',month:'2-digit',day:'2-digit'}),tm:String(pd.getHours()).padStart(2,'0')+':'+String(pd.getMinutes()).padStart(2,'0'),tr:tr3?tr3.name:'-',mbName:mb.name,phone:mb.phone||'-',inflow:mb.inflow||'-',pay:p.paymentMethod||mb.payment||'-',plan:(p.productName||p.duration+'분 '+p.sessions+'회권'),amount:p.totalPrice||0,isRefund:false,addedAt:p.addedAt||0});});});
        // 환불 추가
        refunds.forEach(rf=>{if(!rf.processedAt)return;const rd=new Date(rf.processedAt);if(rd<sd2||rd>ed2)return;r2.push({date:rd.toLocaleDateString('ko-KR',{year:'2-digit',month:'2-digit',day:'2-digit'}),tm:String(rd.getHours()).padStart(2,'0')+':'+String(rd.getMinutes()).padStart(2,'0'),tr:'-',mbName:rf.memberName,phone:rf.phone||'-',inflow:'-',pay:'-',plan:(rf.type==='transfer'?'[양도]':'[환불]')+' '+rf.planName,amount:-(rf.refundAmount||0),isRefund:true,addedAt:rf.processedAt});});
        // 기본 정렬(최신순) 또는 선택된 컬럼 정렬
        if(pcSalSortCol){
          r2.sort((a,b)=>{
            let va=a[pcSalSortCol],vb=b[pcSalSortCol];
            if(pcSalSortCol==='amount'){va=Number(va);vb=Number(vb);}
            if(typeof va==='string')return va.localeCompare(vb,'ko')*pcSalSortDir;
            return (va-vb)*pcSalSortDir;
          });
        } else { r2.sort((a,b)=>b.addedAt-a.addedAt); }
        return{rows:r2};
      })();
      allRows.forEach((r,i)=>{
        const row=tbody.appendChild(document.createElement('tr'));
        if(r.isRefund)row.style.cssText='background:rgba(248,113,113,.06);';
        [i+1,r.date,r.tm,r.tr,r.mbName,r.phone,r.inflow,r.pay,r.plan,r.amount].forEach((v,ci)=>{
          const td=document.createElement('td');
          if(ci===9){td.textContent=(v>0?'':'')+Math.abs(v).toLocaleString()+'원';td.style.fontWeight='700';if(r.isRefund)td.style.color='#f87171';if(v<0)td.textContent='-'+Math.abs(v).toLocaleString()+'원';}
          else td.textContent=v;
          row.appendChild(td);
        });
        // 관리자 전용 매출취소 버튼
        if(isAdminUser()){
          const actTd=row.appendChild(document.createElement('td'));
          if(!r.isRefund){
            const cancelBtn=actTd.appendChild(document.createElement('button'));
            cancelBtn.style.cssText='padding:5px 10px;font-size:11px;border-radius:6px;border:1px solid rgba(251,191,36,.4);background:transparent;color:#fbbf24;cursor:pointer;white-space:nowrap;';
            cancelBtn.textContent='매출 취소';
            cancelBtn.onclick=()=>{
              if(!confirm('[관리자] '+r.mbName+' '+r.plan+' '+Math.abs(r.amount).toLocaleString()+'원 매출 취소? (환불기록 없이 삭제)'))return;
              // plan 찾아서 삭제
              const mb=members.find(m=>m.name===r.mbName);
              if(mb){mb.plans=(mb.plans||[]).filter(p=>{const d=new Date(p.addedAt||0);const ds=d.toLocaleDateString('ko-KR',{year:'2-digit',month:'2-digit',day:'2-digit'});return!(ds===r.date&&p.totalPrice===r.amount&&!p.refunded);});sv('og10_mb',members);}
              alert('매출이 취소되었습니다.');renderPcContent();
            };
          } else {
            // 환불 기록 삭제 (관리자)
            const delBtn=actTd.appendChild(document.createElement('button'));
            delBtn.style.cssText='padding:5px 10px;font-size:11px;border-radius:6px;border:1px solid rgba(248,113,113,.4);background:transparent;color:#f87171;cursor:pointer;white-space:nowrap;';
            delBtn.textContent='기록 삭제';
            delBtn.onclick=()=>{
              if(!confirm('[관리자] 이 환불 기록을 삭제하시겠습니까?'))return;
              refunds=refunds.filter(x=>x.memberName!==r.mbName||x.refundAmount!==Math.abs(r.amount));
              sv('og10_rf',refunds);renderPcContent();
            };
          }
        }
      });
    }
  } else if(pcSV==='bypkg'){
    ['No','수업권','판매 건수','현금','카드/이체','합계'].forEach(h=>{hr.appendChild(Object.assign(document.createElement('th'),{textContent:h}));});
    const pkgMap={};rows.forEach(r=>{const k=(r.p.productName||r.p.duration+'분 '+r.p.sessions+'회권');if(!pkgMap[k])pkgMap[k]={cnt:0,cash:0,card:0,tot:0};pkgMap[k].cnt++;const amt=r.p.totalPrice||0;if((r.p.paymentMethod||r.mb.payment||'')==='현금')pkgMap[k].cash+=amt;else pkgMap[k].card+=amt;pkgMap[k].tot+=amt;});
    Object.entries(pkgMap).sort((a,b)=>b[1].tot-a[1].tot).forEach(([k,v],i)=>{const row=tbody.appendChild(document.createElement('tr'));[i+1,k,v.cnt+'건',v.cash.toLocaleString()+'원',v.card.toLocaleString()+'원',v.tot.toLocaleString()+'원'].forEach((val,ci)=>{const td=document.createElement('td');td.textContent=val;if(ci>=3)td.style.fontWeight='700';row.appendChild(td);});});
  } else {
    ['No','결제수단','건수','합계'].forEach(h=>{hr.appendChild(Object.assign(document.createElement('th'),{textContent:h}));});
    const pm2={카드:0,현금:0,계좌이체:0};rows.forEach(r=>{const k=r.p.paymentMethod||r.mb.payment||'카드';pm2[k]!==undefined?pm2[k]+=r.p.totalPrice||0:pm2['카드']+=r.p.totalPrice||0;});
    Object.entries(pm2).forEach(([k,v],i)=>{const cnt=rows.filter(r=>(r.p.paymentMethod||r.mb.payment||'카드')===k).length;const row=tbody.appendChild(document.createElement('tr'));[i+1,k,cnt+'건',v.toLocaleString()+'원'].forEach((val,ci)=>{const td=document.createElement('td');td.textContent=val;if(ci===3)td.style.color='#818cf8';row.appendChild(td);});});
    const tr3=tbody.appendChild(document.createElement('tr'));tr3.style.fontWeight='700';['','총 계',rows.length+'건',total.toLocaleString()+'원'].forEach((val,ci)=>{const td=document.createElement('td');td.textContent=val;if(ci===3)td.style.color='#818cf8';tr3.appendChild(td);});
  }
