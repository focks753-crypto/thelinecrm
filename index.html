<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TheLine CRM">
<meta property="og:title" content="TheLine CRM">
<meta property="og:site_name" content="TheLine CRM">
<meta property="og:description" content="TheLine CRM">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="shortcut icon" href="icons/icon-192.png">
<title>TheLine CRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg0:#0d0d0d;--bg1:#1a1a1a;--bg2:#252525;--bg3:#303030;
  --bd:#2e2e2e;--bd2:#3d3d3d;
  --t1:#fff;--t2:#ccc;--t3:#888;--t4:#555;
  --red:#e05555;--orange:#e8892a;--green:#3dc87a;--gold:#ffd54f;
}
html{height:100%;}
body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#000;color:var(--t1);display:flex;flex-direction:column;overflow:hidden;}

/* ── GATE ── */
#gate{position:fixed;inset:0;z-index:9000;transition:opacity .3s ease;}


.gate-logo{width:110px;height:110px;object-fit:contain;margin-bottom:20px;}
.gate-title{font-size:18px;font-weight:700;color:#fff;letter-spacing:-0.3px;text-align:center;}
.gate-sub{font-size:11px;color:#555;letter-spacing:2px;margin-top:4px;text-align:center;}
.gate-hint{font-size:13px;color:#666;margin-top:32px;margin-bottom:12px;}
.pin-dots{display:flex;gap:14px;margin-bottom:28px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:1px solid #444;background:transparent;transition:background .1s;}
.pin-dot.filled{background:#fff;border-color:#fff;}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px;}
.pkey{background:var(--bg2);border:1px solid var(--bd2);border-radius:50%;width:72px;height:72px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:500;color:var(--t1);cursor:pointer;margin:auto;user-select:none;-webkit-user-select:none;}
.pkey:active{background:var(--bg3);}
.pkey.del{font-size:18px;color:var(--t3);}
.pkey.ok{background:#fff;color:#000;font-size:16px;}
.pkey.ok:active{background:#ddd;}
.pkey.empty{background:transparent;border:none;cursor:default;}
.pin-error{color:var(--red);font-size:13px;margin-top:16px;min-height:20px;text-align:center;}

/* ── APP WRAP ── */
#app-wrap{flex:1;display:none;flex-direction:column;overflow:hidden;background:var(--bg0);}
#app-wrap.show{display:flex;}

/* ── HEADER ── */
.hdr{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:calc(10px + env(safe-area-inset-top)) 16px 10px;background:var(--bg0);border-bottom:1px solid var(--bd);}
.hdr-logo{width:36px;height:36px;object-fit:contain;border-radius:4px;background:#000;}
.hdr-ttl{flex:1;font-size:15px;font-weight:700;}
.chip{padding:6px 12px;border-radius:20px;border:1px solid var(--bd2);background:var(--bg2);color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis;}
.chip.on{border-color:transparent;color:#000;}

/* ── TABS ── */
.tabs{flex-shrink:0;display:flex;gap:5px;padding:9px 10px;background:var(--bg0);border-bottom:1px solid var(--bd);}
.tab{flex:1;padding:9px 2px;border-radius:10px;border:none;cursor:pointer;font-size:11px;font-weight:600;background:var(--bg2);color:var(--t3);white-space:nowrap;}
.tab.on{background:#818cf8;color:#fff;}

/* ── PAGES + ANIMATION ── */
.pg{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;display:none;background:var(--bg0);}
.pg.show{display:block;animation:pgIn .22s ease forwards;}
#pg-sch.show{display:flex;flex-direction:column;overflow:hidden;}
/* CAL ZOOM */
.wslot-sub{transition:opacity .15s;font-size:8px;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wslot-used{font-size:8px;opacity:.85;white-space:nowrap;}
.zoom-compact .wslot-sub,.zoom-compact .wslot-used{display:none;}
.zoom-compact .wslot-name{font-size:7px;}
.zoom-large .wslot-name{font-size:11px;font-weight:800;}
.zoom-large .wslot-sub{font-size:9px;opacity:1;}
.zoom-large .wslot-used{font-size:9px;}
@keyframes pgIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.pad{padding:14px 16px 100px;}

/* ── DAY SELECTOR ── */
.day-wrap{background:var(--bg0);border-bottom:1px solid var(--bd);}
.wnav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 6px;}
.winfo{cursor:pointer;padding:4px 8px;border-radius:8px;}
.winfo:active{background:var(--bg2);}
.wmain{font-size:14px;font-weight:700;color:var(--t1);}
.wsub{font-size:11px;color:var(--t3);margin-top:2px;}
.wbtns{display:flex;gap:5px;}
.warr{background:var(--bg2);border:1px solid #1e2026;border-radius:8px;color:#c4cde8;font-size:13px;padding:6px 13px;cursor:pointer;}
.wtoday{background:transparent;border:1px solid rgba(129,140,248,0.5);border-radius:8px;color:#818cf8;font-size:12px;padding:6px 11px;cursor:pointer;}
.dtabs{display:flex;gap:4px;padding:0 12px 10px;overflow-x:auto;scrollbar-width:none;}
.dtabs::-webkit-scrollbar{display:none;}
.dtab{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 10px;border-radius:12px;cursor:pointer;min-width:44px;background:var(--bg2);border:1px solid transparent;}
.dtab .dw{font-size:10px;color:#bbb;font-weight:600;}
.dtab .dn{font-size:18px;font-weight:700;color:#fff;}
.dtab .ddot{width:5px;height:5px;border-radius:50%;background:var(--t4);margin:0 auto;}
.dtab.sel .ddot{background:#555;}
.dtab.tod .ddot{background:#818cf8;}
.dtab.tod{border-color:rgba(129,140,248,0.3);}
.dtab.tod .dn{color:#a5b4fc;}
.dtab.sel{background:rgba(129,140,248,0.12);border-color:rgba(129,140,248,0.45);}.dtab.sel .ddot{background:#818cf8;}
.dtab.sel .dw{color:#818cf8;}
.dtab.sel .dn{color:#818cf8;}

/* ── TIME LIST ── */
.tlist{padding:0 0 100px;}
.trow{display:flex;align-items:stretch;border-bottom:1px solid #1a1a1a;min-height:52px;}
.trow.hr{border-bottom:1px solid #222;}
.tcol{width:58px;flex-shrink:0;display:flex;align-items:flex-start;justify-content:flex-end;padding:8px 10px 0 0;border-right:1px solid var(--bd);background:var(--bg1);}
.tlbl{font-size:12px;font-weight:700;color:var(--t2);}
.tlbl.half{font-size:11px;font-weight:400;color:#444;}
.scol{flex:1;padding:5px 10px;display:flex;flex-direction:column;gap:5px;min-width:0;}
.slot{border-radius:10px;padding:9px 11px;display:flex;align-items:center;gap:8px;}
.si{flex:1;min-width:0;}
.sname{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.smem{font-size:12px;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.sbdgs{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap;}
.tbdg{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;background:rgba(0,0,0,.3);}
.rbdg{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;background:rgba(255,255,255,.1);}
.rbdg.warn{background:rgba(224,85,85,.25);color:#ffaaaa;}
.ot-bdg{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;background:rgba(61,200,122,.2);color:#7de8b0;}
.delx{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.25);border:none;color:inherit;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:.6;}
.delx:active{opacity:1;}
.addbtn{width:100%;background:var(--bg2);border:none;border-radius:9px;color:var(--t3);font-size:12px;padding:8px;cursor:pointer;font-family:inherit;text-align:center;}
.addbtn:active{background:var(--bg3);}
.fab{position:fixed;right:18px;bottom:calc(16px + env(safe-area-inset-bottom));width:56px;height:56px;border-radius:50%;background:#818cf8;color:#fff;font-size:28px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,.7);}
.fab:active{transform:scale(.93);}

/* ── MEMBER TAB ── */
.sec-header{font-size:12px;color:var(--t3);font-weight:600;text-align:center;padding:8px 0 12px;letter-spacing:0.5px;}
.trgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.trcard{background:var(--bg1);border:1px solid var(--bd);border-radius:14px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:9px;cursor:pointer;}
.trcard:active{background:var(--bg2);}
.trcard.locked{opacity:.4;cursor:default;}
.trcard.admin-card{border-color:#3a1a4a;background:#160f1e;}
.trav{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;}
.trnm{font-size:14px;font-weight:700;}
.trrole{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;margin-top:-4px;}
.trrole.admin{background:rgba(171,71,188,.18);color:#ce93d8;}
.trrole.normal{background:var(--bg2);color:var(--t3);}
.trcnt{font-size:12px;color:var(--t3);}
.trwarn{font-size:11px;font-weight:700;color:var(--red);}
.trlock{font-size:11px;color:var(--t4);}
.mvhdr{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.backbtn{background:var(--bg2);border:1px solid var(--bd2);border-radius:8px;color:var(--t2);font-size:13px;padding:7px 14px;cursor:pointer;}
.mvttl{font-size:16px;font-weight:700;flex:1;}
.memcard{background:var(--bg1);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;margin-bottom:8px;}
.memtop{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
.memnm{font-size:15px;font-weight:700;flex:1;min-width:0;}
.memeditbtn,.memplanbtb{background:var(--bg2);border:1px solid var(--bd2);border-radius:7px;color:var(--t2);font-size:11px;padding:4px 10px;cursor:pointer;white-space:nowrap;}
.mdel{width:28px;height:28px;border-radius:50%;background:var(--bg2);border:1px solid var(--bd);color:var(--t3);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mdel:active{background:#3d1a1a;color:#ffaaaa;}
.planrow{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg2);border-radius:8px;margin-bottom:5px;}
.planinfo{font-size:12px;color:var(--t2);}
.planprice{font-size:11px;color:var(--t3);margin-top:1px;}
.planrem{font-size:12px;font-weight:700;}
.planrem.ok{color:var(--green);}
.planrem.warn{color:var(--red);}
.mphone{font-size:12px;color:var(--t4);margin-top:6px;}
.memwarn{display:inline-block;font-size:11px;font-weight:700;color:var(--red);background:rgba(224,85,85,.15);padding:3px 8px;border-radius:6px;margin-top:4px;}
.dlbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.dlsel{padding:9px 12px;border:1px solid var(--bd2);border-radius:9px;background:var(--bg2);color:var(--t1);font-size:13px;}
.dlbtn{background:var(--bg2);border:1px solid var(--bd2);border-radius:9px;color:var(--t2);font-size:13px;padding:9px 16px;cursor:pointer;}
.addmem{width:100%;padding:12px;background:var(--bg2);border:1px solid var(--bd2);border-radius:10px;color:var(--t2);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;}

/* ── FORMS / ADMIN ── */
.sec{font-size:11px;color:var(--t4);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;margin-top:20px;}
.sec:first-child{margin-top:0;}
.sform{background:var(--bg1);border:1px solid var(--bd);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:10px;}
.sform input,.sform select{width:100%;padding:12px 14px;border:1px solid var(--bd2);border-radius:10px;background:var(--bg2);color:var(--t1);font-size:15px;}
.sform input::placeholder{color:var(--t4);}
.sform .r2{display:flex;gap:8px;}
.sform .r2>*{flex:1;min-width:0;}
.sform .sbtn{width:100%;padding:13px;border-radius:10px;border:none;background:#818cf8;color:#fff;font-size:15px;font-weight:700;cursor:pointer;}
.stcard{background:var(--bg1);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:13px;margin-bottom:8px;}
.stav{width:44px;height:44px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;}
.stinfo{flex:1;min-width:0;}
.stnm{font-size:15px;font-weight:600;}
.strl{font-size:12px;color:var(--t3);margin-top:2px;}
.stbtns{display:flex;gap:6px;flex-shrink:0;}
.steditbtn{padding:5px 11px;background:var(--bg2);border:1px solid var(--bd2);border-radius:7px;color:var(--t2);font-size:12px;cursor:pointer;}
.stdel{width:30px;height:30px;border-radius:50%;background:var(--bg2);border:1px solid var(--bd);color:var(--t3);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.stdel:active{background:#3d1a1a;color:#ffaaaa;}
.lockbox{background:var(--bg1);border:1px solid var(--bd);border-radius:14px;padding:28px;text-align:center;}
.lockbox p{font-size:14px;color:var(--t2);margin-bottom:6px;line-height:1.6;}
.lockbox small{font-size:12px;color:var(--t4);display:block;margin-bottom:18px;}
.lockbox button{background:var(--bg2);border:1px solid var(--bd2);border-radius:10px;color:var(--t2);font-size:14px;padding:11px 28px;cursor:pointer;}
.adminbar{display:flex;gap:8px;margin-bottom:12px;align-items:center;}
.abadge{font-size:11px;color:#818cf8;border:1px solid rgba(129,140,248,0.5);border-radius:6px;padding:3px 10px;font-weight:700;background:rgba(129,140,248,0.08);}
.aout{font-size:12px;color:var(--t3);background:var(--bg2);border:1px solid var(--bd2);border-radius:8px;padding:5px 12px;cursor:pointer;}
.pwbtn{font-size:12px;color:var(--t4);background:transparent;border:none;cursor:pointer;text-decoration:underline;margin-top:10px;display:block;}
.admsubtabs{display:flex;gap:5px;margin-bottom:16px;background:#111318;border:1px solid #1e2026;border-radius:12px;padding:4px;position:sticky;top:0;z-index:20;}
.admsubtab{flex:1;padding:9px 4px;border-radius:9px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:transparent;color:var(--t3);}
.admsubtab.on{background:rgba(129,140,248,0.15);color:#818cf8;}
.pkgcard{background:var(--bg1);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.pkginfo{font-size:14px;font-weight:600;color:var(--t1);}
.pkgprice{font-size:12px;color:var(--t3);margin-top:2px;}
.pkgdel{padding:5px 12px;background:var(--bg2);border:1px solid var(--bd2);border-radius:7px;color:var(--t3);font-size:12px;cursor:pointer;}
.pkgdel:active{background:#3d1a1a;color:#ffaaaa;}

/* ── NOTICE ── */
.ncomp{background:var(--bg1);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:16px;}
.ncomp textarea{width:100%;background:var(--bg2);border:1px solid var(--bd2);border-radius:10px;color:var(--t1);font-size:15px;padding:12px 14px;resize:none;min-height:90px;font-family:inherit;line-height:1.6;}
.ncomp textarea::placeholder{color:var(--t4);}
.ncrow{display:flex;gap:8px;margin-top:10px;}
.ncrow input{flex:1;padding:11px 14px;border:1px solid var(--bd2);border-radius:10px;background:var(--bg2);color:var(--t1);font-size:14px;}
.npost{padding:11px 18px;border-radius:10px;border:none;background:#fff;color:#000;font-size:14px;font-weight:700;cursor:pointer;flex-shrink:0;}
.npinrow{display:flex;align-items:center;gap:8px;margin-top:10px;}
.npinrow input{width:18px;height:18px;accent-color:var(--orange);cursor:pointer;}
.npinrow label{font-size:13px;color:var(--t3);}
.ncard{background:var(--bg1);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:10px;}
.nchdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.ncauth{display:flex;align-items:center;gap:9px;}
.ncav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.ncnm{font-size:13px;font-weight:700;color:var(--t2);}
.ncdt{font-size:11px;color:var(--t4);margin-top:1px;}
.ncdel{width:28px;height:28px;border-radius:50%;background:var(--bg2);border:1px solid var(--bd);color:var(--t3);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ncdel:active{background:#3d1a1a;}
.nbody{font-size:14px;color:var(--t2);line-height:1.7;white-space:pre-wrap;word-break:break-word;}
.npinbdg{display:inline-flex;font-size:11px;font-weight:700;color:var(--orange);border:1px solid var(--orange);border-radius:6px;padding:2px 8px;margin-bottom:10px;}
.nempty{text-align:center;padding:3rem 0;color:var(--t4);font-size:14px;}


/* ── SUB-TAB SLIDE ANIMATION ── */
.subtab-slide-right{animation:slideInRight .2s ease forwards;}
.subtab-slide-left{animation:slideInLeft .2s ease forwards;}
@keyframes slideInRight{from{opacity:0;transform:translateX(22px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-22px)}to{opacity:1;transform:translateX(0)}}
/* ── SHEETS ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:flex;align-items:flex-end;}
.sheet{width:100%;background:var(--bg1);border-radius:20px 20px 0 0;padding:0 18px calc(28px + env(safe-area-inset-bottom));border-top:1px solid var(--bd2);max-height:92vh;overflow-y:auto;}
.shdl{width:40px;height:4px;background:var(--bd2);border-radius:2px;margin:14px auto 16px;}
.sheet h3{font-size:17px;font-weight:700;margin-bottom:3px;}
.shsub{font-size:13px;color:var(--t3);margin-bottom:16px;}
.sheet label{font-size:12px;color:var(--t2);font-weight:600;display:block;margin-bottom:6px;margin-top:14px;}
.sheet select,.sheet input[type=text],.sheet input[type=tel],.sheet input[type=number],.sheet input[type=password]{width:100%;padding:13px 14px;border:1px solid var(--bd2);border-radius:10px;background:var(--bg2);color:var(--t1);font-size:15px;}
.sheet input::placeholder{color:var(--t4);}
.shbtns{display:flex;gap:10px;margin-top:20px;}
.shbtns button{flex:1;padding:14px;border-radius:12px;font-size:15px;cursor:pointer;font-weight:700;}
.shno{background:var(--bg2);border:1px solid var(--bd2);color:var(--t2);}
.shok{background:#fff;color:#000;border:none;}
.trinfo-box{padding:13px 14px;border:1px solid var(--bd2);border-radius:10px;background:var(--bg3);font-size:15px;color:var(--t2);}
.plan-option{padding:12px 14px;border:1px solid var(--bd2);border-radius:10px;background:var(--bg2);display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;cursor:pointer;}
.plan-option.sel{border-color:var(--t1);background:var(--bg3);}
.plan-opt-info{font-size:13px;font-weight:600;color:var(--t1);}
.plan-opt-sub{font-size:11px;color:var(--t3);margin-top:2px;}
.plan-opt-rem{font-size:13px;font-weight:700;}
.pkg-auto{padding:13px 14px;border:1px solid var(--bd2);border-radius:10px;background:var(--bg3);color:var(--t1);font-size:15px;font-weight:600;}
.nmlist{display:flex;flex-direction:column;gap:7px;margin-top:4px;}
.nmbtn{width:100%;padding:12px 16px;border-radius:10px;background:var(--bg2);border:1px solid var(--bd2);color:var(--t1);font-size:15px;font-weight:600;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;}
.nmbtn:active{background:var(--bg3);}
.nmav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.nminf{display:flex;flex-direction:column;}
.nmrl{font-size:11px;color:var(--t3);margin-top:1px;}
.login-hint{font-size:11px;color:var(--t4);text-align:center;margin-top:8px;}

.sal-mode-tabs{display:flex;gap:0;background:#111318;border:1px solid #1e2026;border-radius:10px;padding:3px;margin-bottom:6px;position:sticky;top:0;z-index:20;}

.sal-row{display:flex;gap:8px;align-items:center;}

.sal-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}

.sal-card-val{font-size:15px;font-weight:800;color:var(--t1);margin-bottom:4px;}
.sal-card-lbl{font-size:10px;color:var(--t3);}
.sal-net-card{background:var(--bg1);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;margin-bottom:12px;}

.sal-net-val{font-size:22px;font-weight:800;color:#e2e8f0;}

.sal-net-subs{display:flex;gap:12px;margin-top:8px;}
.sal-net-sub{font-size:11px;color:var(--t3);}
.sal-chart-wrap{background:var(--bg1);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:14px;}
.sal-chart-title{font-size:13px;font-weight:600;color:var(--t2);margin-bottom:10px;}
.sal-canvas{width:100%;display:block;border-radius:6px;}
.sal-dl-btn{width:100%;padding:12px;background:var(--bg2);border:1px solid var(--bd2);border-radius:10px;color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:12px;}
.sal-dl-btn:active{background:var(--bg3);}
.sal-table-wrap{background:var(--bg1);border:1px solid var(--bd);border-radius:12px;overflow:hidden;overflow-x:auto;margin-bottom:14px;}
.sal-table{width:100%;border-collapse:collapse;font-size:12px;}
.sal-table th{background:var(--bg2);color:var(--t3);padding:9px 8px;text-align:left;font-weight:600;border-bottom:1px solid var(--bd);white-space:nowrap;}
.sal-table td{padding:8px 8px;border-bottom:1px solid var(--bd);color:var(--t2);white-space:nowrap;}
.sal-table tr:last-child td{border-bottom:none;}
.sal-table .amount{color:var(--t1);font-weight:600;text-align:right;}
.sal-table .total-row{background:var(--bg2);}

.sal-empty{text-align:center;padding:2.5rem 0;color:var(--t4);font-size:13px;}
.sal-ref-card{background:var(--bg1);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;margin-bottom:8px;}
.sal-ref-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.sal-ref-type{font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;flex-shrink:0;}

.sal-ref-type.transfer{background:rgba(129,140,248,.15);color:#818cf8;}
.sal-ref-name{font-size:14px;font-weight:700;color:var(--t1);flex:1;}

.sal-ref-info{font-size:11px;color:var(--t3);line-height:1.8;}

}

/* ── CALENDAR ── */
.calbg{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;}
.calbox{background:var(--bg1);border:1px solid var(--bd2);border-radius:18px;padding:20px;width:100%;max-width:340px;}
.calnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.calarr{background:var(--bg2);border:1px solid var(--bd2);border-radius:8px;color:var(--t2);font-size:14px;padding:6px 14px;cursor:pointer;}
.callbl{font-size:15px;font-weight:700;}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.caldw{text-align:center;font-size:11px;color:var(--t4);font-weight:600;padding:5px 0;}
.calday{text-align:center;padding:9px 3px;border-radius:8px;font-size:14px;color:var(--t3);cursor:pointer;}
.calday.e{cursor:default;color:transparent;}
.calday:not(.e):hover{background:var(--bg2);}
.calday.now{color:#fff;font-weight:700;}
.calday.cw{background:var(--bg3);color:var(--t1);}
.calclose{width:100%;margin-top:12px;padding:11px;border-radius:10px;background:var(--bg2);border:1px solid var(--bd2);color:var(--t2);font-size:14px;cursor:pointer;}



/* ── 햄버거 드롭다운 ── */














/* ── 탭바 ── */
.tabs{flex-shrink:0;display:flex;gap:5px;padding:9px 10px;background:var(--bg0);border-bottom:1px solid var(--bd);}
.tab{flex:1;padding:9px 4px;border-radius:10px;border:none;cursor:pointer;font-size:11px;font-weight:600;background:var(--bg2);color:var(--t3);white-space:nowrap;font-family:inherit;}
.tab.on{background:#fff;color:#000;}
.tabs{flex-shrink:0;display:flex;gap:5px;padding:9px 10px;background:var(--bg0);border-bottom:1px solid var(--bd);}
.tab{flex:1;padding:10px 4px;border-radius:10px;border:none;cursor:pointer;font-size:11px;font-weight:600;background:var(--bg2);color:var(--t3);white-space:nowrap;font-family:inherit;}
.tab.on{background:#fff;color:#000;}

/* ── 상담 서브탭 ── */
.mem-subtabs{display:flex;gap:0;background:var(--bg2);border-radius:10px;padding:3px;margin-bottom:16px;position:sticky;top:0;z-index:20;}
.mem-stab{flex:1;padding:9px 4px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:transparent;color:var(--t3);font-family:inherit;}
.mem-stab.on{background:#fff;color:#000;}
.today-section{background:#1a1200;border:1px solid #3a2e00;border-radius:14px;padding:14px 16px;margin-bottom:16px;}
.today-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.today-badge{font-size:11px;font-weight:700;background:#e8892a;color:#000;border-radius:6px;padding:2px 8px;}
.today-ttl{font-size:14px;font-weight:700;color:var(--gold);}
.today-empty{font-size:13px;color:#555;padding:4px 0;}
.con-card{background:var(--bg1);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;margin-bottom:8px;position:relative;}
.con-card.today{border-color:#e8892a;background:#1a1000;}
.con-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.con-name{font-size:15px;font-weight:700;flex:1;}
.con-phone{font-size:12px;color:var(--t3);}

.con-date.today{background:#e8892a;color:#000;}
.con-date.past{background:rgba(224,85,85,.15);color:var(--red);}
.con-memo{font-size:13px;color:var(--t2);line-height:1.6;margin-top:6px;white-space:pre-wrap;}
.con-acts{display:flex;gap:6px;margin-top:10px;}
.con-btn{padding:8px 14px;border-radius:8px;border:1px solid var(--bd2);background:var(--bg2);color:var(--t2);font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.con-btn.done{border-color:#3dc87a;color:#3dc87a;}
.con-del{width:28px;height:28px;border-radius:50%;background:var(--bg2);border:1px solid var(--bd);color:var(--t3);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-left:auto;}
.con-del:active{background:#3d1a1a;color:#ffaaaa;}
.con-status{font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;}
.con-status.pending{background:rgba(232,137,42,.15);color:#e8892a;}
.con-status.missed{background:rgba(100,150,255,.15);color:#6496ff;}
.con-status.done{background:rgba(61,200,122,.15);color:#3dc87a;}
.add-con-btn{width:100%;padding:13px;background:var(--bg2);border:1px solid var(--bd2);border-radius:10px;color:var(--t2);font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;}

/* ── 회원 조회 ── */
.msearch-wrap{display:flex;gap:8px;margin-bottom:14px;}
.msearch-input{flex:1;padding:12px 14px;border:1px solid var(--bd2);border-radius:10px;background:var(--bg2);color:var(--t1);font-size:15px;}
.msearch-input::placeholder{color:var(--t4);}
.msearch-btn{padding:12px 18px;border-radius:10px;border:none;background:#fff;color:#000;font-size:14px;font-weight:700;cursor:pointer;}
.mq-card{background:var(--bg1);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:12px;}
.mq-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.mq-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;}
.mq-info{flex:1;}
.mq-name{font-size:17px;font-weight:700;}
.mq-sub{font-size:12px;color:var(--t3);margin-top:2px;}
.mq-stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.mq-stat{background:var(--bg2);border-radius:10px;padding:10px;text-align:center;}
.mq-stat-val{font-size:16px;font-weight:700;color:var(--t1);}
.mq-stat-lbl{font-size:10px;color:var(--t3);margin-top:3px;}
.mq-plan{background:var(--bg2);border-radius:10px;padding:12px 14px;margin-bottom:7px;}
.mq-plan-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.mq-plan-title{font-size:13px;font-weight:700;color:var(--t1);}
.mq-plan-date{font-size:11px;color:var(--t3);}
.mq-plan-detail{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.mq-detail-item{background:var(--bg1);border-radius:8px;padding:8px 10px;}
.mq-detail-lbl{font-size:10px;color:var(--t4);margin-bottom:2px;}
.mq-detail-val{font-size:13px;font-weight:600;color:var(--t2);}
.mq-progress{height:6px;background:var(--bg3);border-radius:3px;margin-top:8px;overflow:hidden;}
.mq-progress-bar{height:100%;border-radius:3px;background:#3dc87a;transition:width .3s;}
.mq-progress-bar.warn{background:#e05555;}
.mq-slot-list{margin-top:10px;}
.mq-slot-title{font-size:11px;color:var(--t4);font-weight:600;margin-bottom:6px;}
.mq-slot-row{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd);font-size:12px;color:var(--t3);}
.mq-slot-row:last-child{border:none;}
.mq-slot-date{color:var(--t2);font-weight:600;min-width:70px;}
.mq-empty{text-align:center;padding:3rem 0;color:var(--t4);font-size:14px;}
.mq-result-ttl{font-size:12px;color:var(--t3);margin-bottom:12px;}

/* ── 회원 조회 테이블 ── */
.mq-table-wrap{background:var(--bg1);border:1px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:16px;}
.mq-table{width:100%;border-collapse:collapse;font-size:12px;}
.mq-table th{background:var(--bg2);color:var(--t3);padding:10px 8px;text-align:left;font-weight:600;border-bottom:1px solid var(--bd);white-space:nowrap;}
.mq-table td{padding:10px 8px;border-bottom:1px solid var(--bd);color:var(--t2);vertical-align:middle;}
.mq-table tr:last-child td{border-bottom:none;}
.mq-table tr:active td{background:var(--bg2);}
.mq-td-name{font-weight:700;color:var(--t1);white-space:nowrap;}
.mq-td-phone{color:#4a9eff;white-space:nowrap;cursor:pointer;}
.mq-td-date{white-space:nowrap;color:var(--t3);}
.mq-td-amount{text-align:right;font-weight:600;color:var(--t1);white-space:nowrap;}
.mq-td-trainer{white-space:nowrap;}

.chist-card{background:var(--bg1);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;margin-bottom:8px;}
.chist-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.chist-name{font-size:15px;font-weight:700;}
.chist-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.chist-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px;}
.chist-inflow{background:rgba(171,71,188,.15);color:#ce93d8;}
.chist-status-done{background:rgba(61,200,122,.15);color:#3dc87a;}
.chist-status-missed{background:rgba(100,150,255,.15);color:#6496ff;}
.chist-status-pending{background:rgba(232,137,42,.15);color:#e8892a;}
.chist-memo{font-size:13px;color:var(--t3);margin-top:6px;line-height:1.5;}
.chist-hist{background:var(--bg2);border-radius:8px;padding:8px 10px;margin-top:8px;}
.chist-hist-row{font-size:12px;color:var(--t3);padding:4px 0;border-bottom:1px solid var(--bd);display:flex;gap:8px;}
.chist-hist-row:last-child{border:none;}
.chist-hist-type{font-weight:600;}
.chist-hist-type.done{color:#3dc87a;}
.chist-hist-type.missed{color:#6496ff;}

/* ── 주간 뷰 ── */
.week-grid{display:flex;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;touch-action:pan-x;}
.week-grid::-webkit-scrollbar{display:none;}
.week-col{flex:0 0 calc(100%/7);min-width:0;border-right:1px solid var(--bd);display:flex;flex-direction:column;}
.week-col:last-child{border-right:none;}
.week-col-hdr{text-align:center;padding:6px 2px;background:var(--bg1);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:5;}
.week-col-day{font-size:10px;color:var(--t4);font-weight:600;}
.week-col-num{font-size:16px;font-weight:700;color:var(--t3);line-height:1.2;}
.week-col-hdr.today .week-col-num{color:#fff;}
.week-col-hdr.sel{background:var(--bg2);}
.week-col-hdr.sel .week-col-num{color:#fff;}
.week-col-dot{width:4px;height:4px;border-radius:50%;background:var(--t4);margin:2px auto 0;}
.week-col-hdr.today .week-col-dot{background:#aaa;}
.week-time-col{display:flex;width:44px;flex-shrink:0;flex-direction:column;background:var(--bg1);border-right:1px solid var(--bd);}
.week-row{display:flex;border-bottom:1px solid #1a1a1a;min-height:44px;}
.week-row.hr{border-bottom:1px solid #222;}
.week-time-lbl{font-size:10px;font-weight:700;color:var(--t3);padding:4px 4px 0;text-align:right;white-space:nowrap;}
.week-time-lbl.half{font-size:9px;font-weight:400;color:#444;}
.week-cell{flex:1;border-right:1px solid var(--bd);min-width:0;padding:2px;display:flex;flex-direction:column;gap:2px;cursor:pointer;position:relative;}
.week-cell:last-child{border-right:none;}
.week-cell:active{background:var(--bg2);}
.wslot{border-radius:4px;padding:2px 3px;font-size:9px;font-weight:700;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:1.4;}
.week-add-hint{font-size:8px;color:#333;text-align:center;padding:1px 0;}
.week-wrap{display:flex;overflow:hidden;touch-action:pan-y;}
.week-inner{display:flex;flex-direction:column;flex:1;overflow:hidden;}
.week-body{display:flex;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;}
.week-hdr-row{display:flex;position:sticky;top:0;z-index:15;background:var(--bg0);border-bottom:2px solid #1e2026;box-shadow:0 2px 8px rgba(0,0,0,.5);}

/* ── 스와이프 슬라이드 애니메이션 ── */
@keyframes slideInRight{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideInLeft{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOutRight{from{transform:translateX(0);opacity:1}to{transform:translateX(100%);opacity:0}}
@keyframes slideOutLeft{from{transform:translateX(0);opacity:1}to{transform:translateX(-100%);opacity:0}}
.week-body.slide-in-right{animation:slideInRight .25s cubic-bezier(.4,0,.2,1) forwards;}
.week-body.slide-in-left{animation:slideInLeft .25s cubic-bezier(.4,0,.2,1) forwards;}
#tlist{position:relative;overflow:hidden;}

@keyframes pcPageFadeIn{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes pcPageFadeInFast{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes pcFadeOnly{
  from{opacity:0}to{opacity:1}
}
@keyframes pcCardIn{
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes pcSlideInLeft{
  from{opacity:0;transform:translateX(-16px)}
  to{opacity:1;transform:translateX(0)}
}
@keyframes pcScaleIn{
  from{opacity:0;transform:scale(.97)}
  to{opacity:1;transform:scale(1)}
}

.pc-content-anim{
  animation:pcPageFadeIn .28s cubic-bezier(.22,1,.36,1) forwards;
}

.pc-card-anim{
  opacity:0;
  animation:pcCardIn .32s cubic-bezier(.22,1,.36,1) forwards;
}
.pc-card-anim:nth-child(1){animation-delay:.03s}
.pc-card-anim:nth-child(2){animation-delay:.07s}
.pc-card-anim:nth-child(3){animation-delay:.11s}
.pc-card-anim:nth-child(4){animation-delay:.15s}

.pc-card{
  transition:transform .18s cubic-bezier(.22,1,.36,1),
             box-shadow .18s cubic-bezier(.22,1,.36,1),
             border-color .15s;
}
.pc-card:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 28px rgba(0,0,0,.45);
  border-color:#252830;
}

.pc-tbl tbody tr{
  transition:background .1s;
}

.pc-nav-item{
  transition:background .16s cubic-bezier(.22,1,.36,1),
             color .16s,
             padding-left .16s cubic-bezier(.22,1,.36,1);
}
.pc-nav-item:hover{padding-left:18px;}
.pc-nav-item.on{padding-left:18px;}

.pc-nav-sub-item{
  transition:background .14s,color .14s,padding-left .14s cubic-bezier(.22,1,.36,1);
}
.pc-nav-sub-item:hover{padding-left:18px;}
.pc-nav-sub-item.on{padding-left:18px;}

.pcm-ov{animation:pcFadeOnly .18s ease forwards;}
.pcm-box{animation:pcScaleIn .22s cubic-bezier(.22,1,.36,1) forwards;}

.pc-tbtn{
  transition:background .14s,transform .12s,box-shadow .14s;
}
.pc-tbtn:hover{transform:translateY(-1px);box-shadow:0 3px 12px rgba(0,0,0,.35);}
.pc-tbtn:active{transform:translateY(0);}

.pc-prod-card{
  transition:border-color .15s,transform .18s cubic-bezier(.22,1,.36,1),box-shadow .18s;
}
.pc-prod-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.4);}

.pcdp-anim{animation:pcSlideInLeft .24s cubic-bezier(.22,1,.36,1) forwards;}

.pc-stab{transition:color .15s,border-bottom-color .15s;}

.pc-cal-cell{transition:background .12s,transform .12s;}
.pc-cal-cell:hover{transform:scale(1.03);}

.pc-row-anim{
  opacity:0;
  animation:pcPageFadeInFast .2s cubic-bezier(.22,1,.36,1) forwards;
}

// 모든 로컬 데이터를 Firebase에 업로드
async function pushAllToFirebase(){
  if(!db) throw new Error('Firebase가 연결되지 않았습니다. 인터넷 연결을 확인해주세요.');
  const items=[
    {k:'og10_tr',v:trainers},
    {k:'og10_sl',v:slots},
    {k:'og10_mb',v:members},
    {k:'og10_nt',v:notices},
    {k:'og10_pkg',v:packages},
    {k:'og10_cs',v:consultations},
    {k:'og10_pr',v:products},
    {k:'og10_rf',v:refunds},
  ];
  // 개별 순차 저장 (batch 대신)
  for(let i=0;i<items.length;i++){
    await db.collection('og_data').doc(items[i].k).set({
      value:JSON.stringify(items[i].v),
      ts:Date.now()
    });
    console.log('업로드:', items[i].k, '('+(i+1)+'/'+items.length+')');
  }
}

function getFirebaseStatus(){
  if(!db)return '❌ 미연결';
  return '✅ 연결됨';
}

async function loadFromFirebase(){
  if(!db)return false;
  try{
    const snap=await db.collection('og_data').get();
    let hasData=false;
    const skipKeys=['og11_cv','og10_cu','og10_cc'];
    const restores=[];
    snap.forEach(doc=>{
      if(skipKeys.includes(doc.id))return;
      const data=doc.data();
      const fsVal=data&&data.value?data.value:null;
      const lsVal=localStorage.getItem(doc.id);
      const fsEmpty=!fsVal||fsVal==='[]'||fsVal==='null';
      const lsGood=lsVal&&lsVal!=='[]'&&lsVal!=='null'&&lsVal.length>2;
      if(fsEmpty&&lsGood){
        // localStorage에 데이터 있는데 Firestore가 비어있으면 복구
        restores.push(db.collection('og_data').doc(doc.id).set({value:lsVal,ts:Date.now()}).catch(()=>{}));
        hasData=true;
      } else if(fsVal&&!fsEmpty){
        try{localStorage.setItem(doc.id,fsVal);hasData=true;}catch(e){}
      }
    });
    if(restores.length>0){
      await Promise.all(restores);
      console.log('✅ 데이터 복구 완료');
    }
    return hasData;
  }catch(e){return false;}
}

// 실시간 리스너 - 다른 기기 변경사항 자동 반영
function startRealtimeSync(){
  if(!db)return;
  db.collection('og_data').onSnapshot(snap=>{
    snap.docChanges().forEach(change=>{
      if(change.type==='modified'||change.type==='added'){
        const data=change.doc.data();
        const skipKeys2=['og11_cv','og10_cu','og10_cc'];
        if(data&&data.value&&!skipKeys2.includes(change.doc.id)){
          const id=change.doc.id;
          const newVal=data.value;
          const existingLs=localStorage.getItem(id);
          const newEmpty=!newVal||newVal==='[]'||newVal==='null';
          const existingGood=existingLs&&existingLs!=='[]'&&existingLs!=='null'&&existingLs.length>2;
          if(newEmpty&&existingGood)return; // 좋은 로컬 데이터를 빈값으로 덮어쓰지 않음
          try{localStorage.setItem(id,newVal);}catch(e){}
          // 화면 자동 갱신
          if(id==='og10_tr'){trainers=ld('og10_tr',[]);updChip();if(document.getElementById('pg-adm').classList.contains('show'))renderAdm();}
          else if(id==='og10_sl'){
            slots=ld('og10_sl',[]);
            if(document.getElementById('pg-sch')&&document.getElementById('pg-sch').classList.contains('show'))renderTimes();
            // PC 캘린더 재렌더 (960px 이상 PC 모드)
            if(window.innerWidth>=960&&typeof renderPcContent==='function'){
              const pcg=document.getElementById('pcg');
              if(!pcg||pcg.style.display==='none')renderPcContent();
            }}
          else if(id==='og10_mb'){
            members=ld('og10_mb',[]);
            if(document.getElementById('pg-mem')&&document.getElementById('pg-mem').classList.contains('show'))renderMem();
            if(window.innerWidth>=960&&typeof renderPcContent==='function'){
              const pcg=document.getElementById('pcg');
              if(!pcg||pcg.style.display==='none')renderPcContent();
            }}
          else if(id==='og10_nt'){notices=ld('og10_nt',[]);if(document.getElementById('pg-not').classList.contains('show'))renderNotice();}
          else if(id==='og10_pkg'){packages=ld('og10_pkg',[]);}
          else if(id==='og10_pr'){
            products=ld('og10_pr',[]);
            // PC 상품관리 화면 갱신
            if(window.innerWidth>=960&&typeof renderPcContent==='function'){
              const pcgp=document.getElementById('pcg');
              if(!pcgp||pcgp.style.display==='none')renderPcContent();
            }
          }
          else if(id==='og10_rf'){refunds=ld('og10_rf',[]);}
          else if(id==='og10_cs'){consultations=ld('og10_cs',[]);if(document.getElementById('pg-mem')&&document.getElementById('pg-mem').classList.contains('show'))renderMem();if(window.innerWidth>=960&&typeof renderPcContent==='function'){const pcgc=document.getElementById('pcg');if(!pcgc||pcgc.style.display==='none')renderPcContent();}} 
        }
      }
    });
  });
}

function getWeekNum(d){const f=new Date(d.getFullYear(),d.getMonth(),1);return Math.ceil((d.getDate()+(f.getDay()+6)%7)/7);}

// ── 드래그 팔로우 스와이프 ──────────────────────────────────────────────
let swTouchStartX=0,swTouchStartY=0,swDirLocked=false,swIsH=false,swAnimating=false;
let swipeLocked=false,swipeLockTimer=null; // 핀치 직후 스와이프 잠금

function initSwipe(el2){
  el2.addEventListener('touchstart',e=>{
    // 핀치 중이거나 2개 이상 손가락이면 무시
    if(swAnimating||e.touches.length>=2||calPinching||swipeLocked)return;
    // ★ 최소 축소 수준이 아니면 스와이프 안됨 (확대됐을 때는 가로 스크롤만)
    if(calScale>1.08)return;
    swTouchStartX=e.touches[0].clientX;
    swTouchStartY=e.touches[0].clientY;
    swDirLocked=false;swIsH=false;
    el2.style.transition='none';
  },{passive:true});

  el2.addEventListener('touchmove',e=>{
    if(swAnimating||e.touches.length>=2||calPinching||swipeLocked)return;
    if(calScale>1.08)return;
    const dx=e.touches[0].clientX-swTouchStartX;
    const dy=e.touches[0].clientY-swTouchStartY;
    if(!swDirLocked){
      if(Math.abs(dx)>16||Math.abs(dy)>16){
        // 수평이 수직보다 2배 이상 확실할 때만 스와이프
        swIsH=Math.abs(dx)>Math.abs(dy)*2.0;
        swDirLocked=true;
      }
    }
    if(swIsH){
      const resist=dx>0&&weekOff<=-(52)||dx<0&&weekOff>=(52)?0.2:1;
      el2.style.transform='translateX('+(dx*resist)+'px)';
    }
  },{passive:true});

  el2.addEventListener('touchend',e=>{
    if(swAnimating||!swIsH||calPinching||swipeLocked){el2.style.transform='';swIsH=false;swDirLocked=false;return;}
    if(calScale>1.08){el2.style.transform='';swIsH=false;swDirLocked=false;return;}
    const dx=e.changedTouches[0].clientX-swTouchStartX;
    const w=el2.offsetWidth||window.innerWidth;
    if(Math.abs(dx)>w*0.2){
      const dir=dx<0?1:-1;
      swAnimating=true;
      el2.style.transition='transform .25s cubic-bezier(.4,0,.2,1)';
      el2.style.transform='translateX('+(dir<0?w:-w)+'px)';
      setTimeout(()=>{
        el2.style.transition='none';el2.style.transform='';
        weekOff+=dir;renderDays();renderTimes();
        const newBody=document.querySelector('.week-body');
        if(newBody){
          newBody.style.transition='none';
          newBody.style.transform='translateX('+(dir>0?w:-w)+'px)';
          requestAnimationFrame(()=>{
            requestAnimationFrame(()=>{
              newBody.style.transition='transform .25s cubic-bezier(.4,0,.2,1)';
              newBody.style.transform='translateX(0)';
              setTimeout(()=>{newBody.style.transition='';swAnimating=false;},260);
            });
          });
        } else {swAnimating=false;}
      },240);
    } else {
      el2.style.transition='transform .2s cubic-bezier(.4,0,.2,1)';
      el2.style.transform='translateX(0)';
      setTimeout(()=>{el2.style.transition='';},210);
    }
    swIsH=false;swDirLocked=false;
  },{passive:true});
}

function animWeekChange(dir){
  const body=document.querySelector('.week-body');
  if(!body||swAnimating){weekOff+=dir;renderDays();renderTimes();return;}
  const w=body.offsetWidth||window.innerWidth;
  swAnimating=true;
  body.style.transition='transform .22s cubic-bezier(.4,0,.2,1)';
  body.style.transform='translateX('+(dir>0?-w:w)+'px)';
  setTimeout(()=>{
    body.style.transition='none';body.style.transform='';
    weekOff+=dir;renderDays();renderTimes();
    const nb=document.querySelector('.week-body');
    if(nb){
      nb.style.transition='none';nb.style.transform='translateX('+(dir>0?w:-w)+'px)';
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        nb.style.transition='transform .22s cubic-bezier(.4,0,.2,1)';nb.style.transform='translateX(0)';
        setTimeout(()=>{nb.style.transition='';swAnimating=false;},230);
      }));
    } else {swAnimating=false;}
  },210);
}

function renderTimes(){
  const wd=getWeekDates(weekOff);
  const list=document.getElementById('tlist');if(!list)return;const _savedScrollTop=(list.querySelector('.week-body')||{}).scrollTop||0;
  const _savedScrollLeft=(list.querySelector('.week-body')||{}).scrollLeft||0;list.innerHTML='';
  list.style.cssText='display:flex;flex-direction:column;overflow:hidden;';

  // ── 요일 헤더 ──
  const hdrRow=list.appendChild(el('div','week-hdr-row'));
  const timePad=hdrRow.appendChild(el('div'));timePad.style.cssText='width:44px;flex-shrink:0;background:var(--bg1);border-right:1px solid var(--bd);position:sticky;left:0;z-index:5;';

  wd.forEach((d,i)=>{
    const isT=isToday(d);
    const hdr=hdrRow.appendChild(el('div','week-col-hdr'+(isT?' today':'')));
    hdr.dataset.hdrcol='1';

      // 이 셀의 슬롯들
      const _isAdmin=isAdminUser();
      const cellSlots=slots.filter(s=>s.date===key&&s.time===time&&(_isAdmin||!curUser||s.trainerId===curUser));
      cellSlots.forEach(s=>{
        const tr=trainers.find(t=>t.id===s.trainerId);if(!tr)return;
        const col=getTrainerColor(tr);
        const mb=s.memberId?members.find(m=>m.id===s.memberId):null;
        const plan=s.planId&&mb?(mb.plans||[]).find(p=>p.id===s.planId):null;

          return;
        }
        const _durMin=s.type==='50분 수업'?50:s.type==='OT'?50:s.type==='25분 수업'?25:30;

        else{wslot.style.cssText='background:'+col.bg+';color:'+col.text+';border-radius:3px;padding:2px 3px;overflow:hidden;line-height:1.3;';}
        // 트레이너명 (항상 표시)
        const nd=document.createElement('div');nd.className='wslot-name';nd.style.cssText='white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:9px;font-weight:700;';
        nd.textContent=tr.name;wslot.appendChild(nd);
        // 회원명 or 메모 (zoom 기준 이상일 때만)
        const subName=mb?mb.name:s.memo;
        if(subName){const sd=document.createElement('div');sd.className='wslot-sub';sd.textContent=subName;wslot.appendChild(sd);}
        // 사용횟수/총횟수 (zoom 크면 표시) e.g. 3/30
        if(plan&&s.type!=='OT'){const used=getPlanUsed(plan.id);const rd=document.createElement('div');rd.className='wslot-used';rd.textContent=used+'/'+plan.sessions;wslot.appendChild(rd);}
        wslot.title=tr.name+(mb?' · '+mb.name:'')+(s.memo?' · '+s.memo:'')+(plan&&s.type!=='OT'?' · '+getPlanUsed(plan.id)+'/'+plan.sessions:'');
        wslot.onclick=e=>{e.stopPropagation();openSlotDetail(s.id);};
      });

      // 클릭으로 추가
      cell.onclick=()=>{selDay=i;reqLogin(()=>openAddSheet(time));};
    });
  });
  // 줌 레벨 적용
  applyCalZoom();
}

// ── 캘린더 핀치 줌 ──
function applyCalZoom(){
  const tlist=document.getElementById('tlist');
  const body=tlist?tlist.querySelector('.week-body'):null;
  const hdrRow=tlist?tlist.querySelector('.week-hdr-row'):null;
  if(!body)return;

  // 줌 클래스
  const cls=['zoom-compact','zoom-normal','zoom-large'];
  body.classList.remove(...cls);
  if(calScale<0.82)body.classList.add('zoom-compact');
  else if(calScale>=1.3)body.classList.add('zoom-large');
  else body.classList.add('zoom-normal');

  // 셀 높이 조정
  const cellH=Math.round(44*calScale);
  body.querySelectorAll('.week-cell').forEach(c=>c.style.minHeight=cellH+'px');
  body.querySelectorAll('.week-time-lbl').forEach(c=>c.style.minHeight=cellH+'px');
  // 장시간 슬롯 높이 비율 적용 (50분 등)
  body.querySelectorAll('[data-dur-min]').forEach(sl=>{
    const dur=parseInt(sl.dataset.durMin)||30;
    sl.style.height=Math.round(dur/30*cellH-4)+'px';
  });

  // 열 너비 조정 — 확대 시 overflow-x 스크롤 발생
  const TIME_COL_W=44;
  const totalW=body.clientWidth||window.innerWidth;
  const availW=totalW-TIME_COL_W;
  // 기본 열 너비: 화면을 딱 채우는 크기. scale 적용하면 넘칠 수 있음
  const baseColW=Math.floor(availW/7);
  const colW=Math.max(28, Math.round(baseColW*Math.max(calScale,1)));

  // day columns
  body.querySelectorAll('[data-daycol]').forEach(col=>{
    col.style.flex='none';
    col.style.width=colW+'px';
    col.style.minWidth=colW+'px';
  });

  // header day cells
  if(hdrRow){
    hdrRow.querySelectorAll('[data-hdrcol]').forEach(hdr=>{
      hdr.style.flex='none';
      hdr.style.width=colW+'px';
      hdr.style.minWidth=colW+'px';
    });
    // hdrRow 전체 너비 (timePad sticky + 7 cols)
    hdrRow.style.minWidth=(TIME_COL_W + colW*7)+'px';
  }
}

// 핀치 중 여부 (스와이프 충돌 방지용 전역)
let calPinching=false;

function initCalPinch(body){
  let startDist=0, startScale=1;
  let pinchMidX=0, pinchMidY=0;   // 핀치 중심 (body 기준 px)
  let startScrollLeft=0, startScrollTop=0; // 핀치 시작 시 스크롤 위치

  body.addEventListener('touchstart',e=>{
    if(e.touches.length===2){
      calPinching=true;
      startDist=Math.hypot(
        e.touches[0].clientX-e.touches[1].clientX,
        e.touches[0].clientY-e.touches[1].clientY
      );
      startScale=calScale;

      // ★ 핀치 중심점 기록 (body 뷰포트 기준)
      const rect=body.getBoundingClientRect();
      pinchMidX=((e.touches[0].clientX+e.touches[1].clientX)/2)-rect.left;
      pinchMidY=((e.touches[0].clientY+e.touches[1].clientY)/2)-rect.top;

      // ★ 핀치 시작 시 스크롤 위치 기록
      startScrollLeft=body.scrollLeft;
      startScrollTop=body.scrollTop;

      e.preventDefault();
    }else{
      if(e.touches.length===1)calPinching=false;
    }
  },{passive:false});

  body.addEventListener('touchmove',e=>{
    if(!calPinching||e.touches.length!==2)return;
    const dist=Math.hypot(
      e.touches[0].clientX-e.touches[1].clientX,
      e.touches[0].clientY-e.touches[1].clientY
    );
    const ratio=dist/startDist;
    calScale=Math.max(0.55,Math.min(5.0,startScale*ratio));

    // ★ 핀치 중심 기준 확대: 중심점 아래 콘텐츠 좌표 유지
    const contentX=startScrollLeft+pinchMidX; // 핀치 중심 아래 콘텐츠 X (시작 스케일 기준)
    const contentY=startScrollTop+pinchMidY;  // 핀치 중심 아래 콘텐츠 Y

    applyCalZoom();

    // 새 스케일에서 같은 콘텐츠 포인트가 같은 화면 위치에 오도록 스크롤 조정
    const scaleRatio=calScale/startScale;
    body.scrollLeft=contentX*scaleRatio-pinchMidX;
    body.scrollTop=contentY*scaleRatio-pinchMidY;

    e.preventDefault();
  },{passive:false});

  body.addEventListener('touchend',e=>{
    if(e.touches.length<2){
      calPinching=false;
      // ★ 핀치 종료 후 400ms 스와이프 잠금 (실수 방지)
      swipeLocked=true;
      clearTimeout(swipeLockTimer);
      swipeLockTimer=setTimeout(()=>{swipeLocked=false;},400);
    }
  });
}

// ── CRM 수업 등록 시 라인핏 og10_bk 동기화 ─────────────────────────────
function writeCrmBk(slot){
  if(!slot.memberId)return;
  const mb=members.find(m=>m.id===slot.memberId);if(!mb)return;
  const plan=slot.planId?(mb.plans||[]).find(p=>p.id===slot.planId):null;
  const tr=trainers.find(t=>t.id===slot.trainerId);
  const dur=(slot.type||'').includes('50')?50:25;
  firebase.firestore().collection('og10_bk').add({
    memberId:slot.memberId,memberName:mb.name||'',
    trainerId:slot.trainerId||'',trainerName:tr?tr.name:'',
    date:slot.date,time:slot.time,
    type:slot.type||'수업',
    planId:slot.planId||null,
    planName:plan?(plan.productName||(plan.sessions+'회권')):'',
    duration:dur,status:'confirmed',source:'crm',
    memo:slot.memo||'',
    requestedAt:firebase.firestore.FieldValue.serverTimestamp(),
    slotId:slot.id
  }).then(ref=>{slot.bkId=ref.id;sv('og10_sl',slots);}).catch(e=>console.warn('writeCrmBk',e));
}
function updateCrmBk(bkId,fields){
  if(!bkId)return;
  firebase.firestore().collection('og10_bk').doc(bkId).update(fields).catch(e=>console.warn('updateCrmBk',e));
}

function openAddSheet(time){
  const wd=getWeekDates(weekOff);const sd=wd[selDay];const key=dateKey(sd);
  const dn=['일','월','화','수','목','금','토'];
  const curTr=trainers.find(t=>t.id===curUser);
  const isAdminRole=curTr&&curTr.role==='관리자';
  showSheet(function(sheet,close){
    sheet.appendChild(el('div','shdl'));
    sheet.appendChild(mk('h3','','스케줄 추가'));
    sheet.appendChild(mk('div','shsub',dn[sd.getDay()]+'요일 '+(sd.getMonth()+1)+'월'+sd.getDate()+'일'+(time?' · '+time:'')));
    sheet.appendChild(mk('label','','직원'));
    let tsel;
    if(isAdminUser()){
      tsel=sheet.appendChild(el('select'));
      trainers.forEach(t=>{const o=tsel.appendChild(document.createElement('option'));o.value=t.id;o.textContent=t.name+' ('+t.role+')';if(t.id===curUser)o.selected=true;});
    } else {
      sheet.appendChild(mk('div','trinfo-box',curTr?curTr.name+' ('+curTr.role+')':''));
      tsel={value:curUser};
    }
    sheet.appendChild(mk('label','','시간'));
    const tmsel=sheet.appendChild(el('select'));TIMES.forEach(t=>{const o=tmsel.appendChild(document.createElement('option'));o.value=t;o.textContent=t;if(t===time)o.selected=true;});
    sheet.appendChild(mk('label','','회원'));
    const mbsel=sheet.appendChild(el('select'));
    mbsel.appendChild(document.createElement('option')).textContent='-- 회원 없음 --';
    const getTid=()=>typeof tsel.value==='string'?tsel.value:curUser;
    function fillMbs(tid){while(mbsel.options.length>1)mbsel.remove(1);members.filter(m=>m.trainerId===tid).forEach(m=>{const o=mbsel.appendChild(document.createElement('option'));o.value=m.id;o.textContent=m.name;});}
    fillMbs(getTid());
    if(isAdminUser()&&tsel.addEventListener){tsel.onchange=()=>{fillMbs(tsel.value);updateTypes();updatePlans();};}
    sheet.appendChild(mk('label','','일정 유형'));
    const tyWrap=sheet.appendChild(el('div'));tyWrap.id='ty-wrap';
    let tysel=null;
    const planLbl=sheet.appendChild(mk('label','','권종 선택'));
    const planWrap=sheet.appendChild(el('div'));planWrap.id='plan-wrap';
    const moLbl=sheet.appendChild(mk('label','','메모 (선택)'));
    const mo=sheet.appendChild(el('input'));mo.type='text';mo.placeholder='메모';
    let selectedPlanId=null;
    function updateTypes(){
      const tid=getTid();const mbId=mbsel.value;const mb=mbId?members.find(m=>m.id===mbId):null;
      const tw=document.getElementById('ty-wrap');if(!tw)return;tw.innerHTML='';
      let types=[];
      if(mb){
        const durs=[...new Set((mb.plans||[]).map(p=>p.duration))];
        if(durs.includes(25))types.push('25분 수업');if(durs.includes(50))types.push('50분 수업');types.push('OT');
      } else {types=['OT','25분 수업','50분 수업','상담','차단'];}
      const tr2=trainers.find(t=>t.id===tid);
      if(tr2&&tr2.role==='관리자'&&!types.includes('상담'))types.push('상담');
      tysel=tw.appendChild(el('select'));types.forEach(t=>{const o=tysel.appendChild(document.createElement('option'));o.value=t;o.textContent=t;});
      tysel.onchange=updatePlans;updatePlans();
    }
    function updatePlans(){
      const mbId=mbsel.value;const mb=mbId?members.find(m=>m.id===mbId):null;
      const ty=tysel?tysel.value:'';const pw=document.getElementById('plan-wrap');if(!pw)return;
      pw.innerHTML='';selectedPlanId=null;
      const showConsult=ty==='상담'&&isAdminRole;
      moLbl.textContent=showConsult?'상담 내용':'메모 (선택)';mo.placeholder=showConsult?'상담 내용 입력':'메모';
      if(ty==='차단'){planLbl.style.display='none';pw.style.display='none';return;}
      if(!mb||ty==='OT'||ty==='상담'||!ty.includes('수업')){planLbl.style.display='none';pw.style.display='none';return;}
      const dur=ty.startsWith('25')?25:50;
      const matchPlans=(mb.plans||[]).filter(p=>p.duration===dur);

function openCal(){
  let cy=new Date().getFullYear(),cm=new Date().getMonth();
  function draw(){
    const cont=document.getElementById('cal-cont');cont.innerHTML='';
    const bg=cont.appendChild(el('div','calbg'));bg.onclick=e=>{if(e.target===bg)cont.innerHTML='';};
    const box=bg.appendChild(el('div','calbox'));
    const nav=box.appendChild(el('div','calnav'));
    nav.appendChild(mk('button','calarr','◀')).onclick=()=>{cm--;if(cm<0){cm=11;cy--;}draw();};
    nav.appendChild(mk('div','callbl',cy+'년 '+(cm+1)+'월'));
    nav.appendChild(mk('button','calarr','▶')).onclick=()=>{cm++;if(cm>11){cm=0;cy++;}draw();};
    const grid=box.appendChild(el('div','calgrid'));
    ['월','화','수','목','금','토','일'].forEach(d=>grid.appendChild(mk('div','caldw',d)));
    const fd=(new Date(cy,cm,1).getDay()+6)%7,dim=new Date(cy,cm+1,0).getDate();
    const tod=new Date();const cwd=getWeekDates(weekOff);
    for(let i=0;i<fd;i++)grid.appendChild(el('div','calday e'));
    for(let d=1;d<=dim;d++){
      const dt=new Date(cy,cm,d);
      const de=grid.appendChild(mk('div','calday'+(dateKey(dt)===dateKey(tod)?' now':'')+(cwd.some(w=>dateKey(w)===dateKey(dt))?' cw':''),''+d));
      de.onclick=()=>{
        const nm=new Date();nm.setDate(nm.getDate()-((nm.getDay()+6)%7));nm.setHours(0,0,0,0);
        const cm2=new Date(dt);cm2.setDate(dt.getDate()-((dt.getDay()+6)%7));cm2.setHours(0,0,0,0);
        weekOff=Math.round((cm2-nm)/(7*24*60*60*1000));selDay=(dt.getDay()+6)%7;
        cont.innerHTML='';renderDays();renderTimes();
      };
    }
    box.appendChild(mk('button','calclose','닫기')).onclick=()=>cont.innerHTML='';
  }
  draw();
}

  function doChist(){
    const ra2=document.getElementById('chist-result');if(!ra2)return;ra2.innerHTML='';
    const kw=chistKw.trim();
    const matched=consultations.filter(c=>{
      if(kw&&!c.name.includes(kw)&&!(c.phone||'').includes(kw))return false;
      if(chistInflow&&c.inflow!==chistInflow)return false;
      if(chistStatus&&c.status!==chistStatus)return false;
      return true;
    }).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));

    if(!matched.length){ra2.appendChild(mk('div','mq-empty',kw||chistInflow||chistStatus?'검색 결과가 없습니다.':'등록된 상담자가 없습니다.'));return;}
    ra2.appendChild(mk('div','mq-result-ttl',(kw||chistInflow||chistStatus?'검색 결과 ':'전체 ')+matched.length+'명'));

    matched.forEach(c=>{
      const card=ra2.appendChild(el('div','chist-card'));
      // 이름 + 날짜
      const top=card.appendChild(el('div','chist-top'));
      top.appendChild(mk('div','chist-name',c.name));
      top.appendChild(mk('div','',c.contactDate||'')).style.cssText='font-size:11px;color:var(--t4);';
      // 연락처 (탭하면 전화)
      if(c.phone){
        const ph=card.appendChild(mk('div','',c.phone));
        ph.style.cssText='font-size:12px;color:#4a9eff;cursor:pointer;margin-bottom:4px;';
        ph.onclick=()=>window.open('tel:'+c.phone.replace(/-/g,''));
      }
      // 배지
      const bdgs=card.appendChild(el('div','chist-badges'));
      const stMap={done:'연락완료',missed:'부재중',pending:'대기'};
      const stCls={done:'chist-status-done',missed:'chist-status-missed',pending:'chist-status-pending'};
      bdgs.appendChild(mk('div','chist-badge '+(stCls[c.status]||'chist-status-pending'),stMap[c.status]||'대기'));
      if(c.inflow)bdgs.appendChild(mk('div','chist-badge chist-inflow',c.inflow));
      // 메모
      if(c.memo)card.appendChild(mk('div','chist-memo',c.memo));
      // 상담 이력
      const hist=c.history||[];
      if(hist.length){
        const hbox=card.appendChild(el('div','chist-hist'));
        hist.slice().reverse().slice(0,3).forEach(h=>{
          const row=hbox.appendChild(el('div','chist-hist-row'));
          const typEl=row.appendChild(mk('div','chist-hist-type '+(h.type==='done'?'done':'missed'),h.type==='done'?'완료':'부재중'));
          row.appendChild(mk('div','',fmtTs(h.ts)));
          if(h.memo)row.appendChild(mk('div','',h.memo));
        });
        if(hist.length>3){const more=card.appendChild(mk('div','','+ '+(hist.length-3)+'건 더 보기'));more.style.cssText='font-size:11px;color:#555;cursor:pointer;margin-top:4px;';more.onclick=()=>viewConsultHistory(c.id);}
      }
      // 삭제 버튼
      const acts=card.appendChild(el('div',''));acts.style.cssText='display:flex;gap:6px;margin-top:10px;';
      const editBtn=acts.appendChild(mk('button','con-btn','수정'));editBtn.onclick=()=>openEditConsult(c.id);
      const delBtn=acts.appendChild(mk('button','con-del','×'));delBtn.onclick=()=>{if(confirm(c.name+' 삭제?')){consultations=consultations.filter(x=>x.id!==c.id);sv('og10_cs',consultations);renderMem();}};
    });
  }
}

function dlConsultXLSX(){
  if(typeof XLSX==='undefined'){alert('잠시 후 다시 시도해주세요.');return;}
  const matched=consultations.filter(c=>{
    if(chistInflow&&c.inflow!==chistInflow)return false;
    if(chistStatus&&c.status!==chistStatus)return false;
    return true;
  }).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  const stMap={done:'연락완료',missed:'부재중',pending:'대기'};
  const wsData=[['이름','연락처','유입경로','상태','연락예정일','등록일','메모','이력수']];
  matched.forEach(c=>{
    const regDate=c.createdAt?new Date(c.createdAt).toLocaleDateString('ko-KR'):'';
    wsData.push([c.name,c.phone||'',c.inflow||'',stMap[c.status]||'',c.contactDate||'',regDate,c.memo||'',(c.history||[]).length]);
  });
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols']=[{wch:10},{wch:14},{wch:10},{wch:10},{wch:12},{wch:12},{wch:20},{wch:8}];
  XLSX.utils.book_append_sheet(wb,ws,'상담내역');
  const today=new Date();const ds=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
  XLSX.writeFile(wb,'상담내역_'+ds+'.xlsx');
}

function openConsultHistory(cid, action){
  const c=consultations.find(x=>x.id===cid);if(!c)return;
  const isComplete=action==='done';
  showSheet(function(sheet,close){
    sheet.appendChild(el('div','shdl'));
    sheet.appendChild(mk('h3','',isComplete?'연락 완료 기록':'부재중 기록'));
    sheet.appendChild(mk('div','shsub',c.name+' · '+(c.phone||'')));
    sheet.appendChild(mk('label','','상담 메모 (선택)'));
    const mi=sheet.appendChild(el('textarea'));
    mi.style.cssText='width:100%;min-height:70px;padding:12px 14px;border:1px solid var(--bd2);border-radius:10px;background:var(--bg2);color:var(--t1);font-size:14px;font-family:inherit;resize:none;';
    mi.placeholder=isComplete?'상담 내용 메모...':'부재중 메모...';

      btns.appendChild(mk('button','shok','기록 저장')).onclick=()=>{

        c.status='done';c.doneAt=Date.now();
        sv('og10_cs',consultations);close();renderMem();
      };

      const delBtn=sheet.appendChild(mk('button','','완료 처리 후 목록에서 삭제'));
      delBtn.style.cssText='width:100%;padding:11px;border-radius:10px;border:1px solid var(--bd2);background:transparent;color:var(--t3);font-size:13px;cursor:pointer;margin-top:8px;';
      delBtn.onclick=()=>{

        consultations=consultations.filter(x=>x.id!==c.id);sv('og10_cs',consultations);close();renderMem();
      };
    }
  });

// ── MEMBER TAB ──
function renderMem(){
  const ct=document.getElementById('pg-mem').querySelector('.pad');ct.innerHTML='';
  if(!curUser&&!isAdminUser()){
    const lb=ct.appendChild(el('div','lockbox'));lb.appendChild(mk('p','','회원관리는 로그인이 필요합니다.'));lb.appendChild(mk('button','','로그인하기')).onclick=()=>openLogin(()=>{renderMem();});return;
  }

  // 서브탭 (PC와 동일)
  const stWrap=ct.appendChild(el('div','mem-subtabs'));
  [['member','회원 관리'],['consult','상담 관리'],['chist','상담 내역']].forEach(([v,l])=>{
    const b=stWrap.appendChild(mk('button','mem-stab'+(memSubTab===v?' on':''),l));b.onclick=()=>{
      const oldIdx=memSubTabOrder.indexOf(memSubTab);
      const newIdx=memSubTabOrder.indexOf(v);
      _lastMemSubTab=memSubTab;
      window._memSlideDir=newIdx>oldIdx?'right':'left';
      memSubTab=v;renderMem();
    };
  });
  // 콘텐츠 래퍼 (탭바 제외, 콘텐츠만 슬라이드)
  const memContent=ct.appendChild(Object.assign(document.createElement('div'),{style:'position:relative;'}));
  if(window._memSlideDir){
    memContent.style.animation=(window._memSlideDir==='right'?'slideInRight':'slideInLeft')+' .22s ease forwards';
    window._memSlideDir=null;
  }
  if(memSubTab==='consult'){renderConsult(memContent);return;}
  if(memSubTab==='chist'){renderConsultHistory(memContent);return;}

  // 회원 관리 탭 - PC 스타일
  // 상단: 서브필터 + 등록 버튼
  const toolbar=memContent.appendChild(document.createElement('div'));
  toolbar.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;';
  
  // 트레이너 필터
  if(!window._mobMemTr)window._mobMemTr='';
  const trRow=memContent.appendChild(document.createElement('div'));
  trRow.style.cssText='display:flex;gap:6px;overflow-x:auto;margin-bottom:10px;padding-bottom:2px;';
  [{id:'',name:'전체'},...trainers].forEach(tr=>{
    const isOn=window._mobMemTr===(tr.id||'');
    const btn=trRow.appendChild(document.createElement('button'));
    btn.textContent=tr.name;
    btn.style.cssText='padding:5px 12px;border-radius:8px;border:1px solid '+(isOn?'#818cf8':'#1e2026')+';background:'+(isOn?'rgba(129,140,248,.15)':'transparent')+';color:'+(isOn?'#818cf8':'#6b7494')+';font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;';
    btn.onclick=()=>{window._mobMemTr=tr.id||'';renderMem();};
  });

  // 상태 필터 버튼
  let mobMemFilter=window._mobMemFilter||'all';
  const filterMap={all:'전체',active:'활성',expiring:'만료임박',expired:'만료',none:'미등록',noweek:'주간미수업',nextweek:'차주미수업'};
  const filterBar=toolbar.appendChild(document.createElement('div'));
  filterBar.style.cssText='display:flex;gap:6px;flex:1;overflow-x:auto;';
  Object.entries(filterMap).forEach(([k,l])=>{
    const btn=filterBar.appendChild(document.createElement('button'));
    btn.style.cssText='padding:6px 12px;border-radius:8px;border:1px solid '+(mobMemFilter===k?'#818cf8':'#1e2026')+';background:'+(mobMemFilter===k?'rgba(129,140,248,.1)':'transparent')+';color:'+(mobMemFilter===k?'#818cf8':'#6b7494')+';font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;';
    btn.textContent=l;
    btn.onclick=()=>{window._mobMemFilter=k;renderMem();};
  });

  // 등록 버튼
  const regBtn=toolbar.appendChild(document.createElement('button'));
  regBtn.style.cssText='padding:8px 14px;border-radius:8px;border:none;background:#818cf8;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;';
  regBtn.textContent='+ 등록';
  regBtn.onclick=()=>openPcAddMember();

  // 주간미수업 탭일 때 엑셀 버튼 추가
  if(mobMemFilter==='noweek'){
    const xlBtn=toolbar.appendChild(document.createElement('button'));
    xlBtn.style.cssText='padding:8px 12px;border-radius:8px;border:1px solid #d97706;background:transparent;color:#d97706;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;';
    xlBtn.textContent='엑셀';
    xlBtn.onclick=dlNoWeekXLSX;
  }

  // 검색
  const searchWrap=memContent.appendChild(document.createElement('div'));
  searchWrap.style.cssText='margin-bottom:12px;';
  const searchInp=searchWrap.appendChild(document.createElement('input'));
  searchInp.style.cssText='width:100%;padding:10px 14px;border:1px solid #1e2026;border-radius:10px;background:#111318;color:#e2e8f0;font-size:14px;outline:none;box-sizing:border-box;font-family:inherit;';
  searchInp.placeholder='이름 또는 연락처 검색...';
  searchInp.value=window._mobMemKw||'';
  searchInp.oninput=e=>{window._mobMemKw=e.target.value;};
  searchInp.onkeydown=e=>{if(e.key==='Enter')renderMem();};

  // 회원 목록
  let list=members.slice();
  if(window._mobMemTr)list=list.filter(m=>m.trainerId===window._mobMemTr);
  const kw=(window._mobMemKw||'').trim();
  if(kw)list=list.filter(m=>m.name.includes(kw)||(m.phone||'').includes(kw));
  const flt=window._mobMemFilter||'all';
  if(flt==='noweek'){const nwAll=getWeekNoSesMembers();list=window._mobMemTr?nwAll.filter(m=>m.trainerId===window._mobMemTr):nwAll;}
  else if(flt==='nextweek'){const nxAll=getNextWeekNoSesMembers();list=window._mobMemTr?nxAll.filter(m=>m.trainerId===window._mobMemTr):nxAll;}
  else if(flt==='expiring')list=list.filter(m=>{let t=0;(m.plans||[]).forEach(p=>{t+=getPlanRemain(p);});return t>0&&t<=2;});
  else if(flt==='active')list=list.filter(m=>{const st=pcMbStatus?pcMbStatus(m):'none';return st==='active'||st==='expiring';});
  else if(flt!=='all')list=list.filter(m=>pcMbStatus&&pcMbStatus(m)===flt);

  memContent.appendChild(Object.assign(document.createElement('div'),{textContent:'총 '+list.length+'명'})).style.cssText='font-size:12px;color:#4a5068;margin-bottom:8px;';

  if(!list.length){
    memContent.appendChild(Object.assign(document.createElement('div'),{textContent:'회원이 없습니다.'})).style.cssText='text-align:center;padding:40px;color:#2a2d45;font-size:14px;';
    return;
  }

  // 회원 카드 리스트
  list.forEach(m=>{
    const tr2=trainers.find(t=>t.id===m.trainerId);
    const col=tr2?getTrainerColor(tr2):{bg:'#1e2026',text:'#8892aa',dot:'#8892aa'};
    const st=pcMbStatus?pcMbStatus(m):'none';
    const stLbl={active:'활성',expiring:'만료임박',expired:'만료',none:'미등록'};
    const stCl={active:'#68d391',expiring:'#f6ad55',expired:'#4a5068',none:'#2a2d45'};
    const card=memContent.appendChild(document.createElement('div'));
    card.style.cssText='background:#111318;border:1px solid #1e2026;border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;';
    card.onclick=()=>openMobMemberDetail(m.id);
    // 아바타
    const av=card.appendChild(document.createElement('div'));
    av.style.cssText='width:40px;height:40px;border-radius:50%;background:'+col.bg+';color:'+col.text+';display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;';
    av.textContent=(m.name||'?').slice(0,2);
    // 정보
    const info=card.appendChild(document.createElement('div'));info.style.cssText='flex:1;min-width:0;';
    info.innerHTML='<div style="font-size:14px;font-weight:700;color:#e2e8f0;margin-bottom:3px;">'+m.name+'</div>'
      +'<div style="font-size:12px;color:#4a5068;">'+(tr2?tr2.name:'-')+' · '+(m.phone||'-')+'</div>';
    // 상태
    const stBadge=card.appendChild(document.createElement('div'));
    stBadge.style.cssText='font-size:11px;font-weight:700;color:'+stCl[st]+';background:rgba(255,255,255,.05);padding:3px 8px;border-radius:6px;border:1px solid '+stCl[st]+'40;white-space:nowrap;';
    stBadge.textContent=stLbl[st]||st;
  });
}

// 모바일 회원 상세 (PC 모달 그대로 활용)

  // PC 회원 상세 모달 사용
  pcDetailMbId=mbId;
  const ov=document.createElement('div');

function dlCSV(tid,year,month){
  const tr=trainers.find(t=>t.id===tid);if(!tr)return;
  const msl=slots.filter(s=>{if(s.trainerId!==tid)return false;const p=s.date.split('-').map(Number);return p[0]===year&&p[1]===month;}).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  let csv='\uFEFF트레이너: '+tr.name+'\n'+year+'년 '+month+'월\n\n날짜,요일,시간,회원명,일정유형,권종,단가(원),잔여횟수,메모\n';
  let total=0;
  msl.forEach(s=>{
    const p=s.date.split('-').map(Number);const d=new Date(p[0],p[1]-1,p[2]);const dow=['일','월','화','수','목','금','토'][d.getDay()];
    const mb=s.memberId?members.find(m=>m.id===s.memberId):null;
    const plan=s.planId&&mb?(mb.plans||[]).find(x=>x.id===s.planId):null;
    const price=plan&&s.type!=='OT'?plan.pricePerSession:0;total+=price;
    const rem=plan?getPlanRemain(plan):'';
    csv+=s.date+','+dow+','+s.time+','+(mb?mb.name:'')+','+s.type+','+(plan?plan.sessions+'회권':'')+','+(price?price.toLocaleString():'')+','+(rem!==''?rem:'')+','+(s.memo||'')+'\n';
  });
  csv+='\n총 '+msl.length+'회 / 합계: '+total.toLocaleString()+'원\n';
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=tr.name+'_'+year+'년'+month+'월.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function openTrainerOffSheet(trId){

      for(let h=6;h<=23;h++){for(let m=0;m<60;m+=30){

      dateRow.appendChild(mk('button','sbtn','추가')).onclick=()=>{
        const v=dateInp.value;if(!v)return;

        dateInp.value='';
      };
      const offList=sheet.appendChild(el('div'));offList.style.cssText='display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px;min-height:30px;';
      offDates.forEach(d=>{
        const tag=offList.appendChild(mk('div','',d+' ×'));

        tag.onclick=()=>{offDates.splice(offDates.indexOf(d),1);tag.remove();};
      });
      const btns=sheet.appendChild(el('div','shbtns'));
      btns.appendChild(mk('button','shno','취소')).onclick=close;
      btns.appendChild(mk('button','shok','저장')).onclick=()=>{
        const s=startSel.value,e=endSel.value;
        dayKeys.forEach(dk=>{if(workHours[dk]!==false){workHours[dk]={start:s,end:e};}});
        docRef.set({workHours,offDates}).then(()=>{alert('저장됐습니다.');close();}).catch(()=>alert('저장 실패'));
      };
    });
  });
}
