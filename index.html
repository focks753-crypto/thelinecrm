function renderAdmAvail(ct){
  const db2=firebase.firestore();
  const dayKeys=['mon','tue','wed','thu','fri','sat','sun'];
  const dayLabels=['월','화','수','목','금','토','일'];

  function normRanges(v){
    if(v===false)return false;
    if(v===undefined||v===null)return [];
    if(Array.isArray(v))return v;
    if(v&&v.start)return [v];
    return [];
  }

  let saveTimer=null;
  function saveAvail(w,wo){
    clearTimeout(saveTimer);
    saveTimer=setTimeout(()=>{
      const finalWh={};dayKeys.forEach(dk=>{const n=normRanges(w[dk]);finalWh[dk]=(n===false)?false:(n||[]);});
      db2.collection('og10_avail').doc(selTrId).set({workHours:finalWh,weeklyOff:wo})
        .then(()=>{const t=document.createElement('div');t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(22,30,40,.97);color:#e6edf3;padding:10px 22px;border-radius:20px;font-size:14px;font-weight:600;z-index:9999;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.5);';t.textContent='✅ 자동 저장됐습니다.';document.body.appendChild(t);setTimeout(()=>t.remove(),2000);})
        .catch(()=>{const t=document.createElement('div');t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(248,113,113,.95);color:#fff;padding:10px 22px;border-radius:20px;font-size:14px;font-weight:600;z-index:9999;pointer-events:none;';t.textContent='❌ 저장 실패';document.body.appendChild(t);setTimeout(()=>t.remove(),2500);});
    },800);
  }

  function isInRanges(time,ranges){
    if(!ranges||ranges===false||!ranges.length)return false;
    const[th,tm]=time.split(':').map(Number),tMin=th*60+tm;
    return ranges.some(r=>{const[sh,sm]=r.start.split(':').map(Number),[eh,em]=r.end.split(':').map(Number);return tMin>=sh*60+sm&&tMin<eh*60+em;});
  }
  function timeOpts(sel,val){
    sel.innerHTML='';
    for(let h=6;h<=23;h++){for(let m=0;m<60;m+=30){const t=p2(h)+':'+p2(m);const o=sel.appendChild(document.createElement('option'));o.value=t;o.textContent=t;if(t===val)o.selected=true;}}
  }

  // ── 즉시 헤더 표시 (renderAdmBookings 패턴) ──
  ct.appendChild(mk('div','sec','예약 설정'));

  if(!trainers.length){
    ct.appendChild(mk('div','sal-empty','직원 탭에서 담당자를 먼저 등록해주세요.'));
    return;
  }

  let selTrId=trainers[0].id;

  function buildAll(){
    if(!ct.isConnected)return;  // 이미 DOM에서 제거된 경우 무시
    ct.innerHTML='';
    ct.appendChild(mk('div','sec','예약 설정'));

    // 담당자 선택
    const trLbl=ct.appendChild(mk('div','','담당자 선택'));
    trLbl.style.cssText='font-size:11px;color:var(--t3);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;';
    const trRow=ct.appendChild(el('div'));
    trRow.style.cssText='display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;';
    trainers.forEach(tr=>{
      const on=tr.id===selTrId;
      const btn=trRow.appendChild(mk('button','',tr.name));
      btn.style.cssText='padding:8px 18px;border-radius:10px;font-size:13px;font-weight:700;border:1.5px solid;cursor:pointer;'
        +'background:'+(on?'var(--pr)':'var(--bg2)')+';color:'+(on?'#fff':'var(--t2)')+';border-color:'+(on?'var(--pr)':'var(--bd)')+';';
      btn.onclick=()=>{selTrId=tr.id;loadAvail();};
    });

    const secDiv=ct.appendChild(el('div'));
    const selTrName=(trainers.find(t=>t.id===selTrId)||{name:''}).name;
    secDiv.textContent=(selTrName?selTrName+' ':'')+'예약 설정';
    secDiv.style.cssText='font-size:11px;color:var(--t3);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--bd);';

    ct.appendChild(mk('div','','불러오는 중...')).style.cssText='padding:24px 0;text-align:center;color:#666;font-size:13px;';
  }

  function renderBody(wh,weeklyOff,selDay){
    if(!ct.isConnected)return;
    ct.innerHTML='';
    ct.appendChild(mk('div','sec','예약 설정'));

    // 담당자 버튼
    const trLbl=ct.appendChild(mk('div','','담당자 선택'));
    trLbl.style.cssText='font-size:11px;color:var(--t3);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;';
    const trRow=ct.appendChild(el('div'));
    trRow.style.cssText='display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;';
    trainers.forEach(tr=>{
      const on=tr.id===selTrId;
      const btn=trRow.appendChild(mk('button','',tr.name));
      btn.style.cssText='padding:8px 18px;border-radius:10px;font-size:13px;font-weight:700;border:1.5px solid;cursor:pointer;'
        +'background:'+(on?'var(--pr)':'var(--bg2)')+';color:'+(on?'#fff':'var(--t2)')+';border-color:'+(on?'var(--pr)':'var(--bd)')+';';
      btn.onclick=()=>{selTrId=tr.id;loadAvail();};
    });

    const secDiv=ct.appendChild(el('div'));
    const selTrName=(trainers.find(t=>t.id===selTrId)||{name:''}).name;
    secDiv.textContent=(selTrName?selTrName+' ':'')+'예약 설정';
    secDiv.style.cssText='font-size:11px;color:var(--t3);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--bd);';

    const isDayOff=wh[selDay]===false;
    const selDayLabel=dayLabels[dayKeys.indexOf(selDay)];

    // 요일별 근무시간 제목
    ct.appendChild(mk('div','','요일별 근무 시간')).style.cssText='font-size:13px;font-weight:700;color:var(--t1);margin-bottom:10px;';

    // 요일▼ + 하루 전체 OFF
    const row1=ct.appendChild(el('div'));
    row1.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:10px;';
    const daySel=row1.appendChild(el('select'));
    daySel.style.cssText='flex:1;padding:10px 12px;border-radius:10px;border:1.5px solid var(--bd);background:var(--bg2);color:var(--t1);font-size:14px;font-weight:700;';
    dayKeys.forEach((dk,i)=>{const o=daySel.appendChild(document.createElement('option'));o.value=dk;o.textContent=dayLabels[i]+'요일';if(dk===selDay)o.selected=true;});
    daySel.onchange=()=>renderBody(wh,weeklyOff,daySel.value);

    const dayOffBtn=row1.appendChild(mk('button','',(isDayOff?'✓ ':'')+'하루 전체 OFF'));
    dayOffBtn.style.cssText='padding:10px 14px;border-radius:10px;font-size:13px;font-weight:700;border:1.5px solid;cursor:pointer;white-space:nowrap;flex-shrink:0;'
      +'background:'+(isDayOff?'rgba(248,113,113,.18)':'var(--bg2)')+';color:'+(isDayOff?'#f87171':'var(--t2)')+';border-color:'+(isDayOff?'rgba(248,113,113,.5)':'var(--bd)')+';';
    dayOffBtn.onclick=()=>{wh[selDay]=isDayOff?[]:false;renderBody(wh,weeklyOff,selDay);saveAvail(wh,weeklyOff);};

    // 시간범위 off설정
    const row2=ct.appendChild(el('div'));
    row2.style.cssText='display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap;';
    const ss='flex:1;min-width:72px;padding:10px 6px;border-radius:10px;border:1.5px solid var(--bd);background:var(--bg2);color:var(--t1);font-size:13px;text-align:center;';
    const offSSel=row2.appendChild(el('select'));offSSel.style.cssText=ss;timeOpts(offSSel,'09:00');
    row2.appendChild(mk('span','','~')).style.cssText='color:var(--t3);font-size:15px;font-weight:700;flex-shrink:0;';
    const offESel=row2.appendChild(el('select'));offESel.style.cssText=ss;timeOpts(offESel,'21:00');
    const offBtn=row2.appendChild(mk('button','','off설정'));
    offBtn.style.cssText='padding:10px 16px;border-radius:10px;font-size:13px;font-weight:700;border:1.5px solid rgba(248,113,113,.4);background:rgba(248,113,113,.15);color:#f87171;cursor:pointer;white-space:nowrap;flex-shrink:0;';
    offBtn.onclick=()=>{
      const[sh,sm]=offSSel.value.split(':').map(Number),[eh,em]=offESel.value.split(':').map(Number);
      if(sh*60+sm>=eh*60+em){showConfirm('종료 시간이 시작 시간보다 늦어야 합니다.',()=>{});return;}
      weeklyOff[selDay]=weeklyOff[selDay]||[];
      for(let m2=sh*60+sm;m2<eh*60+em;m2+=30){const t=p2(Math.floor(m2/60))+':'+p2(m2%60);if(!weeklyOff[selDay].includes(t))weeklyOff[selDay].push(t);}
      renderBody(wh,weeklyOff,selDay);saveAvail(wh,weeklyOff);
    };

    // off 태그
    const offSlots=(weeklyOff[selDay]||[]).slice().sort();
    const offGroups=[];
    offSlots.forEach(t=>{
      const[h,m]=t.split(':').map(Number),min=h*60+m;
      const last=offGroups[offGroups.length-1];
      if(last&&min===last.endMin){last.endMin=min+30;last.slots.push(t);}
      else offGroups.push({start:t,endMin:min+30,slots:[t]});
    });
    const tagWrap=ct.appendChild(el('div'));
    tagWrap.style.cssText='display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;min-height:24px;';
    const ts='display:inline-flex;align-items:center;gap:6px;background:rgba(248,113,113,.18);color:#f87171;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;';
    const xs='cursor:pointer;font-size:16px;line-height:1;opacity:.8;';
    if(isDayOff){
      const tag=tagWrap.appendChild(el('div'));tag.style.cssText=ts;
      tag.appendChild(mk('span','',selDayLabel+'요일 (하루 전체 OFF)'));
      const x=tag.appendChild(mk('span','','×'));x.style.cssText=xs;
      x.onclick=()=>{wh[selDay]=[];renderBody(wh,weeklyOff,selDay);saveAvail(wh,weeklyOff);};
    }
    offGroups.forEach(g=>{
      const endStr=p2(Math.floor(g.endMin/60))+':'+p2(g.endMin%60);
      const tag=tagWrap.appendChild(el('div'));tag.style.cssText=ts;
      tag.appendChild(mk('span','',selDayLabel+'요일 ('+g.start+'~'+endStr+')'));
      const x=tag.appendChild(mk('span','','×'));x.style.cssText=xs;
      x.onclick=()=>{weeklyOff[selDay]=(weeklyOff[selDay]||[]).filter(t=>!g.slots.includes(t));renderBody(wh,weeklyOff,selDay);saveAvail(wh,weeklyOff);};
    });
    if(!isDayOff&&!offGroups.length)
      tagWrap.appendChild(mk('div','','off설정된 시간 없음')).style.cssText='font-size:12px;color:#555;padding:4px 0;';

    // 주간 그리드
    ct.appendChild(mk('div','','주간 예약 가능 시간 그리드')).style.cssText='font-size:13px;font-weight:700;color:var(--t1);margin-bottom:4px;';
    ct.appendChild(mk('div','','초록=예약가능  빨간=off설정  회색=근무외  셀 클릭으로 on/off')).style.cssText='font-size:11px;color:#555;margin-bottom:8px;';
    const gWrap=ct.appendChild(el('div'));
    gWrap.style.cssText='overflow-x:auto;margin-bottom:16px;border:1px solid var(--bd);border-radius:10px;-webkit-overflow-scrolling:touch;';
    const grid=gWrap.appendChild(el('div'));
    grid.style.cssText='display:grid;grid-template-columns:38px repeat(7,1fr);min-width:320px;';
    grid.appendChild(el('div')).style.cssText='height:26px;background:var(--bg2);border-bottom:1px solid var(--bd);border-radius:9px 0 0 0;';
    dayKeys.forEach((dk,i)=>{
      const h2=grid.appendChild(mk('div','',dayLabels[i]));
      h2.style.cssText='height:26px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:'+(wh[dk]===false?'#333':'var(--t2)')+';border-bottom:1px solid var(--bd);border-left:1px solid var(--bd);background:var(--bg2);'+(i===6?'border-radius:0 9px 0 0;':'');
    });
    TIMES.forEach(time=>{
      const half=time.endsWith(':30');
      const tl=grid.appendChild(el('div'));
      tl.style.cssText='height:30px;display:flex;align-items:center;justify-content:flex-end;padding-right:3px;font-size:9px;color:#444;border-bottom:1px solid '+(half?'#1a1a1a':'#252525')+';';
      tl.textContent=half?'':time;
      dayKeys.forEach(dk=>{
        const cell=grid.appendChild(el('div'));
        const doff=wh[dk]===false;
        const rng=normRanges(wh[dk])||[];
        const inR=!doff&&(rng.length===0||isInRanges(time,rng));
        const moff=(weeklyOff[dk]||[]).includes(time);
        cell.style.cssText='height:30px;border-bottom:1px solid '+(half?'#1a1a1a':'#252525')+';border-left:1px solid #1e1e1e;background:'+(doff?'#111':!inR?'#141414':moff?'rgba(248,113,113,.35)':'rgba(74,222,128,.12)')+';cursor:'+((!doff&&inR)?'pointer':'default')+';box-sizing:border-box;';
        if(!doff&&inR){
          const[th2,tm2]=time.split(':').map(Number),nm=(th2*60+tm2)+30,nt=p2(Math.floor(nm/60))+':'+p2(nm%60);
          cell.onclick=()=>{
            if(moff){showConfirm(time+'~'+nt+' off 해제하시겠습니까?',()=>{weeklyOff[dk]=(weeklyOff[dk]||[]).filter(t=>t!==time);renderBody(wh,weeklyOff,selDay);saveAvail(wh,weeklyOff);});}
            else{showConfirm(time+'~'+nt+' off설정하시겠습니까?',()=>{(weeklyOff[dk]=weeklyOff[dk]||[]).push(time);renderBody(wh,weeklyOff,selDay);saveAvail(wh,weeklyOff);});}
          };
        }
      });
    });

  }

  function loadAvail(){
    buildAll();
    db2.collection('og10_avail').doc(selTrId).get().then(doc=>{
      if(!ct.isConnected)return;
      const d=doc.exists?doc.data():{};
      const rawWh=d.workHours||{};
      const wh={};dayKeys.forEach(dk=>{const n=normRanges(rawWh[dk]);wh[dk]=(n===false)?false:(n||[]);});
      const weeklyOff=JSON.parse(JSON.stringify(d.weeklyOff||{}));
      renderBody(wh,weeklyOff,'mon');
    }).catch(()=>{
      if(!ct.isConnected)return;
      const wh={};dayKeys.forEach(dk=>{wh[dk]=[];});
      renderBody(wh,{},'mon');
    });
  }
  loadAvail();
}

function markAllRead(){
  if(!curUser)return;
  const tr=trainers.find(t=>t.id===curUser);
  let changed=false;
  notices.forEach(n=>{n.reads=n.reads||[];if(!n.reads.find(r=>r.userId===curUser)){n.reads.push({userId:curUser,name:tr?tr.name:'?',ts:Date.now()});changed=true;}});
  if(changed)sv('og10_nt',notices);
}

  const ct=document.getElementById('pg-not').querySelector('.pad');ct.innerHTML='';
  if(!curUser&&!isAdminUser()){const lb=ct.appendChild(el('div','lockbox'));lb.appendChild(mk('p','','공지사항은 로그인이 필요합니다.'));lb.appendChild(mk('button','','로그인하기')).onclick=()=>openLogin(()=>renderNotice());return;}

  const sorted=[...notices].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||b.ts-a.ts);
  if(!sorted.length)ct.appendChild(mk('div','nempty','등록된 공지가 없습니다.'));

    const tr2=n.authorId?trainers.find(t=>t.id===n.authorId):trainers.find(t=>t.name===n.author);

    const ai2=aw.appendChild(el('div'));ai2.appendChild(mk('div','ncnm',n.author||'익명'));ai2.appendChild(mk('div','ncdt',fmtTs(n.ts)));
    const acts=hdr.appendChild(el('div','ncard-acts'));
    const reads=n.reads||[];
    const rb=acts.appendChild(mk('div','read-badge','읽음 '+reads.length+'명'));
    if(isAdminUser()&&reads.length>0){rb.classList.add('clickable');rb.onclick=e=>{e.stopPropagation();const existing=card.querySelector('.read-list');if(existing){existing.remove();return;}const rl=card.appendChild(el('div','read-list'));reads.forEach(r=>{rl.appendChild(mk('div','read-item',r.name+' · '+fmtTs(r.ts)));});};}
    if(isAdminUser()){const db=acts.appendChild(mk('button','ncdel','삭제'));db.onclick=e=>{e.stopPropagation();if(confirm('삭제?')){notices=notices.filter(x=>x.id!==n.id);sv('og10_nt',notices);renderNotice();}};}
    preview.appendChild(mk('div','notice-title',n.title||n.body.slice(0,30)+(n.body.length>30?'...':'')));
    const expRow=preview.appendChild(el('div','notice-expand-row'));
    expRow.appendChild(mk('span','notice-expand-hint',n.body?'내용 보기':''));
    const arrow=expRow.appendChild(mk('span','notice-arrow','▼'));
    const content=card.appendChild(el('div','notice-content'));
    if(n.body)content.appendChild(mk('div','nbody',n.body));
    const imgs=n.images||[];
    if(imgs.length){const il=content.appendChild(el('div','nimg-list'));imgs.forEach(src=>{const item=il.appendChild(el('div','nimg-item'));const img=item.appendChild(el('img'));img.src=src;img.loading='lazy';img.onclick=()=>{window.open(src,'_blank');};});}
    preview.onclick=()=>{const open=content.classList.toggle('show');arrow.classList.toggle('open',open);expRow.querySelector('.notice-expand-hint').textContent=open?'접기':(n.body?'내용 보기':'');};
  });
}

function openComposeNotice(){
  let pendingImages=[];
  showSheet(function(sheet,close){
    sheet.appendChild(el('div','shdl'));sheet.appendChild(mk('h3','','공지 작성'));
    sheet.appendChild(mk('label','','제목'));const ti=sheet.appendChild(el('input'));ti.type='text';ti.placeholder='공지 제목을 입력하세요';ti.style.cssText='width:100%;padding:13px 14px;border:1px solid var(--bd2);border-radius:10px;background:var(--bg2);color:var(--t1);font-size:15px;';
    sheet.appendChild(mk('label','','내용'));const ta=sheet.appendChild(el('textarea'));ta.style.cssText='width:100%;min-height:110px;padding:13px 14px;border:1px solid var(--bd2);border-radius:10px;background:var(--bg2);color:var(--t1);font-size:15px;font-family:inherit;line-height:1.6;resize:none;';ta.placeholder='공지 내용을 입력하세요...';

    const imgRow=sheet.appendChild(el('div','img-upload-row'));const imgBtn=imgRow.appendChild(el('button','img-upload-btn'));imgBtn.textContent='사진 추가';
    const imgInput=imgRow.appendChild(el('input'));imgInput.type='file';imgInput.accept='image/*';imgInput.multiple=true;imgInput.style.display='none';
    imgBtn.onclick=()=>imgInput.click();
    const prevList=imgRow.appendChild(el('div','img-preview-list'));
    imgInput.onchange=()=>{Array.from(imgInput.files).forEach(file=>{const reader=new FileReader();reader.onload=e=>{pendingImages.push(e.target.result);const item=prevList.appendChild(el('div','img-preview-item'));const img=item.appendChild(el('img'));img.src=e.target.result;const del=item.appendChild(el('button','img-preview-del'));del.textContent='×';del.onclick=()=>{const idx=pendingImages.indexOf(e.target.result);if(idx>-1)pendingImages.splice(idx,1);item.remove();};};reader.readAsDataURL(file);});imgInput.value='';};
    const pr=sheet.appendChild(el('div','npinrow'));const pc=pr.appendChild(el('input'));pc.type='checkbox';pc.id='nc-pin';const pl=pr.appendChild(el('label'));pl.htmlFor='nc-pin';pl.textContent='상단 고정';
    const btns=sheet.appendChild(el('div','shbtns'));
    btns.appendChild(mk('button','shno','취소')).onclick=close;
    btns.appendChild(mk('button','shok','등록')).onclick=()=>{
      const title=(ti.value||'').trim();const body=(ta.value||'').trim();

// ── 매출 ──────────────────────────────────────────────────────────────────
let salPeriod='daily';
let salMode='sales';
const salSubTabOrder=['sales','bypkg','bypay','sessions','refund'];

let mobSesSortCol='date',mobSesSortDir=-1;     // 세션로그 정렬
let mobBypkgSortCol='tot',mobBypkgSortDir=-1;  // 상품별 정렬
let mobBypaySortCol='tot',mobBypaySortDir=-1;  // 결제수단별 정렬
let mobRefSortCol='date',mobRefSortDir=-1;     // 환불내역 정렬
let salStartDate='';let salEndDate='';let salTrainer='';let salSearch='';

function initSalDates(){
  const now=new Date();const y=now.getFullYear(),m=now.getMonth();
  if(!salStartDate)salStartDate=y+'-'+String(m+1).padStart(2,'0')+'-01';
  if(!salEndDate){const lastDay=new Date(y,m+1,0).getDate();salEndDate=y+'-'+String(m+1).padStart(2,'0')+'-'+String(lastDay).padStart(2,'0');}
}
function parseSalDate(str){const p=str.split('-').map(Number);return new Date(p[0],p[1]-1,p[2]);}
function getSalLabel(dateStr){
  const d=parseSalDate(dateStr);
  if(salPeriod==='daily')return(d.getMonth()+1)+'/'+(d.getDate());
  if(salPeriod==='weekly')return(d.getMonth()+1)+'월'+getWeekNum(d)+'주';
  const p=dateStr.split('-');return p[0]+'.'+(+p[1]);
}
function getGroupKey(dateStr){
  if(salPeriod==='daily')return dateStr;
  if(salPeriod==='weekly'){const d=parseSalDate(dateStr);return d.getFullYear()+'-'+(d.getMonth()+1)+'-w'+getWeekNum(d);}
  const p=dateStr.split('-');return p[0]+'-'+p[1];
}

function computeSales(){
  initSalDates();
  const sd=parseSalDate(salStartDate),ed=parseSalDate(salEndDate);ed.setHours(23,59,59);
  const diffDays=Math.ceil((ed-sd)/(1000*60*60*24));
  salPeriod=diffDays<=31?'daily':diffDays<=90?'weekly':'monthly';
  const rows=[];
  if(salMode==='sales'){
    members.forEach(mb=>{
      if(salTrainer&&mb.trainerId!==salTrainer)return;
      if(salSearch&&!mb.name.includes(salSearch))return;
      const tr=trainers.find(t=>t.id===mb.trainerId);
      (mb.plans||[]).forEach(plan=>{
        const pDate=new Date(plan.addedAt||0);if(pDate<sd||pDate>ed)return;
        const ds=pDate.getFullYear()+'-'+String(pDate.getMonth()+1).padStart(2,'0')+'-'+String(pDate.getDate()).padStart(2,'0');
        rows.push({date:ds,time:p2(pDate.getHours())+':'+p2(pDate.getMinutes()),trainerId:mb.trainerId,trainerName:tr?tr.name:'?',memberName:mb.name,phone:mb.phone||'',type:plan.duration+'분',planLabel:plan.sessions+'회권',planId:plan.id,memberId:mb.id,revenue:plan.totalPrice||0,groupKey:getGroupKey(ds),inflow:mb.inflow||'',payment:plan.paymentMethod||mb.payment||''});
      });
    });
  } else {
    slots.forEach(s=>{
      if(s.type==='OT'||s.type==='상담')return;if(!s.memberId)return;
      if(salTrainer&&s.trainerId!==salTrainer)return;
      const parts=s.date.split('-').map(Number);const slotDate=new Date(parts[0],parts[1]-1,parts[2]);
      if(slotDate<sd||slotDate>ed)return;
      const mb=members.find(m=>m.id===s.memberId);const plan=mb?(mb.plans||[]).find(p=>p.id===s.planId):null;
      if(salSearch&&mb&&!mb.name.includes(salSearch))return;
      const tr=trainers.find(t=>t.id===s.trainerId);
      const planLabel=plan?(plan.sessions+'회권'):(s.type||'-');
      const revenue=plan?(plan.pricePerSession||0):0;
      rows.push({date:s.date,time:s.time,trainerId:s.trainerId,trainerName:tr?tr.name:'?',memberName:mb?mb.name:'?',type:s.type,planLabel,revenue,groupKey:getGroupKey(s.date)});
    });
  }
  // ── 환불 내역 마이너스 추가 (수업권판매 모드에서만) ────────────────────
  if(salMode==='sales'){
    refunds.forEach(r=>{
      if(!r.processedAt)return;
      const rDate=new Date(r.processedAt);if(rDate<sd||rDate>ed)return;
      const ds=rDate.getFullYear()+'-'+String(rDate.getMonth()+1).padStart(2,'0')+'-'+String(rDate.getDate()).padStart(2,'0');
      const tm=String(rDate.getHours()).padStart(2,'0')+':'+String(rDate.getMinutes()).padStart(2,'0');
      rows.push({date:ds,time:tm,trainerId:'',trainerName:'-',memberName:r.memberName,phone:r.phone||'',
        type:r.type==='transfer'?'양도':'환불',planLabel:r.planName||'-',revenue:-(r.refundAmount||0),
        groupKey:getGroupKey(ds),inflow:'',payment:'',isRefund:true});
    });
  }
  rows.sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  const grouped={};
  rows.forEach(r=>{if(!grouped[r.groupKey])grouped[r.groupKey]={key:r.groupKey,revenue:0,count:0,label:getSalLabel(r.date)};grouped[r.groupKey].revenue+=r.revenue;grouped[r.groupKey].count++;});
  const totalRevenue=rows.reduce((s,r)=>s+r.revenue,0);
  const totalSessions=rows.length;
  const uniqueMembers=new Set(rows.filter(r=>!r.isRefund).map(r=>r.memberName)).size;
  return{rows,grouped,totalRevenue,totalSessions,uniqueMembers};
}

function drawSalChart(canvas,keys,grouped){
  const W=canvas.width=canvas.offsetWidth||300;const H=canvas.height=180;const ctx=canvas.getContext('2d');if(!ctx)return;
  const vals=keys.map(k=>grouped[k].revenue);const maxVal=Math.max(...vals,1);
  const pad={t:16,r:10,b:36,l:56};const cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  const barW=Math.max(4,Math.min(32,cW/keys.length*0.6));const step=cW/keys.length;
  ctx.fillStyle='#1a1a1a';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#2a2a2a';ctx.lineWidth=1;
  [0,.25,.5,.75,1].forEach(p=>{const y=pad.t+cH*(1-p);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.fillStyle='#555';ctx.font='9px sans-serif';ctx.textAlign='right';const lv=Math.round(maxVal*p);ctx.fillText(lv>=10000?(lv/10000).toFixed(1)+'만':''+lv,pad.l-4,y+3);});
  keys.forEach((k,i)=>{const v=grouped[k].revenue;const barH=cH*(v/maxVal);const x=pad.l+i*step+(step-barW)/2;const y=pad.t+cH-barH;const grad=ctx.createLinearGradient(0,y,0,y+barH);grad.addColorStop(0,'#ab47bc');grad.addColorStop(1,'#6a1b9a');ctx.fillStyle=grad;ctx.beginPath();if(ctx.roundRect)ctx.roundRect(x,y,barW,barH,3);else ctx.rect(x,y,barW,barH);ctx.fill();if(barH>20){ctx.fillStyle='#fff';ctx.font='bold 9px sans-serif';ctx.textAlign='center';const txt=v>=10000?(v/10000).toFixed(0)+'만':''+v;ctx.fillText(txt,x+barW/2,y+12);}});
  ctx.fillStyle='#666';ctx.font='10px sans-serif';ctx.textAlign='center';
  const maxLabels=Math.floor(cW/28);const skip=Math.ceil(keys.length/maxLabels);
  keys.forEach((k,i)=>{if(i%skip!==0&&i!==keys.length-1)return;const x=pad.l+i*step+step/2;ctx.fillText(grouped[k].label,x,H-pad.b+14);});
  ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,H-pad.b);ctx.lineTo(W-pad.r,H-pad.b);ctx.stroke();
}

function getPlanFormValue(){
  const dsel=document.getElementById('pf-d');const se=document.getElementById('pf-s');const pe=document.getElementById('pf-p');

function dlSalesCSV(rows,total){
  const isSes=salMode==='sessions';

  if(typeof XLSX==='undefined'){alert('잠시 후 다시 시도해주세요.');return;}

  const periodStr='기간: '+salStartDate+' ~ '+salEndDate+'  /  트레이너: '+trName;
  const wsData=[];
  wsData.push([null,null,null,null,null,null,null]);
  wsData.push([null,titleStr,null,null,null,null,null]);
  wsData.push([null,periodStr,null,null,null,null,null]);
  wsData.push([null,null,null,null,null,null,null]);
  if(isSes){

  } else {

  }
  rows.forEach(r=>{
    if(isSes){
      const mbS=members.find(m=>m.name===r.memberName&&m.trainerId===r.trainerId);
      const planS=mbS?(mbS.plans||[]).find(p=>(p.sessions+'회권')===r.planLabel):null;
      wsData.push([null,r.date,r.memberName,planS?planS.sessions:0,planS?planS.totalPrice:0,r.revenue,r.revenue]);
    } else {
      const mbR=r.memberId?members.find(m=>m.id===r.memberId):members.find(m=>m.name===r.memberName);
      const planR=r.planId&&mbR?(mbR.plans||[]).find(p=>p.id===r.planId):null;
      const usedR=r.isRefund?'-':(planR?getPlanUsed(planR.id):'-');
      const remainR=r.isRefund?'-':(planR?getPlanRemain(planR):'-');
      const planNumR=planR?planR.sessions:(r.planLabel||'').replace('회권','');
      wsData.push([null,r.date,r.trainerName,r.memberName,r.phone||'',r.inflow||'',r.payment||'',planNumR,r.revenue||0,usedR,remainR]);
    }
  });
  if(isSes){
    wsData.push([null,null,null,null,null,null,null]);
    wsData.push([null,null,null,null,null,'합계',total]);
    wsData.push([null,null,null,null,null,null,null]);
    wsData.push([null,'트레이너별 요약',null,null,null,null,null]);
    wsData.push([null,'트레이너','수업 수','합계',null,null,null]);
  } else {
    wsData.push([null,null,null,null,null,null,null,null,null,null,null]);
    wsData.push([null,null,null,null,null,null,null,null,'합계',total,null]);
    wsData.push([null,null,null,null,null,null,null,null,null,null,null]);
    wsData.push([null,'트레이너별 요약',null,null,null,null,null,null,null,null,null]);
    wsData.push([null,'트레이너','수업 수','합계',null,null,null,null,null,null,null]);
  }
  const byTr={};rows.forEach(r=>{if(!byTr[r.trainerName])byTr[r.trainerName]={cnt:0,sum:0};byTr[r.trainerName].cnt++;byTr[r.trainerName].sum+=r.revenue;});
  if(isSes){Object.entries(byTr).forEach(([nm,d])=>wsData.push([null,nm,d.cnt,d.sum,null,null,null]));}
  else{Object.entries(byTr).forEach(([nm,d])=>wsData.push([null,nm,d.cnt,d.sum,null,null,null,null,null,null,null]));}
  const ws=XLSX.utils.aoa_to_sheet(wsData);
  if(isSes){
    ws['!cols']=[{wch:2},{wch:14},{wch:12},{wch:10},{wch:14},{wch:12},{wch:12}];
    ws['!merges']=[{s:{r:1,c:1},e:{r:1,c:6}},{s:{r:2,c:1},e:{r:2,c:6}}];
    ws['!autofilter']={ref:'B5:G5'};
  } else {
    ws['!cols']=[{wch:2},{wch:14},{wch:12},{wch:12},{wch:14},{wch:10},{wch:12},{wch:14},{wch:14},{wch:10},{wch:10}];
    ws['!merges']=[{s:{r:1,c:1},e:{r:1,c:10}},{s:{r:2,c:1},e:{r:2,c:10}}];
    ws['!autofilter']={ref:'B5:K5'};
  }
  XLSX.utils.book_append_sheet(wb,ws,isSes?'세션로그':'수업권판매');
  XLSX.writeFile(wb,(isSes?'세션로그_':'수업권판매_')+salStartDate+'_'+salEndDate+'.xlsx');
}

function pcMbStatus(mb){
  const plans=(mb.plans||[]).filter(p=>!p.refunded);
  if(!plans.length)return'none';
  const mPlan=plans.find(p=>p.productType==='membership'&&p.endDate);
  if(mPlan){const rem=Math.ceil((new Date(mPlan.endDate)-new Date())/(1000*60*60*24));if(rem<=0)return'expired';if(rem<=25)return'expiring';return'active';}
  let total=0;plans.forEach(p=>{if(p.productType!=='membership'){const r=getPlanRemain(p);if(r>0)total+=r;}});
  if(total>0&&total<=2)return'expiring';if(total>0)return'active';
  // 만료된 플랜이라도 있으면 expired, 플랜 자체가 없으면 none
  return plans.length?'expired':'none';
}
function getThisWeek(){
  const now=new Date();const dow=now.getDay();
  const mon=new Date(now);mon.setDate(now.getDate()-(dow===0?6:dow-1));mon.setHours(0,0,0,0);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  return{mon:fmt(mon),sun:fmt(sun)};
}
function getNextWeek(){
  const now=new Date();const dow=now.getDay();
  const mon=new Date(now);mon.setDate(now.getDate()-(dow===0?6:dow-1)+7);mon.setHours(0,0,0,0);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  return{mon:fmt(mon),sun:fmt(sun)};
}
function getNextWeekNoSesMembers(){
  const{mon,sun}=getNextWeek();
  const weekMbIds=new Set(
    slots.filter(s=>s.memberId&&s.date>=mon&&s.date<=sun&&s.type!=='OT'&&s.type!=='상담')
         .map(s=>s.memberId)
  );
  return members.filter(m=>{
    const st=pcMbStatus(m);
    return(st==='active'||st==='expiring')&&!weekMbIds.has(m.id);
  });
}
function getWeekNoSesMembers(){
  const{mon,sun}=getThisWeek();

    slots.filter(s=>s.memberId&&s.date>=mon&&s.date<=sun&&s.type!=='OT'&&s.type!=='상담')

  );
  return members.filter(m=>{
    const st=pcMbStatus(m);
    return(st==='active'||st==='expiring')&&!weekMbIds.has(m.id);
  });

function pcModal(builder,opts){
  opts=opts||{};
  const ov=document.createElement('div');
  ov.className='pcm-ov';
  const box=document.createElement('div');
  box.className='pcm-box';
  if(opts.wide)box.style.width='720px';
  if(opts.full)box.style.cssText+=';width:92vw;max-width:1100px;';
  ov.appendChild(box);
  document.body.appendChild(ov);
  const close=()=>{if(document.body.contains(ov))document.body.removeChild(ov);};
  ov.onclick=e=>{if(e.target===ov)close();};
  const xBtn=box.appendChild(document.createElement('button'));
  xBtn.className='pcm-close';xBtn.textContent='×';xBtn.onclick=close;
  builder(box,close);
  return close;
}
function _f(label,required){
  const d=document.createElement('div');d.className='pcm-field';
  const lb=document.createElement('label');lb.className='pcm-label';
  lb.innerHTML=label+(required?'<span class="req"> *</span>':'');
  d.appendChild(lb);return d;
}
function _inp(placeholder,type){
  const i=document.createElement('input');i.className='pcm-input';
  i.placeholder=placeholder||'';i.type=type||'text';return i;
}
function _sel(options){
  const s=document.createElement('select');s.className='pcm-select';
  options.forEach(o=>{const op=document.createElement('option');op.value=o.v!==undefined?o.v:o;op.textContent=o.l||o;s.appendChild(op);});
  return s;
}

function renderPcCust(ct,acts){
  if(acts){

  const trBar=ct.appendChild(document.createElement('div'));
  trBar.style.cssText='display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;';
  [{id:'',name:'전체 트레이너'},...trainers].forEach(tr=>{

    btn.onclick=()=>{custTr=tr.id||'';pcDetailMbId=null;renderPcContent();};
  });

  // 트레이너 기준으로 baseList 구성 (서브탭 카운트도 이 기준으로)
  const baseList=custTr?members.filter(m=>m.trainerId===custTr):members;
  const noWeekAll=getWeekNoSesMembers();
  const noWeekList2=custTr?noWeekAll.filter(m=>m.trainerId===custTr):noWeekAll;
  const nextWeekAll=getNextWeekNoSesMembers();
  const nextWeekList3=custTr?nextWeekAll.filter(m=>m.trainerId===custTr):nextWeekAll;

  const subs=[{id:'all',label:'전체'},{id:'active',label:'활성'},{id:'expiring',label:'만료임박'},{id:'expired',label:'만료'},{id:'none',label:'미등록'},{id:'noweek',label:'주간미수업'},{id:'nextweek',label:'차주미수업'}];
  const sb=ct.appendChild(Object.assign(document.createElement('div'),{className:'pc-sub-tabs'}));
  subs.forEach(s=>{
    let cnt;
    if(s.id==='all')cnt=baseList.length;
    else if(s.id==='noweek')cnt=noWeekList2.length;
    else if(s.id==='nextweek')cnt=nextWeekList3.length;
    else if(s.id==='expiring')cnt=baseList.filter(m=>{let t=0;(m.plans||[]).forEach(p=>{t+=getPlanRemain(p);});return t>0&&t<=2;}).length;
    else if(s.id==='active')cnt=baseList.filter(m=>{const st=pcMbStatus(m);return st==='active'||st==='expiring';}).length;
    else cnt=baseList.filter(m=>pcMbStatus(m)===s.id).length;
    const tab=sb.appendChild(Object.assign(document.createElement('div'),{className:'pc-stab'+(custSV===s.id?' on':''),textContent:s.label+' '+cnt}));
    tab.onclick=()=>{custSV=s.id;pcDetailMbId=null;renderPcContent();};
  });
  const fb=ct.appendChild(Object.assign(document.createElement('div'),{className:'pc-fbar'}));
  const si=fb.appendChild(document.createElement('input'));si.className='pcm-input';si.style.cssText='width:220px;padding:9px 12px;font-size:13px;';
  si.placeholder='이름 또는 연락처...';si.value=pcCustKw;
  si.oninput=e=>pcCustKw=e.target.value;si.onkeydown=e=>{if(e.key==='Enter')renderPcContent();};
  fb.appendChild(Object.assign(document.createElement('button'),{className:'pc-tbtn',textContent:'조회'})).onclick=()=>renderPcContent();

  let list=baseList.slice();
  if(custSV==='noweek')list=noWeekList2.slice();
  else if(custSV==='nextweek')list=nextWeekList3.slice();
  else if(custSV==='expiring')list=list.filter(m=>{let t=0;(m.plans||[]).forEach(p=>{t+=getPlanRemain(p);});return t>0&&t<=2;});
  else if(custSV==='active')list=list.filter(m=>{const st=pcMbStatus(m);return st==='active'||st==='expiring';});
  else if(custSV&&custSV!=='all')list=list.filter(m=>pcMbStatus(m)===custSV);
  if(pcCustKw)list=list.filter(m=>m.name.includes(pcCustKw)||(m.phone||'').includes(pcCustKw));

  const tw=ct.appendChild(Object.assign(document.createElement('div'),{className:'pc-tw'}));
  const tbl=tw.appendChild(Object.assign(document.createElement('table'),{className:'pc-tbl'}));
  const thead=tbl.appendChild(document.createElement('thead'));const hr=thead.appendChild(document.createElement('tr'));
  const custHdrs=['No','상태','이름','연락처','성별','담당','유입','수업권','잔여','금액','매출일'];
  const custSortKeys=[null,null,'name','phone','gender','trainer','inflow','plan','remain','totalPaid','regDate'];
  custHdrs.forEach((h,hi)=>{
    const th=hr.appendChild(document.createElement('th'));
    const sk=custSortKeys[hi];
    if(sk){
      th.style.cssText='cursor:pointer;user-select:none;white-space:nowrap;';
      th.innerHTML=h+'<span style="margin-left:4px;opacity:.5;font-size:10px;">'+(pcCustSortCol===sk?(pcCustSortDir===1?'▲':'▼'):'⇅')+'</span>';
      th.onmouseenter=()=>{th.style.color='#c4cde8';};
      th.onmouseleave=()=>{th.style.color='';};
      th.onclick=()=>{
        if(pcCustSortCol===sk){pcCustSortDir*=-1;}else{pcCustSortCol=sk;pcCustSortDir=1;}
        renderPcContent();
      };
    } else { th.textContent=h; }
  });
  const tbody=tbl.appendChild(document.createElement('tbody'));
  // 정렬 적용
  if(pcCustSortCol){
    list.sort((a,b)=>{
      const ga=(mb)=>{
        const tr2b=trainers.find(t=>t.id===mb.trainerId);
        const plans=mb.plans||[];const latest=plans[plans.length-1];
        const rem=plans.reduce((s,p)=>s+getPlanRemain(p),0);
        const totalPaid=plans.reduce((s,p)=>s+(p.totalPrice||0),0);
        const regDate=mb.registeredAt||0;
        return{name:mb.name||'',phone:mb.phone||'',gender:mb.gender||'',
          trainer:tr2b?tr2b.name:'',inflow:mb.inflow||'',
          plan:latest?(latest.productName||latest.duration+'분 '+latest.sessions+'회권'):'',
          remain:rem,totalPaid,regDate};
      };
      const va=ga(a)[pcCustSortCol],vb=ga(b)[pcCustSortCol];
      if(typeof va==='number')return (va-vb)*pcCustSortDir;
      return String(va).localeCompare(String(vb),'ko')*pcCustSortDir;
    });
  }
  list.forEach((mb,i)=>{
    const tr2=trainers.find(t=>t.id===mb.trainerId);const st=pcMbStatus(mb);
    const plans=mb.plans||[];const latest=plans[plans.length-1];const rem=plans.reduce((s,p)=>s+getPlanRemain(p),0);
    const row=tbody.appendChild(document.createElement('tr'));row.style.cursor='pointer';
    row.onclick=()=>openPcMemberDetail(mb.id);
    const totalPaid=(mb.plans||[]).reduce((s,p)=>s+(p.totalPrice||0),0);
    const regDate=mb.registeredAt?new Date(mb.registeredAt).toLocaleDateString('ko-KR',{year:'2-digit',month:'2-digit',day:'2-digit'}):'-';
    const payDate=latest?(latest.paymentDate||(latest.addedAt?new Date(latest.addedAt).toLocaleDateString('ko-KR',{year:'2-digit',month:'2-digit',day:'2-digit'}):regDate)):regDate;
    [i+1,'',mb.name,mb.phone||'-',mb.gender||'-',tr2?tr2.name:'-',mb.inflow||'-',latest?(latest.productName||latest.duration+'분 '+latest.sessions+'회권'):'-',rem+'회',totalPaid?totalPaid.toLocaleString()+'원':'-',payDate].forEach((v,ci)=>{
      const td=document.createElement('td');if(ci===9)td.style.fontWeight='700';if(ci===1)td.innerHTML='<span class="pbs '+pcSCls(st)+'">'+pcSLbl(st)+'</span>';else if(ci===10)td.innerHTML=v+'<div style="font-size:10px;color:#4a5068;margin-top:2px;">등록 '+regDate+'</div>';else td.textContent=v;if(ci===9)td.style.fontWeight='700';row.appendChild(td);
    });
  });
  if(!list.length){const tr3=tbody.appendChild(document.createElement('tr'));const td=document.createElement('td');td.colSpan=11;td.style.cssText='text-align:center;padding:40px;color:#2a2d45;';td.textContent='회원이 없습니다.';tr3.appendChild(td);}
}

    // 이용권 추가 버튼
    ct.appendChild(Object.assign(document.createElement('button'),{className:'pcdp-add-btn',textContent:'+ 이용권 추가하기'})).onclick=()=>openPcPayment(mb.id,box,close);

function makeSortThs(hr,hdrs,keys,curCol,curDir,onChange){

      btns.appendChild(Object.assign(document.createElement('button'),{className:'pcm-btn-pri',textContent:'저장'})).onclick=()=>{

        p.name=name;p.price=price;
        sv('og10_pr',products);close();
        if(onSaved)onSaved();else renderPcContent();

// 환불 모달
function openPcRefund(mb, plan, parentBox, parentClose) {
  const used = getPlanUsed(plan.id);
  const rem = getPlanRemain(plan);
  const paid = plan.totalPrice || 0;
  const perSession = plan.pricePerSession || (plan.sessions > 0 ? Math.round(paid / plan.sessions) : 0);
  const usedAmt = used * perSession;
  const suggested = Math.max(0, paid - usedAmt);

  pcModal((box, close) => {
    box.appendChild(Object.assign(document.createElement('div'), {className:'pcm-ttl', textContent:'환불 / 양도'}));
    box.appendChild(Object.assign(document.createElement('div'), {className:'pcm-sub', textContent: mb.name + ' · ' + (plan.productName || plan.sessions + '회권')}));

    // 요약 카드
    const sumCard = box.appendChild(document.createElement('div'));
    sumCard.style.cssText = 'background:#0f1117;border:1px solid #1e2026;border-radius:10px;padding:14px 16px;margin-bottom:20px;display:grid;grid-template-columns:1fr 1fr;gap:10px;';
    [
      ['결제 금액', paid.toLocaleString() + '원'],
      ['결제 수단', plan.paymentMethod || '-'],
      ['사용 횟수', used + '회 (회당 ' + perSession.toLocaleString() + '원)'],
      ['잔여 횟수', rem + '회'],
      ['사용 금액', usedAmt.toLocaleString() + '원'],
      ['환불 예상', suggested.toLocaleString() + '원'],
    ].forEach(([k, v]) => {
      const cell = sumCard.appendChild(document.createElement('div'));
      cell.innerHTML = '<div style="font-size:10px;color:#3a3f58;font-weight:700;letter-spacing:.5px;margin-bottom:3px;">' + k + '</div><div style="font-size:13px;color:#c4cde8;font-weight:600;">' + v + '</div>';
    });

    // 유형 선택
    let refType = 'refund';
    const typeF = box.appendChild(document.createElement('div'));
    typeF.style.marginBottom = '14px';
    typeF.appendChild(Object.assign(document.createElement('label'), {className:'pcm-label', textContent:'처리 유형'}));
    const typeRow = typeF.appendChild(document.createElement('div'));
    typeRow.style.cssText = 'display:flex;gap:8px;';
    const typeBtns = [];
    [{v:'refund',l:'환불'},{v:'transfer',l:'양도'}].forEach(t => {
      const btn = typeRow.appendChild(document.createElement('button'));
      btn.style.cssText = 'flex:1;padding:10px;border-radius:9px;border:1.5px solid ' + (refType===t.v?'#f87171':'#1e2026') + ';background:' + (refType===t.v?'rgba(248,113,113,.1)':'#0f1117') + ';color:' + (refType===t.v?'#f87171':'#6b7494') + ';font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;';
      btn.textContent = t.l; typeBtns.push({btn, v:t.v});
      btn.onclick = () => {
        refType = t.v;
        typeBtns.forEach(({btn:b, v}) => {
          const isOn = v === refType;
          b.style.borderColor = isOn ? '#f87171' : '#1e2026';
          b.style.background = isOn ? 'rgba(248,113,113,.1)' : '#0f1117';
          b.style.color = isOn ? '#f87171' : '#6b7494';
        });
        transferF.style.display = refType === 'transfer' ? 'block' : 'none';
      };
    });

    // 양도 대상 (양도 선택 시만 표시)
    const transferF = box.appendChild(document.createElement('div'));
    transferF.style.display = 'none';
    transferF.appendChild(Object.assign(document.createElement('label'), {className:'pcm-label', textContent:'양도 대상 회원'}));
    const transferI = transferF.appendChild(document.createElement('input'));
    transferI.className = 'pcm-input'; transferI.placeholder = '이름 또는 연락처 검색...';

    // 환불 금액
    const amtF = box.appendChild(document.createElement('div'));
    amtF.appendChild(Object.assign(document.createElement('label'), {className:'pcm-label'})).innerHTML = '실제 환불 금액 <span class="req">*</span>';
    const amtI = amtF.appendChild(document.createElement('input'));
    amtI.className = 'pcm-input'; amtI.placeholder = '수수료/위약금 제외 실 환불액';
    amtI.value = suggested.toLocaleString();
    amtI.oninput = function() { this.value = fmtMoney(this.value); };

    // 메모
    const memoF = box.appendChild(_f('메모 (선택)'));
    const memoT = memoF.appendChild(document.createElement('textarea'));
    memoT.className = 'pcm-textarea'; memoT.placeholder = '환불 사유, 특이사항...'; memoT.style.minHeight = '60px';

    const btns = box.appendChild(document.createElement('div'));
    btns.className = 'pcm-btns'; btns.style.marginTop = '20px';
    btns.appendChild(Object.assign(document.createElement('button'), {className:'pcm-btn-sec', textContent:'취소'})).onclick = close;

    const confirmBtn = btns.appendChild(document.createElement('button'));
    confirmBtn.className = 'pcm-btn-pri'; confirmBtn.textContent = '환불 처리';
    confirmBtn.style.background = '#f87171'; confirmBtn.style.cssText += 'background:#ef4444;';
    confirmBtn.onclick = () => {
      const amt = parseMoney(amtI.value);
      if (isNaN(amt) || amt < 0) { alert('환불 금액을 입력해주세요.'); return; }
      if (!confirm((refType==='refund'?'환불':'양도') + ' 처리하시겠습니까?\n' + mb.name + ' · ' + (plan.productName||plan.sessions+'회권') + '\n실 환불액: ' + amt.toLocaleString() + '원')) return;

      // 환불 기록 저장
      const record = {
        id: 'rf' + Date.now(), type: refType, memberId: mb.id, memberName: mb.name,
        phone: mb.phone || '', planId: plan.id, planName: plan.productName || plan.sessions + '회권',
        paidAmount: paid, usedSessions: used, remainSessions: rem,
        refundAmount: amt, memo: memoT.value.trim(),
        transferTo: refType === 'transfer' ? transferI.value.trim() : '',
        processedAt: Date.now(),
        processedDate: new Date().toLocaleDateString('ko-KR', {year:'2-digit',month:'2-digit',day:'2-digit'}),
      };
      refunds.unshift(record);
      sv('og10_rf', refunds);

      // 수업권 비활성화 (잔여 0으로)
      plan.refunded = true; plan.refundedAt = Date.now(); plan.refundAmount = amt;
      plan.sessions = used; // 잔여 0 처리
      sv('og10_mb', members);

      close();
      alert('✅ ' + (refType==='refund'?'환불':'양도') + ' 처리 완료!\n' + amt.toLocaleString() + '원');
      if (parentBox && parentClose) renderMbDetailModal(parentBox, parentClose, mb.id);
      else if(window.innerWidth<700){renderMem();}
      else renderPcContent();
    };
  }, {wide: true});
}

// 매출관리 환불내역 탭
function renderPcRefundHist(ct, acts) {
  ct.appendChild(Object.assign(document.createElement('div'), {
    textContent: '전체 환불/양도 ' + refunds.length + '건'
  })).style.cssText = 'font-size:12px;color:#4a5068;margin-bottom:12px;';

  if (!refunds.length) {
    const emp = ct.appendChild(document.createElement('div'));
    emp.style.cssText = 'text-align:center;padding:60px;color:#2a2d45;font-size:13px;';
    emp.textContent = '환불/양도 내역이 없습니다.'; return;
  }

  const tw = ct.appendChild(Object.assign(document.createElement('div'), {className:'pc-tw'}));
  const tbl = tw.appendChild(Object.assign(document.createElement('table'), {className:'pc-tbl'}));
  const thead = tbl.appendChild(document.createElement('thead'));
  const hr = thead.appendChild(document.createElement('tr'));
  makeSortThs(hr,['No','처리일','유형','회원','연락처','이용권','결제금액','사용','잔여','환불금액','메모',''],[null,'date','type','name','phone','plan','paid','used','remain','refund',null,null],pcRefSortCol,pcRefSortDir,(col,dir)=>{pcRefSortCol=col;pcRefSortDir=dir;renderPcContent();});
  const tbody = tbl.appendChild(document.createElement('tbody'));
  const sortedRef=[...refunds].sort((a,b)=>{
    if(pcRefSortCol==='date'){const va=a.processedDate||'';const vb=b.processedDate||'';return pcRefSortDir*(va<vb?-1:va>vb?1:0);}
    if(pcRefSortCol==='type'){const va=a.type||'';const vb=b.type||'';return pcRefSortDir*(va<vb?-1:va>vb?1:0);}
    if(pcRefSortCol==='name'){const va=a.memberName||'';const vb=b.memberName||'';return pcRefSortDir*(va<vb?-1:va>vb?1:0);}
    if(pcRefSortCol==='phone'){const va=a.phone||'';const vb=b.phone||'';return pcRefSortDir*(va<vb?-1:va>vb?1:0);}
    if(pcRefSortCol==='plan'){const va=a.planName||'';const vb=b.planName||'';return pcRefSortDir*(va<vb?-1:va>vb?1:0);}
    if(pcRefSortCol==='paid')return pcRefSortDir*((b.paidAmount||0)-(a.paidAmount||0));
    if(pcRefSortCol==='used')return pcRefSortDir*((b.usedSessions||0)-(a.usedSessions||0));
    if(pcRefSortCol==='remain')return pcRefSortDir*((b.remainSessions||0)-(a.remainSessions||0));
    if(pcRefSortCol==='refund')return pcRefSortDir*((b.refundAmount||0)-(a.refundAmount||0));
    return 0;
  });
  sortedRef.forEach((r, i) => {
    const row = tbody.appendChild(document.createElement('tr'));
    const typeBdg = r.type === 'refund'
      ? '<span class="pbs" style="background:rgba(248,113,113,.15);color:#f87171;">환불</span>'
      : '<span class="pbs" style="background:rgba(129,140,248,.15);color:#818cf8;">양도</span>';
    [i+1, r.processedDate||'-', '', r.memberName, r.phone||'-', r.planName||'-',
     (r.paidAmount||0).toLocaleString()+'원', r.usedSessions+'회', r.remainSessions+'회',
     (r.refundAmount||0).toLocaleString()+'원', r.memo||'-'
    ].forEach((v, ci) => {
      const td = document.createElement('td');
      if (ci === 2) td.innerHTML = typeBdg;
      else td.textContent = v;
      if (ci === 9) { td.style.fontWeight = '700'; td.style.color = '#f87171'; }
      row.appendChild(td);
    });
    // 환불 취소 버튼
    const actTd=row.appendChild(document.createElement('td'));
    if(r.type==='refund'&&isAdminUser()){
      const cancelBtn=actTd.appendChild(document.createElement('button'));
      cancelBtn.style.cssText='padding:5px 10px;font-size:11px;border-radius:6px;border:1px solid #fbbf24;background:transparent;color:#fbbf24;cursor:pointer;white-space:nowrap;';
      cancelBtn.textContent='환불 취소';
      cancelBtn.onclick=()=>{
        if(!confirm(r.memberName+' 환불을 취소하고 수업권을 복구하시겠습니까?'))return;
        // 환불 취소: plan 복구
        const mb=members.find(m=>m.id===r.memberId);
        if(mb){const plan=(mb.plans||[]).find(p=>p.id===r.planId);if(plan&&plan.refunded){plan.refunded=false;plan.sessions=r.usedSessions+r.remainSessions;delete plan.refundedAt;delete plan.refundAmount;sv('og10_mb',members);}}
        refunds=refunds.filter(x=>x.id!==r.id);sv('og10_rf',refunds);
        alert('환불이 취소되고 수업권이 복구되었습니다.');renderPcContent();
      };
    }
  });
}

// ── 세션로그 엑셀 다운로드 ───────────────────────────────────────────────
function dlSessionsXLSX(){
  if(typeof XLSX==='undefined'){alert('잠시 후 다시 시도해주세요.');return;}
  const wb=XLSX.utils.book_new();
  const wsData=[['TheLine CRM - 세션로그 (이용권별)'],['기간: '+pcSalStart+' ~ '+pcSalEnd],[]];
  wsData.push(['계약일','회원명','세션','계약료','세션단가','수업료(50%)','50%','누적진행(당월제외)','이달수업','잔여수업','정산수업료']);
  const sd=new Date(pcSalStart),ed=new Date(pcSalEnd);ed.setHours(23,59,59);
  const typeMap2={PT:['25분 수업','50분 수업'],OT:['OT'],consult:['상담'],etc:['기타']};
  const periodSl=slots.filter(s=>{
    const d=new Date(s.date);
    if(!(d>=sd&&d<=ed))return false;
    if(pcSalTr&&s.trainerId!==pcSalTr)return false;
    if(pcSesType){const allowed=typeMap2[pcSesType];return allowed&&allowed.some(t=>s.type===t||(!s.type&&pcSesType==='etc'));}
    return s.type!=='OT'&&s.type!=='상담';
  });
  const planMap={};
  // ① 기간 내 세션이 있는 플랜
  periodSl.filter(s=>s.planId).forEach(s=>{
    if(!planMap[s.planId])planMap[s.planId]={planId:s.planId,memberId:s.memberId,cnt:0};
    planMap[s.planId].cnt++;
  });
  // ② 기간 내 구매했지만 아직 세션 0회인 플랜도 포함
  if(!pcSesType){
    members.forEach(mb=>{
      if(pcSalTr&&mb.trainerId!==pcSalTr)return;
      (mb.plans||[]).forEach(plan=>{
        if(planMap[plan.id])return; // 이미 있으면 스킵
        if(plan.productType==='membership')return; // 헬스권 제외
        const pd=new Date(plan.addedAt||0);
        if(pd>=sd&&pd<=ed)planMap[plan.id]={planId:plan.id,memberId:mb.id,cnt:0};
      });
    });
  }
  Object.values(planMap).sort((a,b)=>{
    const ma=members.find(m=>m.id===a.memberId),mb2=members.find(m=>m.id===b.memberId);
    const pa=(ma?.plans||[]).find(p=>p.id===a.planId),pb=(mb2?.plans||[]).find(p=>p.id===b.planId);
    const da=pa?.paymentDate||pa?.addedAt||'',db2=pb?.paymentDate||pb?.addedAt||'';
    return da.localeCompare(db2)||((ma?.name||'').localeCompare(mb2?.name||''));
  }).forEach(entry=>{
    const mb=members.find(m=>m.id===entry.memberId);if(!mb)return;
    const plan=(mb.plans||[]).find(p=>p.id===entry.planId);if(!plan)return;
    const totalSes=plan.sessions||0,paid=plan.totalPrice||plan.paidAmount||0;
    const unitP=totalSes>0?Math.round(paid/totalSes):0;
    const lessonF=Math.round(unitP*0.5);
    const prevUsed=slots.filter(sx=>sx.planId===plan.id&&sx.type!=='OT'&&sx.type!=='상담'&&new Date(sx.date)<sd).length;
    const thisUsed=entry.cnt;
    const totalUsed=getPlanUsed(plan.id);
    const remain=totalSes-totalUsed;
    const contractDate=plan.paymentDate||(plan.addedAt?new Date(plan.addedAt).toLocaleDateString('ko-KR',{year:'2-digit',month:'2-digit',day:'2-digit'}):'-');
    wsData.push([contractDate,mb.name,totalSes,paid,unitP,lessonF,'50%',prevUsed,thisUsed,remain,thisUsed*lessonF]);
  });
  const ws=XLSX.utils.aoa_to_sheet(wsData);XLSX.utils.book_append_sheet(wb,ws,'세션로그');
  XLSX.writeFile(wb,'세션로그_'+pcSalStart+'_'+pcSalEnd+'.xlsx');
}

  const wb=XLSX.utils.book_new();

  },{});
}

// ── PC 일정 추가 모달 ─────────────────────────────────────────────────────
function openPcAddSchedule(initDate){
  const today=new Date();
  const defDate=initDate||(today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0'));
  let selMbId='';let selPlanId='';

  pcModal((box,close)=>{
    box.style.cssText+='width:520px;max-height:90vh;';
    box.appendChild(Object.assign(document.createElement('div'),{className:'pcm-ttl',textContent:'일정 추가'}));

    const r2=box.appendChild(document.createElement('div'));r2.className='pcm-row2';
    // 트레이너
    const trF=r2.appendChild(_f('트레이너',true));
    const trS=trF.appendChild(_sel([{v:'',l:'선택'},...trainers.map(t=>({v:t.id,l:t.name}))]));
    if(curUser)trS.value=curUser;

    // 날짜
    const dtF=r2.appendChild(_f('날짜',true));
    const dtI=dtF.appendChild(_inp(''));dtI.type='date';dtI.value=defDate;dtI.className='pcm-input';

    const r3=box.appendChild(document.createElement('div'));r3.className='pcm-row2';
    // 시간
    const tmF=r3.appendChild(_f('시간',true));
    const tmS=tmF.appendChild(_sel(TIMES.map(t=>({v:t,l:t}))));tmS.value='09:00';

    // 유형 (수업권 선택 시 자동)
    const tyF=r3.appendChild(_f('유형'));
    const tyS=tyF.appendChild(_sel(['25분 수업','50분 수업','OT','상담'].map(v=>({v,l:v}))));

    // 회원 선택 (드롭다운, 담당자만 선택 가능)
    const mbF=box.appendChild(_f('회원 선택'));
    const isMgr=isAdminUser();
    const tid=trS.value||curUser;
    // 드롭다운으로 회원 목록 표시
    let mbSel=mbF.appendChild(document.createElement('select'));mbSel.className='pcm-select';
    mbSel.style.cssText='width:100%;padding:12px 14px;';

    function rebuildMemberDropdown(){
      const currentTid=trS.value||curUser;
      // 관리자: 선택한 트레이너 담당 회원만 / 트레이너: 본인 담당 회원만
      const mList=members.filter(m=>m.trainerId===currentTid);
      mbSel.innerHTML='';
      [{v:'',l:'회원 없음 (OT/상담)'},...mList.map(m=>({v:m.id,l:m.name+(m.phone?' · '+m.phone.slice(-4):'')}))].forEach(({v,l})=>{
        const o=mbSel.appendChild(document.createElement('option'));o.value=v;o.textContent=l;
      });
      // 첫번째 회원 자동 선택 (있을 때)
      if(mList.length>0){
        mbSel.value=mList[0].id;
        selMbId=mList[0].id;
      } else {
        mbSel.value='';selMbId='';
      }
      mbSel.onchange=()=>{selMbId=mbSel.value;rebuildPlanDropdown();};
      rebuildPlanDropdown();
    }

    trS.onchange=()=>rebuildMemberDropdown();

    // 수업권 선택
    const plF=box.appendChild(_f('수업권'));
    let plSel=plF.appendChild(document.createElement('select'));plSel.className='pcm-select';plSel.style.cssText='width:100%;padding:12px 14px;';

    function rebuildPlanDropdown(){
      plSel.innerHTML='';
      selMbId=mbSel.value;
      const mb=selMbId?members.find(m=>m.id===selMbId):null;
      const plans=mb?(mb.plans||[]).filter(p=>getPlanRemain(p)>0):[];
      [{v:'',l:'없음 (OT/상담)'},...plans.map(p=>({v:p.id,l:(p.productName||p.sessions+'회권')+' · 잔여 '+getPlanRemain(p)+'회'}))].forEach(({v,l})=>{
        const o=plSel.appendChild(document.createElement('option'));o.value=v;o.textContent=l;
      });
      // 수업권 있으면 첫번째 수업권 자동 선택
      if(plans.length>0){
        plSel.value=plans[0].id;
        selPlanId=plans[0].id;
        if(plans[0].duration){tyS.value=plans[0].duration+'분 수업';}
      } else {
        plSel.value='';selPlanId='';
      }
      plSel.onchange=()=>{
        selPlanId=plSel.value;
        if(selPlanId&&mb){
          const plan=mb.plans.find(p=>p.id===selPlanId);
          if(plan&&plan.duration){tyS.value=plan.duration+'분 수업';}
        }
      };
    }

    rebuildMemberDropdown();

    // 메모
    const meF=box.appendChild(_f('메모'));
    const meI=meF.appendChild(_inp('메모 (OT 대상자 이름 등)'));meI.className='pcm-input';

    const btns=box.appendChild(document.createElement('div'));btns.className='pcm-btns';btns.style.marginTop='20px';
    btns.appendChild(Object.assign(document.createElement('button'),{className:'pcm-btn-sec',textContent:'취소'})).onclick=close;
    btns.appendChild(Object.assign(document.createElement('button'),{className:'pcm-btn-pri',textContent:'일정 등록'})).onclick=()=>{
      if(!trS.value){alert('트레이너를 선택해주세요.');return;}
      if(!dtI.value){alert('날짜를 선택해주세요.');return;}
      const slot={id:'sl'+Date.now(),trainerId:trS.value,date:dtI.value,time:tmS.value,type:tyS.value,
        memberId:mbSel.value||null,planId:plSel.value||null,memo:meI.value.trim()};
      slots.push(slot);sv('og10_sl',slots);
      if(slot.memberId)writeCrmBk(slot);
      close();renderPcContent();
    };
  },{wide:true});
}

</script>
