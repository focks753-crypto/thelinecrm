let custSV='all';
let pcDetailMbId=null;
function openPcAddMember(){
  const reg={name:'',phone:'',gender:'',trainerId:'',inflow:'',purpose:'',birthdate:'',address:'',email:'',notes:''};
  pcModal((box,close)=>{
    renderRegStep1(box,close,reg);
  },{wide:true});
}

function renderRegStep1(box,close,reg){
  box.innerHTML='';
  box.appendChild(Object.assign(document.createElement('div'),{className:'pcm-ttl',textContent:'신규 회원 추가'}));
  box.appendChild(Object.assign(document.createElement('div'),{className:'pcm-sub',textContent:'기본 정보를 입력해 주세요'}));
  // 단계 바
  const sb=box.appendChild(document.createElement('div'));sb.className='pcm-step-bar';
  [true,false].forEach(on=>{const s=sb.appendChild(document.createElement('div'));s.className='pcm-step'+(on?' on':'');});

  // 2열 그리드 (compact)
  const grid=box.appendChild(document.createElement('div'));
  grid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:12px 20px;';

  const nameF=grid.appendChild(_f('이름',true));nameF.style.gridColumn='1';
  const nameI=nameF.appendChild(_inp('이름 입력'));nameI.value=reg.name;nameI.style.padding='10px 12px';

  const phoneF=grid.appendChild(_f('휴대폰 번호',true));phoneF.style.gridColumn='2';
  const phoneI=phoneF.appendChild(_inp('010-0000-0000'));
  phoneI.value=reg.phone;phoneI.style.padding='10px 12px';phoneI.oninput=function(){this.value=fmtPhone(this.value);};

  // 성별
  const genF=grid.appendChild(_f('성별'));genF.style.gridColumn='1/-1';
  const genRow=genF.appendChild(document.createElement('div'));genRow.style.cssText='display:flex;gap:10px;';
  let selGender=reg.gender;
  const gBtns=[];
  [{v:'남',l:'남자',col:'#3b82f6'},{v:'여',l:'여자',col:'#ef4444'}].forEach(g=>{
    const btn=genRow.appendChild(document.createElement('button'));
    const isOn=selGender===g.v;
    btn.style.cssText='flex:1;padding:10px;border-radius:9px;border:1.5px solid '+(isOn?g.col:'#1e2026')+';background:'+(isOn?'rgba('+( g.col==='#3b82f6'?'59,130,246':'239,68,68')+',0.1)':'#0f1117')+';color:'+(isOn?g.col:'#6b7494')+';font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;';
    btn.textContent=g.l;btn.dataset.col=g.col;
    btn.onclick=()=>{selGender=g.v;gBtns.forEach((b,i)=>{const c=b.dataset.col;b.style.borderColor='#1e2026';b.style.background='#0f1117';b.style.color='#6b7494';});btn.style.borderColor=g.col;btn.style.background='rgba('+(g.col==='#3b82f6'?'59,130,246':'239,68,68')+',0.1)';btn.style.color=g.col;};
    gBtns.push(btn);
  });

  const trainerF=grid.appendChild(_f('담당자'));
  const trainerS=trainerF.appendChild(_sel([{v:'',l:'담당자 없음'},...trainers.map(t=>({v:t.id,l:t.name}))]));
  trainerS.style.padding='10px 12px';if(reg.trainerId)trainerS.value=reg.trainerId;

  const inflowF=grid.appendChild(_f('방문 경로'));
  const inflowS=inflowF.appendChild(_sel([{v:'',l:'선택 안함'},...(INFLOW_OPTIONS||['워크인','플러팅','구글폼','골프상담','기타']).map(v=>({v,l:v}))]));
  inflowS.style.padding='10px 12px';if(reg.inflow)inflowS.value=reg.inflow;

  const purposeF=grid.appendChild(_f('운동 목적'));purposeF.style.gridColumn='1/-1';
  const purposeS=purposeF.appendChild(_sel([{v:'',l:'선택 안함'},'다이어트','근육 증가','재활','건강 관리','골프 퍼포먼스','기타'].map(v=>typeof v==='string'?{v,l:v}:v)));
  purposeS.style.padding='10px 12px';if(reg.purpose)purposeS.value=reg.purpose;

  // 버튼
  const btns=box.appendChild(document.createElement('div'));btns.className='pcm-btns';
  btns.style.marginTop='16px';
  btns.appendChild(Object.assign(document.createElement('button'),{className:'pcm-btn-sec',textContent:'취소'})).onclick=close;
  const nextBtn=btns.appendChild(document.createElement('button'));nextBtn.className='pcm-btn-pri';nextBtn.textContent='다음 →';
  nextBtn.onclick=()=>{
    const name=nameI.value.trim();const phone=phoneI.value.trim();
    if(!name){alert('이름을 입력해주세요.');return;}
    if(!phone){alert('연락처를 입력해주세요.');return;}
    reg.name=name;reg.phone=phone;reg.gender=selGender;
    reg.trainerId=trainerS.value;reg.inflow=inflowS.value;reg.purpose=purposeS.value;
    renderRegStep2(box,close,reg);
  };
}

function renderRegStep2(box,close,reg){
  box.innerHTML='';
  box.appendChild(Object.assign(document.createElement('div'),{className:'pcm-ttl',textContent:'신규 회원 추가'}));
  box.appendChild(Object.assign(document.createElement('div'),{className:'pcm-sub',textContent:'추가 정보를 입력해 주세요 (선택)'}));
  const sb=box.appendChild(document.createElement('div'));sb.className='pcm-step-bar';
  [true,true].forEach(on=>{const s=sb.appendChild(document.createElement('div'));s.className='pcm-step'+(on?' on':'');});

  // 생년월일 드롭다운
  const bdF=box.appendChild(_f('생년월일'));
  const bdRow=bdF.appendChild(document.createElement('div'));bdRow.style.cssText='display:flex;gap:8px;';
  const curYear=new Date().getFullYear();
  const bdY=bdRow.appendChild(document.createElement('select'));bdY.className='pcm-select';bdY.style.flex='1';
  bdY.appendChild(Object.assign(document.createElement('option'),{value:'',textContent:'년도'}));
  for(let y=curYear;y>=1940;y--){bdY.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:y+'년'}));}
  const bdM=bdRow.appendChild(document.createElement('select'));bdM.className='pcm-select';bdM.style.flex='1';
  bdM.appendChild(Object.assign(document.createElement('option'),{value:'',textContent:'월'}));
  for(let m=1;m<=12;m++){bdM.appendChild(Object.assign(document.createElement('option'),{value:String(m).padStart(2,'0'),textContent:m+'월'}));}
  const bdD=bdRow.appendChild(document.createElement('select'));bdD.className='pcm-select';bdD.style.flex='1';
  bdD.appendChild(Object.assign(document.createElement('option'),{value:'',textContent:'일'}));
  for(let d=1;d<=31;d++){bdD.appendChild(Object.assign(document.createElement('option'),{value:String(d).padStart(2,'0'),textContent:d+'일'}));}
  if(reg.birthdate){const p=reg.birthdate.split('-');bdY.value=p[0]||'';bdM.value=p[1]||'';bdD.value=p[2]||'';}

  const adF=box.appendChild(_f('주소'));
  const adI=adF.appendChild(_inp('예) 서울시 강남구'));adI.value=reg.address||'';

  const noF=box.appendChild(_f('특이사항'));
  const noTA=noF.appendChild(document.createElement('textarea'));
  noTA.className='pcm-textarea';noTA.placeholder='특이사항 입력...';noTA.style.minHeight='60px';noTA.value=reg.notes||'';

  const btns=box.appendChild(document.createElement('div'));btns.className='pcm-btns';btns.style.marginTop='20px';
  btns.appendChild(Object.assign(document.createElement('button'),{className:'pcm-btn-sec',textContent:'← 이전'})).onclick=()=>renderRegStep1(box,close,reg);
  const okBtn=btns.appendChild(document.createElement('button'));okBtn.className='pcm-btn-pri';okBtn.textContent='생성 완료';
  okBtn.onclick=()=>{
    const bdStr=bdY.value&&bdM.value&&bdD.value?bdY.value+'-'+bdM.value+'-'+bdD.value:'';
    reg.birthdate=bdStr;reg.address=adI.value.trim();reg.email='';reg.notes=noTA.value.trim();
    const newMb={id:'m'+Date.now(),trainerId:reg.trainerId,name:reg.name,phone:reg.phone,
      gender:reg.gender,birthdate:reg.birthdate,address:reg.address,email:reg.email,
      inflow:reg.inflow,purpose:reg.purpose,notes:reg.notes,
      plans:[],registeredAt:Date.now()};
    members.push(newMb);sv('og10_mb',members);
    close();pcDetailMbId=newMb.id;
    // 바로 이용권 추가 화면 열기
    setTimeout(()=>openPcPayment(newMb.id,null,null),100);
    renderPcContent();
  };
}

// ── 고객 목록 ────────────────────────────────────────────────────────────
function renderPcCust(ct,acts){
  if(acts){const ab=acts.appendChild(Object.assign(document.createElement('button'),{className:'pc-tbtn pri',textContent:'+ 회원 등록'}));ab.onclick=()=>openPcAddMember();}
  const subs=[{id:'all',label:'전체'},{id:'active',label:'활성'},{id:'expiring',label:'만료임박'},{id:'expired',label:'만료'},{id:'none',label:'미등록'}];
  const sb=ct.appendChild(Object.assign(document.createElement('div'),{className:'pc-sub-tabs'}));
  subs.forEach(s=>{
    let cnt;
    if(s.id==='all')cnt=members.length;
    else if(s.id==='expiring')cnt=members.filter(m=>{let t=0;(m.plans||[]).forEach(p=>{t+=getPlanRemain(p);});return t>0&&t<=3;}).length;
    else cnt=members.filter(m=>pcMbStatus(m)===s.id).length;
    const tab=sb.appendChild(Object.assign(document.createElement('div'),{className:'pc-stab'+(custSV===s.id?' on':''),textContent:s.label+' '+cnt}));
    tab.onclick=()=>{custSV=s.id;pcDetailMbId=null;renderPcContent();};
  });
  const fb=ct.appendChild(Object.assign(document.createElement('div'),{className:'pc-fbar'}));
  const si=fb.appendChild(document.createElement('input'));si.className='pcm-input';si.style.cssText='width:220px;padding:9px 12px;font-size:13px;';
  si.placeholder='이름 또는 연락처...';si.value=pcCustKw;
  si.oninput=e=>pcCustKw=e.target.value;si.onkeydown=e=>{if(e.key==='Enter')renderPcContent();};
  fb.appendChild(Object.assign(document.createElement('button'),{className:'pc-tbtn',textContent:'조회'})).onclick=()=>renderPcContent();

  let list=members;
  if(custSV==='expiring')list=list.filter(m=>{let t=0;(m.plans||[]).forEach(p=>{t+=getPlanRemain(p);});return t>0&&t<=3;});
  else if(custSV&&custSV!=='all')list=list.filter(m=>pcMbStatus(m)===custSV);
  if(pcCustKw)list=list.filter(m=>m.name.includes(pcCustKw)||(m.phone||'').includes(pcCustKw));

  const tw=ct.appendChild(Object.assign(document.createElement('div'),{className:'pc-tw'}));
  const tbl=tw.appendChild(Object.assign(document.createElement('table'),{className:'pc-tbl'}));
  const thead=tbl.appendChild(document.createElement('thead'));const hr=thead.appendChild(document.createElement('tr'));
  ['No','상태','이름','연락처','성별','담당','유입','수업권','잔여'].forEach(h=>{hr.appendChild(Object.assign(document.createElement('th'),{textContent:h}));});
  const tbody=tbl.appendChild(document.createElement('tbody'));
  list.forEach((mb,i)=>{
    const tr2=trainers.find(t=>t.id===mb.trainerId);const st=pcMbStatus(mb);
    const plans=mb.plans||[];const latest=plans[plans.length-1];const rem=plans.reduce((s,p)=>s+getPlanRemain(p),0);
    const row=tbody.appendChild(document.createElement('tr'));row.style.cursor='pointer';
    row.onclick=()=>openPcMemberDetail(mb.id);
    const totalPaid=(mb.plans||[]).reduce((s,p)=>s+(p.totalPrice||0),0);
    const regDate=mb.registeredAt?new Date(mb.registeredAt).toLocaleDateString('ko-KR',{year:'2-digit',month:'2-digit',day:'2-digit'}):'-';
    [i+1,'',mb.name,mb.phone||'-',mb.gender||'-',tr2?tr2.name:'-',mb.inflow||'-',latest?(latest.productName||latest.duration+'분 '+latest.sessions+'회권'):'-',rem+'회',totalPaid?totalPaid.toLocaleString()+'원':'-',regDate].forEach((v,ci)=>{
      const td=document.createElement('td');if(ci===1)td.innerHTML='<span class="pbs '+pcSCls(st)+'">'+pcSLbl(st)+'</span>';else td.textContent=v;if(ci===9)td.style.fontWeight='700';row.appendChild(td);
    });
  });
  if(!list.length){const tr3=tbody.appendChild(document.createElement('tr'));const td=document.createElement('td');td.colSpan=11;td.style.cssText='text-align:center;padding:40px;color:#2a2d45;';td.textContent='회원이 없습니다.';tr3.appendChild(td);}
}

// ── 회원 상세 모달 (Image 3 참고) ────────────────────────────────────────
function openPcMemberDetail(mbId){
  const close=pcModal((box,c)=>{
    box.style.cssText+=';padding:0;overflow:hidden;display:flex;width:860px;max-height:85vh;';
    renderMbDetailModal(box,c,mbId);
  },{full:false});
}

function renderMbDetailModal(box,close,mbId){
  box.innerHTML='';
  const mb=members.find(m=>m.id===mbId);if(!mb)return;
  const tr2=trainers.find(t=>t.id===mb.trainerId);
  const st=pcMbStatus(mb);
  // 2열: 왼쪽 정보 + 오른쪽 콘텐츠
  const left=box.appendChild(document.createElement('div'));
  left.style.cssText='width:240px;flex-shrink:0;background:#0f1117;border-right:1px solid #1e2026;padding:24px 20px;overflow-y:auto;';

  // 아바타
  const av=left.appendChild(document.createElement('div'));
  av.style.cssText='width:56px;height:56px;border-radius:50%;background:#1c1f28;color:#818cf8;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;margin-bottom:12px;';
  av.textContent=(mb.name||'?')[0];
  left.appendChild(Object.assign(document.createElement('div'),{textContent:mb.name})).style.cssText='font-size:16px;font-weight:800;color:#e2e8f0;margin-bottom:4px;';
  const stBdg=left.appendChild(document.createElement('div'));stBdg.className='pbs '+pcSCls(st);stBdg.textContent=pcSLbl(st);stBdg.style.marginBottom='16px';

  // 정보 리스트
  const infoItems=[
    ['성별',mb.gender||'미입력'],['생년월일',mb.birthdate||'미입력'],
    ['연락처',mb.phone||'미입력'],['주소',mb.address||'미입력'],
    ['담당자',tr2?tr2.name:'없음'],['특이사항',mb.notes||'-'],
    ['방문경로',mb.inflow||'선택 안함'],['운동목적',mb.purpose||'선택 안함'],
    ['등록일',mb.registeredAt?new Date(mb.registeredAt).toLocaleDateString('ko-KR'):''],
  ];
  infoItems.forEach(([k,v])=>{
    const row=left.appendChild(document.createElement('div'));row.style.cssText='margin-bottom:8px;';
    row.innerHTML='<div style="font-size:10px;color:#3a3f58;font-weight:700;letter-spacing:.5px;margin-bottom:2px;">'+k+'</div><div style="font-size:12px;color:#8892aa;">'+v+'</div>';
  });
  // 수정 버튼
  left.appendChild(Object.assign(document.createElement('button'),{className:'pcdp-add-btn',textContent:'회원 정보 수정'})).onclick=()=>openPcEditMemberModal(mbId,box,close);
  const delMbBtn=left.appendChild(document.createElement('button'));
  delMbBtn.style.cssText='width:100%;padding:10px;border-radius:8px;border:1px solid rgba(248,113,113,.3);background:transparent;color:#f87171;font-size:12px;font-weight:600;cursor:pointer;margin-top:6px;font-family:inherit;';
  delMbBtn.textContent='회원 삭제';
  delMbBtn.onclick=()=>{if(confirm(mb.name+' 회원을 삭제하시겠습니까?')){members=members.filter(m=>m.id!==mbId);sv('og10_mb',members);close();renderPcContent();}};

  // 오른쪽
  const right=box.appendChild(document.createElement('div'));
  right.style.cssText='flex:1;display:flex;flex-direction:column;overflow:hidden;';

  // 탭
  let activeTab='dashboard';
  const tabBar=right.appendChild(document.createElement('div'));
  tabBar.style.cssText='display:flex;border-bottom:1px solid #1e2026;padding:0 20px;background:#111318;flex-shrink:0;';
  const tabContent=right.appendChild(document.createElement('div'));tabContent.style.cssText='flex:1;overflow-y:auto;padding:20px;';

  const tabs=[{id:'dashboard',label:'대시보드'},{id:'payment',label:'결제 내역'}];
  const tabBtns=[];
  tabs.forEach(t=>{
    const btn=tabBar.appendChild(document.createElement('div'));
    btn.style.cssText='padding:14px 16px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid '+(activeTab===t.id?'#818cf8':'transparent')+';color:'+(activeTab===t.id?'#818cf8':'#4a5068')+';transition:all .15s;white-space:nowrap;';
    btn.textContent=t.label;tabBtns.push(btn);
    btn.onclick=()=>{activeTab=t.id;tabBtns.forEach((b,i)=>{b.style.borderBottomColor=i===tabs.indexOf(t)?'#818cf8':'transparent';b.style.color=i===tabs.indexOf(t)?'#818cf8':'#4a5068';});renderMbTab(tabContent,mb,activeTab,box,close);};
  });
  renderMbTab(tabContent,mb,activeTab,box,close);
}

function renderMbTab(ct,mb,tab,box,close){
  ct.innerHTML='';
  if(tab==='dashboard'){
    // 유효 상품 / 만료 상품
    const plans=mb.plans||[];
    const active=plans.filter(p=>getPlanRemain(p)>0);const expired=plans.filter(p=>getPlanRemain(p)<=0);
    // 헤더 카운트
    const hdr=ct.appendChild(document.createElement('div'));
    hdr.style.cssText='display:flex;align-items:center;gap:16px;margin-bottom:20px;';
    hdr.innerHTML='<span style="font-size:14px;font-weight:700;color:#e2e8f0;">유효 상품 <span style="color:#818cf8;">'+active.length+'</span></span><span style="font-size:14px;color:#4a5068;">만료 상품 '+expired.length+'</span>';

    // 이용권 카드들
    if(!plans.length){
      const emp=ct.appendChild(document.createElement('div'));
      emp.style.cssText='background:#0f1117;border:1px dashed #1e2026;border-radius:10px;padding:32px;text-align:center;color:#2a2d45;font-size:13px;margin-bottom:12px;';
      emp.textContent='이용권(0)';
    }
    plans.forEach(p=>renderMbPlanCard(ct,mb,p,box,close));;

    // 이용권 추가 버튼
    ct.appendChild(Object.assign(document.createElement('button'),{className:'pcdp-add-btn',textContent:'+ 이용권 추가하기'})).onclick=()=>openPcPayment(mb.id,box,close);

    // 결제 내역 통계
    const sec2=ct.appendChild(document.createElement('div'));sec2.style.marginTop='20px';
    sec2.innerHTML='<div style="font-size:11px;font-weight:700;color:#3a3f58;letter-spacing:1px;margin-bottom:12px;">결제 내역 통계</div>';
    const totalPaid=(mb.plans||[]).reduce((s,p)=>s+(p.totalPrice||0),0);
    if(!totalPaid){sec2.innerHTML+='<div style="font-size:12px;color:#2a2d45;">결제 내역이 없습니다</div>';}
    else{sec2.innerHTML+='<div style="font-size:20px;font-weight:800;color:#818cf8;">'+totalPaid.toLocaleString()+'원</div><div style="font-size:11px;color:#3a3f58;margin-top:4px;">총 '+plans.length+'건 결제</div>';}
  } else {
    // 결제 내역 탭
    const plans=mb.plans||[];
    if(!plans.length){const emp=ct.appendChild(document.createElement('div'));emp.style.cssText='text-align:center;padding:40px;color:#2a2d45;font-size:13px;';emp.textContent='결제 내역이 없습니다';}
    plans.slice().reverse().forEach((p,i)=>{
      const card=ct.appendChild(document.createElement('div'));
      card.style.cssText='background:#0f1117;border:1px solid #1e2026;border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;';
      const d=p.addedAt?new Date(p.addedAt).toLocaleDateString('ko-KR'):'';
      card.innerHTML='<div><div style="font-size:13px;font-weight:700;color:#e2e8f0;margin-bottom:3px;">'+(p.productName||p.duration+'분 '+p.sessions+'회권')+'</div><div style="font-size:11px;color:#4a5068;">'+d+(p.paymentMethod?' · '+p.paymentMethod:'')+'</div></div>'
        +'<div style="font-size:15px;font-weight:800;color:#e2e8f0;">'+(p.totalPrice||0).toLocaleString()+'원</div>';
    });
  }
}

// ── 이용권 추가 / 결제 (Image 4 참고) ────────────────────────────────────
function openPcPayment(mbId,parentBox,parentClose){
  const mb=members.find(m=>m.id===mbId);if(!mb)return;
  let selProductId=null;let selPayMethod='카드';let activeType='pt';

  const isMob=window.innerWidth<700;
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;display:flex;align-items:'+(isMob?'flex-end':'center')+';justify-content:center;';
  const wrap=document.createElement('div');
  wrap.style.cssText='display:flex;flex-direction:'+(isMob?'column':'row')+';width:'+(isMob?'100%':'94vw')+';max-width:1200px;height:'+(isMob?'92vh':'82vh')+';background:#111318;border:1px solid #1e2026;border-radius:'+(isMob?'20px 20px 0 0':'16px')+';overflow:hidden;position:relative;';
  ov.appendChild(wrap);document.body.appendChild(ov);
  const closePayModal=()=>{if(document.body.contains(ov))document.body.removeChild(ov);};
  ov.onclick=e=>{if(e.target===ov)closePayModal();};

  // X버튼
  const xBtn=wrap.appendChild(document.createElement('button'));
  xBtn.style.cssText='position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;background:#1e2026;border:none;color:#6b7494;font-size:18px;cursor:pointer;z-index:5;display:flex;align-items:center;justify-content:center;';
  xBtn.textContent='×';xBtn.onclick=closePayModal;

  // ─ 왼쪽/위: 상품 목록 ──────────────────────────────────────────────────────

// ── PC 수업 진행 내역 ─────────────────────────────────────────────────────
function renderPcSessions(ct,acts){
  if(!pcSalStart){const n=new Date();pcSalStart=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-01';const l=new Date(n.getFullYear(),n.getMonth()+1,0);pcSalEnd=l.getFullYear()+'-'+String(l.getMonth()+1).padStart(2,'0')+'-'+String(l.getDate()).padStart(2,'0');}
  // 기간 내 slots 기반 수업 진행 내역
  const sd=new Date(pcSalStart),ed=new Date(pcSalEnd);ed.setHours(23,59,59);
  function fmtD(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  // 퀵버튼
  const qb=ct.appendChild(Object.assign(document.createElement('div'),{}));qb.style.cssText='display:flex;gap:8px;margin-bottom:12px;';
  function setQuick(s,e){pcSalStart=s;pcSalEnd=e;renderPcContent();}
  [{l:'오늘',fn:()=>{const t=new Date();setQuick(fmtD(t),fmtD(t));}},
   {l:'이번주',fn:()=>{const t=new Date();const dow=t.getDay()||7;const mon=new Date(t);mon.setDate(t.getDate()-dow+1);const sun=new Date(mon);sun.setDate(mon.getDate()+6);setQuick(fmtD(mon),fmtD(sun));}},
   {l:'이번달',fn:()=>{const t=new Date();const s2=new Date(t.getFullYear(),t.getMonth(),1);const e2=new Date(t.getFullYear(),t.getMonth()+1,0);setQuick(fmtD(s2),fmtD(e2));}}
  ].forEach(({l,fn})=>{const btn=qb.appendChild(document.createElement('button'));btn.className='pc-tbtn';btn.textContent=l;btn.style.cssText='padding:8px 16px;font-size:13px;font-weight:600;border-color:#818cf8;color:#818cf8;';btn.onclick=fn;});
  // 필터 바
  const fb=ct.appendChild(Object.assign(document.createElement('div'),{className:'pc-fbar'}));
  const d1=fb.appendChild(document.createElement('input'));d1.type='date';d1.value=pcSalStart;d1.className='pcm-input';d1.style.cssText='width:160px;padding:9px 12px;font-size:13px;';d1.onchange=e=>pcSalStart=e.target.value;
  fb.appendChild(Object.assign(document.createElement('span'),{textContent:'~'})).style.color='#3a3f58';
  const d2=fb.appendChild(document.createElement('input'));d2.type='date';d2.value=pcSalEnd;d2.className='pcm-input';d2.style.cssText='width:160px;padding:9px 12px;font-size:13px;';d2.onchange=e=>pcSalEnd=e.target.value;
  const trs=fb.appendChild(document.createElement('select'));trs.className='pcm-select';trs.style.cssText='width:130px;padding:9px 12px;';
  trs.appendChild(Object.assign(document.createElement('option'),{value:'',textContent:'전체 트레이너'}));
  trainers.forEach(t=>{const o=trs.appendChild(document.createElement('option'));o.value=t.id;o.textContent=t.name;if(t.id===pcSalTr)o.selected=true;});trs.onchange=e=>pcSalTr=e.target.value;
  fb.appendChild(Object.assign(document.createElement('button'),{className:'pc-tbtn pri',textContent:'조회'})).onclick=()=>renderPcContent();
  if(acts){acts.appendChild(Object.assign(document.createElement('button'),{className:'pc-tbtn',textContent:'엑셀 다운로드'})).onclick=()=>dlSessionsXLSX();}
  // 슬롯 필터링
  const filtered=slots.filter(s=>{
    const d=new Date(s.date);if(d<sd||d>ed)return false;
    if(pcSalTr&&s.trainerId!==pcSalTr)return false;
    return s.type!=='OT'&&s.type!=='상담';
  }).sort((a,b)=>b.date.localeCompare(a.date)||b.time.localeCompare(a.time));
  // 요약 카드
  const sg=ct.appendChild(Object.assign(document.createElement('div'),{className:'pc-dash-g3'}));
  const trSet=new Set(filtered.map(s=>s.trainerId));const mbSet=new Set(filtered.filter(s=>s.memberId).map(s=>s.memberId));
  [{v:filtered.length+'건',l:'수업 진행'},{v:trSet.size+'명',l:'트레이너'},{v:mbSet.size+'명',l:'수업 회원'}].forEach(c=>{const card=sg.appendChild(Object.assign(document.createElement('div'),{className:'pc-card'}));card.innerHTML='<div class="pc-card-ttl">'+c.l+'</div><div class="pc-card-val">'+c.v+'</div>';});
  // 테이블
  const tw=ct.appendChild(Object.assign(document.createElement('div'),{className:'pc-tw'}));
  const tbl=tw.appendChild(Object.assign(document.createElement('table'),{className:'pc-tbl'}));
  const thead=tbl.appendChild(document.createElement('thead'));const hr=thead.appendChild(document.createElement('tr'));
  const tbody=tbl.appendChild(document.createElement('tbody'));
  ['날짜','시간','트레이너','회원','유형','수업권','잔여'].forEach(h=>hr.appendChild(Object.assign(document.createElement('th'),{textContent:h})));
  filtered.forEach(s=>{
    const tr2=trainers.find(t=>t.id===s.trainerId);const mb=s.memberId?members.find(m=>m.id===s.memberId):null;
    const plan=s.planId&&mb?(mb.plans||[]).find(p=>p.id===s.planId):null;
    const rem=plan?getPlanRemain(plan):'-';
    const row=tbody.appendChild(document.createElement('tr'));
    [s.date,s.time.slice(0,5),tr2?tr2.name:'-',mb?mb.name:(s.memo||'-'),s.type||'-',plan?(plan.productName||plan.sessions+'회권'):'-',rem+''].forEach(v=>{row.appendChild(Object.assign(document.createElement('td'),{textContent:v}));});
  });
  if(!filtered.length){const tr3=tbody.appendChild(document.createElement('tr'));const td=tr3.appendChild(document.createElement('td'));td.colSpan=7;td.style.cssText='text-align:center;padding:32px;color:#2a2d45;';td.textContent='수업 진행 내역이 없습니다.';}

// ── 캘린더 ──────────────────────────────────────────────────────────────
function renderPcCal(ct,acts){
  if(acts){acts.appendChild(Object.assign(document.createElement('button'),{className:'pc-tbtn pri',textContent:'+ 일정 추가'})).onclick=()=>openPcAddSchedule();}
  const hdr=ct.appendChild(Object.assign(document.createElement('div'),{style:'display:flex;align-items:center;gap:12px;margin-bottom:16px;'}));
  hdr.appendChild(Object.assign(document.createElement('button'),{className:'pc-tbtn',textContent:'◀'})).onclick=()=>{pcCalM--;if(pcCalM<0){pcCalM=11;pcCalY--;}renderPcContent();};
  const ttlDiv=hdr.appendChild(Object.assign(document.createElement('div'),{}));ttlDiv.style.cssText='font-size:18px;font-weight:800;flex:1;';ttlDiv.textContent=pcCalY+'년 '+(pcCalM+1)+'월';
  hdr.appendChild(Object.assign(document.createElement('button'),{className:'pc-tbtn',textContent:'오늘'})).onclick=()=>{const n=new Date();pcCalY=n.getFullYear();pcCalM=n.getMonth();renderPcContent();};
  hdr.appendChild(Object.assign(document.createElement('button'),{className:'pc-tbtn',textContent:'▶'})).onclick=()=>{pcCalM++;if(pcCalM>11){pcCalM=0;pcCalY++;}renderPcContent();};
  const grid=ct.appendChild(Object.assign(document.createElement('div'),{className:'pc-cal-g'}));
  ['월','화','수','목','금','토','일'].forEach(d=>grid.appendChild(Object.assign(document.createElement('div'),{className:'pc-cal-hdr',textContent:d})));
  const firstDow=new Date(pcCalY,pcCalM,1).getDay();const startOff=firstDow===0?6:firstDow-1;
  const dim=new Date(pcCalY,pcCalM+1,0).getDate();const today=new Date();
  for(let i=0;i<startOff;i++){const c=grid.appendChild(Object.assign(document.createElement('div'),{className:'pc-cal-cell'}));c.style.background='#0a0c10';}
  for(let d=1;d<=dim;d++){
    const isT=today.getFullYear()===pcCalY&&today.getMonth()===pcCalM&&today.getDate()===d;
    const cell=grid.appendChild(Object.assign(document.createElement('div'),{className:'pc-cal-cell'+(isT?' tod':'')}));
    cell.appendChild(Object.assign(document.createElement('div'),{className:'pc-cal-num',textContent:''+d}));
    const ds=pcCalY+'-'+String(pcCalM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    slots.filter(s=>s.date===ds).sort((a,b)=>a.time.localeCompare(b.time)).slice(0,3).forEach(s=>{
      const tr2=trainers.find(t=>t.id===s.trainerId);if(!tr2)return;
      const mb=s.memberId?members.find(m=>m.id===s.memberId):null;const col=getTrainerColor(tr2);
      const ev=cell.appendChild(Object.assign(document.createElement('div'),{className:'pc-cal-ev'}));ev.style.cssText='background:'+col.bg+';color:'+col.text+';';
      const planC=s.planId&&mb?(mb.plans||[]).find(p=>p.id===s.planId):null;
      const usedC=planC?getPlanUsed(planC.id):null;const sessC=planC?planC.sessions:null;
      ev.textContent=s.time.slice(0,5)+' '+(mb?mb.name:s.memo||tr2.name)+(usedC!==null?' '+usedC+'/'+sessC:'');
      ev.onclick=e=>{e.stopPropagation();openPcSlotDetail(s.id);};
    });
    const all=slots.filter(s=>s.date===ds).length;if(all>3){const m=cell.appendChild(Object.assign(document.createElement('div'),{}));m.style.cssText='font-size:9px;color:#3a3f58;margin-top:1px;';m.textContent='+'+(all-3)+'개 더';}
    cell.onclick=()=>openPcAddSchedule(ds);
  }
}

// 환불 모달
function openPcRefund(mb, plan, parentBox, parentClose) {
  const used = getPlanUsed(plan.id);
  const rem = getPlanRemain(plan);
  const paid = plan.totalPrice || 0;
  const perSession = plan.pricePerSession || (plan.sessions > 0 ? Math.round(paid / plan.sessions) : 0);
  const usedAmt = used * perSession;
  const suggested = Math.max(0, paid - usedAmt);

  pcModal((box, close) => {
    box.appendChild(Object.assign(document.createElement('div'), {className:'pcm-ttl', textContent:'환불 / 양도'}));
    box.appendChild(Object.assign(document.createElement('div'), {className:'pcm-sub', textContent: mb.name + ' · ' + (plan.productName || plan.sessions + '회권')}));

    // 요약 카드
    const sumCard = box.appendChild(document.createElement('div'));
    sumCard.style.cssText = 'background:#0f1117;border:1px solid #1e2026;border-radius:10px;padding:14px 16px;margin-bottom:20px;display:grid;grid-template-columns:1fr 1fr;gap:10px;';
    [
      ['결제 금액', paid.toLocaleString() + '원'],
      ['결제 수단', plan.paymentMethod || '-'],
      ['사용 횟수', used + '회 (회당 ' + perSession.toLocaleString() + '원)'],
      ['잔여 횟수', rem + '회'],
      ['사용 금액', usedAmt.toLocaleString() + '원'],
      ['환불 예상', suggested.toLocaleString() + '원'],
    ].forEach(([k, v]) => {
      const cell = sumCard.appendChild(document.createElement('div'));
      cell.innerHTML = '<div style="font-size:10px;color:#3a3f58;font-weight:700;letter-spacing:.5px;margin-bottom:3px;">' + k + '</div><div style="font-size:13px;color:#c4cde8;font-weight:600;">' + v + '</div>';
    });

    // 유형 선택
    let refType = 'refund';
    const typeF = box.appendChild(document.createElement('div'));
    typeF.style.marginBottom = '14px';
    typeF.appendChild(Object.assign(document.createElement('label'), {className:'pcm-label', textContent:'처리 유형'}));
    const typeRow = typeF.appendChild(document.createElement('div'));
    typeRow.style.cssText = 'display:flex;gap:8px;';
    const typeBtns = [];
    [{v:'refund',l:'환불'},{v:'transfer',l:'양도'}].forEach(t => {
      const btn = typeRow.appendChild(document.createElement('button'));
      btn.style.cssText = 'flex:1;padding:10px;border-radius:9px;border:1.5px solid ' + (refType===t.v?'#f87171':'#1e2026') + ';background:' + (refType===t.v?'rgba(248,113,113,.1)':'#0f1117') + ';color:' + (refType===t.v?'#f87171':'#6b7494') + ';font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;';
      btn.textContent = t.l; typeBtns.push({btn, v:t.v});
      btn.onclick = () => {
        refType = t.v;
        typeBtns.forEach(({btn:b, v}) => {
          const isOn = v === refType;
          b.style.borderColor = isOn ? '#f87171' : '#1e2026';
          b.style.background = isOn ? 'rgba(248,113,113,.1)' : '#0f1117';
          b.style.color = isOn ? '#f87171' : '#6b7494';
        });
        transferF.style.display = refType === 'transfer' ? 'block' : 'none';
      };
    });

    // 양도 대상 (양도 선택 시만 표시)
    const transferF = box.appendChild(document.createElement('div'));
    transferF.style.display = 'none';
    transferF.appendChild(Object.assign(document.createElement('label'), {className:'pcm-label', textContent:'양도 대상 회원'}));
    const transferI = transferF.appendChild(document.createElement('input'));
    transferI.className = 'pcm-input'; transferI.placeholder = '이름 또는 연락처 검색...';

    // 환불 금액
    const amtF = box.appendChild(document.createElement('div'));
    amtF.appendChild(Object.assign(document.createElement('label'), {className:'pcm-label'})).innerHTML = '실제 환불 금액 <span class="req">*</span>';
    const amtI = amtF.appendChild(document.createElement('input'));
    amtI.className = 'pcm-input'; amtI.placeholder = '수수료/위약금 제외 실 환불액';
    amtI.value = suggested.toLocaleString();
    amtI.oninput = function() { this.value = fmtMoney(this.value); };

    // 메모
    const memoF = box.appendChild(_f('메모 (선택)'));
    const memoT = memoF.appendChild(document.createElement('textarea'));
    memoT.className = 'pcm-textarea'; memoT.placeholder = '환불 사유, 특이사항...'; memoT.style.minHeight = '60px';

    const btns = box.appendChild(document.createElement('div'));
    btns.className = 'pcm-btns'; btns.style.marginTop = '20px';
    btns.appendChild(Object.assign(document.createElement('button'), {className:'pcm-btn-sec', textContent:'취소'})).onclick = close;

    const confirmBtn = btns.appendChild(document.createElement('button'));
    confirmBtn.className = 'pcm-btn-pri'; confirmBtn.textContent = '환불 처리';
    confirmBtn.style.background = '#f87171'; confirmBtn.style.cssText += 'background:#ef4444;';
    confirmBtn.onclick = () => {
      const amt = parseMoney(amtI.value);
      if (isNaN(amt) || amt < 0) { alert('환불 금액을 입력해주세요.'); return; }
      if (!confirm((refType==='refund'?'환불':'양도') + ' 처리하시겠습니까?\n' + mb.name + ' · ' + (plan.productName||plan.sessions+'회권') + '\n실 환불액: ' + amt.toLocaleString() + '원')) return;

      // 환불 기록 저장
      const record = {
        id: 'rf' + Date.now(), type: refType, memberId: mb.id, memberName: mb.name,
        phone: mb.phone || '', planId: plan.id, planName: plan.productName || plan.sessions + '회권',
        paidAmount: paid, usedSessions: used, remainSessions: rem,
        refundAmount: amt, memo: memoT.value.trim(),
        transferTo: refType === 'transfer' ? transferI.value.trim() : '',
        processedAt: Date.now(),
        processedDate: new Date().toLocaleDateString('ko-KR', {year:'2-digit',month:'2-digit',day:'2-digit'}),
      };
      refunds.unshift(record);
      sv('og10_rf', refunds);

      // 수업권 비활성화 (잔여 0으로)
      plan.refunded = true; plan.refundedAt = Date.now(); plan.refundAmount = amt;
      plan.sessions = used; // 잔여 0 처리
      sv('og10_mb', members);

      close();
      alert('✅ ' + (refType==='refund'?'환불':'양도') + ' 처리 완료!\n' + amt.toLocaleString() + '원');
      if (parentBox && parentClose) renderMbDetailModal(parentBox, parentClose, mb.id);
      else if(window.innerWidth<700){renderMem();}
      else renderPcContent();
    };
  }, {wide: true});
}

  wsData.push(['날짜','시간','트레이너','회원','유형','수업권','잔여']);
  const sd=new Date(pcSalStart),ed=new Date(pcSalEnd);ed.setHours(23,59,59);
  slots.filter(s=>{
    const d=new Date(s.date);return d>=sd&&d<=ed&&s.type!=='OT'&&s.type!=='상담'&&s.memberId&&(!pcSalTr||s.trainerId===pcSalTr);
  }).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time)).forEach(s=>{

  wsData.push(['처리일','유형','회원','연락처','이용권','결제금액','사용횟수','잔여횟수','환불금액','메모']);
  const typeMap={refund:'환불',transfer:'양도'};
  refunds.forEach(r=>{wsData.push([r.processedDate||'',typeMap[r.type]||r.type,r.memberName,r.phone||'',r.planName||'',(r.paidAmount||0),r.usedSessions,r.remainSessions,(r.refundAmount||0),r.memo||'']);});
  const ws=XLSX.utils.aoa_to_sheet(wsData);XLSX.utils.book_append_sheet(wb,ws,'환불내역');
  XLSX.writeFile(wb,'환불내역.xlsx');
}

// ── PC 게이트 로그인 ─────────────────────────────────────────────────────
function showPcGate(){
  const g=document.getElementById('pcg');if(!g)return;g.style.display='flex';
  setTimeout(()=>{const i=document.getElementById('pcg-input');if(i){i.value='';i.focus();}},100);
}
function hidePcGate(){const g=document.getElementById('pcg');if(g)g.style.display='none';}
function pcgLogin(){
  const inp=document.getElementById('pcg-input');
  const err=document.getElementById('pcg-err');
  if(!inp)return;
  const val=inp.value;
  const cc=localStorage.getItem('og10_cc')||'0000';
  if(val===cc){
    hidePcGate();
    initPcNav();
    renderPcContent();
  } else {
    if(err){err.textContent='센터 코드가 올바르지 않습니다.';setTimeout(()=>{err.textContent='';},2000);}
    inp.value='';inp.focus();
  }
}
function initPcLayout(){
  const pcg=document.getElementById('pcg');
  if(window.innerWidth<960){if(pcg)pcg.style.display='none';return;}
  const pl=document.getElementById('pc-layout');if(!pl)return;
  pl.style.display='flex';
  if(typeof codeVerified!=='undefined'&&codeVerified){
    if(pcg)pcg.style.display='none';initPcNav();renderPcContent();
  } else {
    showPcGate();
  }
}
window.addEventListener('resize',()=>{
  const pl=document.getElementById('pc-layout');if(!pl)return;
  if(window.innerWidth>=960){pl.style.display='flex';}else{pl.style.display='none';}
},{passive:true});

// ── PC 캘린더 슬롯 상세/수정/삭제 ─────────────────────────────────────────
function openPcSlotDetail(slotId){
  const s=slots.find(x=>x.id===slotId);if(!s)return;
  const tr2=trainers.find(t=>t.id===s.trainerId);
  const mb=s.memberId?members.find(m=>m.id===s.memberId):null;
  let editing=false;

  const close=pcModal((box,closeModal)=>{
    box.style.minWidth='420px';

    // 헤더
    const head=box.appendChild(document.createElement('div'));
    head.style.cssText='display:flex;align-items:center;gap:10px;margin-bottom:16px;';
    const col=tr2?getTrainerColor(tr2):COLORS[0];
    const dot=head.appendChild(document.createElement('div'));dot.style.cssText='width:10px;height:10px;border-radius:50%;background:'+col.dot+';flex-shrink:0;';
    const ttl=head.appendChild(document.createElement('div'));ttl.style.cssText='font-size:16px;font-weight:800;color:#e2e8f0;flex:1;';
    ttl.textContent=(tr2?tr2.name:'?')+' · '+(mb?mb.name:s.memo||'일정');
    const editBtn=head.appendChild(document.createElement('button'));
    editBtn.className='pc-tbtn';editBtn.textContent='수정';editBtn.style.cssText='padding:6px 14px;font-size:12px;';

    // 정보 카드
    const infoCard=box.appendChild(document.createElement('div'));
    infoCard.style.cssText='background:#0f1117;border:1px solid #1e2026;border-radius:10px;padding:14px 16px;margin-bottom:16px;';

    function renderInfo(){
      infoCard.innerHTML='';
      const rows=[
        ['날짜',s.date],['시간',s.time],['유형',s.type||'-'],
        ['트레이너',tr2?tr2.name:'-'],
        ['회원',mb?mb.name+(mb.phone?' · '+mb.phone:''):'-'],
      ];
      if(mb&&s.planId){
        const plan=(mb.plans||[]).find(p=>p.id===s.planId);
        if(plan){const rem=getPlanRemain(plan);rows.push(['수업권',(plan.productName||plan.sessions+'회권')+' · 잔여 '+rem+'회']);}
      }
      if(s.memo)rows.push(['메모',s.memo]);
      rows.forEach(([k,v])=>{
        const row=infoCard.appendChild(document.createElement('div'));
        row.style.cssText='display:flex;gap:12px;margin-bottom:7px;font-size:13px;';
        row.innerHTML='<span style="color:#3a3f58;min-width:56px;flex-shrink:0;">'+k+'</span><span style="color:#c4cde8;">'+v+'</span>';
      });
    }
    renderInfo();

    // 수정 폼 (편집모드)
    const editForm=box.appendChild(document.createElement('div'));
    editForm.style.display='none';

    function showEditForm(){
      editForm.innerHTML='';editForm.style.display='block';infoCard.style.display='none';

      const r2=editForm.appendChild(document.createElement('div'));r2.className='pcm-row2';
      const dtF=r2.appendChild(_f('날짜'));const dtI=dtF.appendChild(_inp(''));dtI.type='date';dtI.value=s.date;dtI.className='pcm-input';
      const tmF=r2.appendChild(_f('시간'));
      const tmS=tmF.appendChild(_sel(TIMES.map(t=>({v:t,l:t}))));tmS.value=s.time;

      const r3=editForm.appendChild(document.createElement('div'));r3.className='pcm-row2';
      const tyF=r3.appendChild(_f('유형'));const tyS=tyF.appendChild(_sel(['OT','25분 수업','50분 수업','상담'].map(v=>({v,l:v}))));tyS.value=s.type||'25분 수업';
      const trF=r3.appendChild(_f('트레이너'));const trS=trF.appendChild(_sel([{v:'',l:'선택'},...trainers.map(t=>({v:t.id,l:t.name}))]));if(s.trainerId)trS.value=s.trainerId;

      // 수업권 선택
      if(mb&&(mb.plans||[]).length){
        const plF=editForm.appendChild(_f('사용 수업권'));
        const plS=plF.appendChild(_sel([{v:'',l:'없음 (OT/상담)'},...(mb.plans||[]).map(p=>({v:p.id,l:(p.productName||p.sessions+'회권')+' · 잔여 '+getPlanRemain(p)+'회'}))]));
        if(s.planId)plS.value=s.planId;
        plS.onchange=()=>s.planId=plS.value;
      }

      const meF=editForm.appendChild(_f('메모'));const meI=meF.appendChild(_inp('메모'));meI.value=s.memo||'';meI.className='pcm-input';

      const fb=editForm.appendChild(document.createElement('div'));fb.className='pcm-btns';fb.style.marginTop='16px';
      fb.appendChild(Object.assign(document.createElement('button'),{className:'pcm-btn-sec',textContent:'취소'})).onclick=()=>{editForm.style.display='none';infoCard.style.display='block';editBtn.textContent='수정';};
      fb.appendChild(Object.assign(document.createElement('button'),{className:'pcm-btn-pri',textContent:'저장'})).onclick=()=>{
        s.date=dtI.value;s.time=tmS.value;s.type=tyS.value;s.trainerId=trS.value;s.memo=meI.value.trim();
        sv('og10_sl',slots);closeModal();renderPcContent();
      };
    }

    editBtn.onclick=()=>{
      if(editForm.style.display==='none'){showEditForm();editBtn.textContent='수정 취소';}
      else{editForm.style.display='none';infoCard.style.display='block';editBtn.textContent='수정';}
    };

    // 하단 삭제 버튼
    const delBtn=box.appendChild(document.createElement('button'));
    delBtn.style.cssText='width:100%;padding:12px;border-radius:10px;border:1px solid rgba(248,113,113,.3);background:transparent;color:#f87171;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit;';
    delBtn.textContent='이 일정 삭제';
    delBtn.onclick=()=>{
      if(!confirm('일정을 삭제하시겠습니까?'))return;
      slots=slots.filter(x=>x.id!==slotId);sv('og10_sl',slots);
      closeModal();renderPcContent();
    };
  },{});
}

// ── PC 일정 추가 모달 ─────────────────────────────────────────────────────
function openPcAddSchedule(initDate){
  const today=new Date();
  const defDate=initDate||(today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0'));
  let selMbId='';let selPlanId='';

  pcModal((box,close)=>{
    box.style.cssText+='width:520px;max-height:90vh;';
    box.appendChild(Object.assign(document.createElement('div'),{className:'pcm-ttl',textContent:'일정 추가'}));

    const r2=box.appendChild(document.createElement('div'));r2.className='pcm-row2';
    // 트레이너
    const trF=r2.appendChild(_f('트레이너',true));
    const trS=trF.appendChild(_sel([{v:'',l:'선택'},...trainers.map(t=>({v:t.id,l:t.name}))]));
    if(curUser)trS.value=curUser;

    // 날짜
    const dtF=r2.appendChild(_f('날짜',true));
    const dtI=dtF.appendChild(_inp(''));dtI.type='date';dtI.value=defDate;dtI.className='pcm-input';

    const r3=box.appendChild(document.createElement('div'));r3.className='pcm-row2';
    // 시간
    const tmF=r3.appendChild(_f('시간',true));
    const tmS=tmF.appendChild(_sel(TIMES.map(t=>({v:t,l:t}))));tmS.value='09:00';

    // 유형 (수업권 선택 시 자동)
    const tyF=r3.appendChild(_f('유형'));
    const tyS=tyF.appendChild(_sel(['25분 수업','50분 수업','OT','상담'].map(v=>({v,l:v}))));

    // 회원 선택 (드롭다운, 담당자만 선택 가능)
    const mbF=box.appendChild(_f('회원 선택'));
    const isMgr=isAdminUser();
    const tid=trS.value||curUser;
    // 드롭다운으로 회원 목록 표시
    let mbSel=mbF.appendChild(document.createElement('select'));mbSel.className='pcm-select';
    mbSel.style.cssText='width:100%;padding:12px 14px;';

    function rebuildMemberDropdown(){
      const currentTid=trS.value||curUser;
      // 관리자: 선택한 트레이너 담당 회원만 / 트레이너: 본인 담당 회원만
      const mList=members.filter(m=>m.trainerId===currentTid);
      mbSel.innerHTML='';
      [{v:'',l:'회원 없음 (OT/상담)'},...mList.map(m=>({v:m.id,l:m.name+(m.phone?' · '+m.phone.slice(-4):'')}))].forEach(({v,l})=>{
        const o=mbSel.appendChild(document.createElement('option'));o.value=v;o.textContent=l;
      });
      // 첫번째 회원 자동 선택 (있을 때)
      if(mList.length>0){
        mbSel.value=mList[0].id;
        selMbId=mList[0].id;
      } else {
        mbSel.value='';selMbId='';
      }
      mbSel.onchange=()=>{selMbId=mbSel.value;rebuildPlanDropdown();};
      rebuildPlanDropdown();
    }

    trS.onchange=()=>rebuildMemberDropdown();

    // 수업권 선택
    const plF=box.appendChild(_f('수업권'));
    let plSel=plF.appendChild(document.createElement('select'));plSel.className='pcm-select';plSel.style.cssText='width:100%;padding:12px 14px;';

    function rebuildPlanDropdown(){
      plSel.innerHTML='';
      selMbId=mbSel.value;
      const mb=selMbId?members.find(m=>m.id===selMbId):null;
      const plans=mb?(mb.plans||[]).filter(p=>getPlanRemain(p)>0):[];
      [{v:'',l:'없음 (OT/상담)'},...plans.map(p=>({v:p.id,l:(p.productName||p.sessions+'회권')+' · 잔여 '+getPlanRemain(p)+'회'}))].forEach(({v,l})=>{
        const o=plSel.appendChild(document.createElement('option'));o.value=v;o.textContent=l;
      });
      // 수업권 있으면 첫번째 수업권 자동 선택
      if(plans.length>0){
        plSel.value=plans[0].id;
        selPlanId=plans[0].id;
        if(plans[0].duration){tyS.value=plans[0].duration+'분 수업';}
      } else {
        plSel.value='';selPlanId='';
      }
      plSel.onchange=()=>{
        selPlanId=plSel.value;
        if(selPlanId&&mb){
          const plan=(mb.plans||[]).find(p=>p.id===selPlanId);
          if(plan&&plan.duration){tyS.value=plan.duration+'분 수업';}
        }
      };
    }

    rebuildMemberDropdown();

    // 메모
    const meF=box.appendChild(_f('메모'));
    const meI=meF.appendChild(_inp('메모 (OT 대상자 이름 등)'));meI.className='pcm-input';

    const btns=box.appendChild(document.createElement('div'));btns.className='pcm-btns';btns.style.marginTop='20px';
    btns.appendChild(Object.assign(document.createElement('button'),{className:'pcm-btn-sec',textContent:'취소'})).onclick=close;
    btns.appendChild(Object.assign(document.createElement('button'),{className:'pcm-btn-pri',textContent:'일정 등록'})).onclick=()=>{
      if(!trS.value){alert('트레이너를 선택해주세요.');return;}
      if(!dtI.value){alert('날짜를 선택해주세요.');return;}
      const slot={id:'sl'+Date.now(),trainerId:trS.value,date:dtI.value,time:tmS.value,type:tyS.value,
        memberId:mbSel.value||null,planId:plSel.value||null,memo:meI.value.trim()};
      slots.push(slot);sv('og10_sl',slots);
      close();renderPcContent();
    };
  },{wide:true});
}

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg0:#0d0d0d;--bg1:#1a1a1a;--bg2:#252525;--bg3:#303030;
  --bd:#2e2e2e;--bd2:#3d3d3d;
  --t1:#fff;--t2:#ccc;--t3:#888;--t4:#555;
  --red:#e05555;--orange:#e8892a;--green:#3dc87a;--gold:#ffd54f;
}
html{height:100%;}
body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#000;color:var(--t1);display:flex;flex-direction:column;overflow:hidden;}

/* ── GATE ── */
#gate{position:fixed;inset:0;z-index:9000;transition:opacity .3s ease;}


.gate-logo{width:110px;height:110px;object-fit:contain;margin-bottom:20px;}
.gate-title{font-size:18px;font-weight:700;color:#fff;letter-spacing:-0.3px;text-align:center;}
.gate-sub{font-size:11px;color:#555;letter-spacing:2px;margin-top:4px;text-align:center;}
.gate-hint{font-size:13px;color:#666;margin-top:32px;margin-bottom:12px;}
.pin-dots{display:flex;gap:14px;margin-bottom:28px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:1px solid #444;background:transparent;transition:background .1s;}
.pin-dot.filled{background:#fff;border-color:#fff;}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px;}
.pkey{background:var(--bg2);border:1px solid var(--bd2);border-radius:50%;width:72px;height:72px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:500;color:var(--t1);cursor:pointer;margin:auto;user-select:none;-webkit-user-select:none;}
.pkey:active{background:var(--bg3);}
.pkey.del{font-size:18px;color:var(--t3);}
.pkey.ok{background:#fff;color:#000;font-size:16px;}
.pkey.ok:active{background:#ddd;}
.pkey.empty{background:transparent;border:none;cursor:default;}
.pin-error{color:var(--red);font-size:13px;margin-top:16px;min-height:20px;text-align:center;}

/* ── APP WRAP ── */
#app-wrap{flex:1;display:none;flex-direction:column;overflow:hidden;background:var(--bg0);}
#app-wrap.show{display:flex;}

/* ── HEADER ── */
.hdr{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:calc(10px + env(safe-area-inset-top)) 16px 10px;background:var(--bg0);border-bottom:1px solid var(--bd);}
.hdr-logo{width:34px;height:34px;object-fit:contain;}
.hdr-ttl{flex:1;font-size:15px;font-weight:700;}
.chip{padding:6px 12px;border-radius:20px;border:1px solid var(--bd2);background:var(--bg2);color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis;}
.chip.on{border-color:transparent;color:#000;}

/* ── TABS ── */
.tabs{flex-shrink:0;display:flex;gap:5px;padding:9px 10px;background:var(--bg0);border-bottom:1px solid var(--bd);}
.tab{flex:1;padding:9px 2px;border-radius:10px;border:none;cursor:pointer;font-size:11px;font-weight:600;background:var(--bg2);color:var(--t3);white-space:nowrap;}
.tab.on{background:#fff;color:#000;}

/* ── PAGES + ANIMATION ── */
.pg{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;display:none;background:var(--bg0);}
.pg.show{display:block;animation:pgIn .22s ease forwards;}
@keyframes pgIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.pad{padding:14px 16px 100px;}

/* ── DAY SELECTOR ── */
.day-wrap{background:var(--bg0);border-bottom:1px solid var(--bd);}
.wnav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 6px;}
.winfo{cursor:pointer;padding:4px 8px;border-radius:8px;}
.winfo:active{background:var(--bg2);}
.wmain{font-size:14px;font-weight:700;color:var(--t1);}
.wsub{font-size:11px;color:var(--t3);margin-top:2px;}
.wbtns{display:flex;gap:5px;}
.warr{background:var(--bg2);border:1px solid var(--bd2);border-radius:8px;color:var(--t2);font-size:13px;padding:6px 13px;cursor:pointer;}
.wtoday{background:transparent;border:1px solid var(--bd2);border-radius:8px;color:var(--t3);font-size:12px;padding:6px 11px;cursor:pointer;}
.dtabs{display:flex;gap:4px;padding:0 12px 10px;overflow-x:auto;scrollbar-width:none;}
.dtabs::-webkit-scrollbar{display:none;}
.dtab{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 10px;border-radius:12px;cursor:pointer;min-width:44px;background:var(--bg2);border:1px solid transparent;}

.dtab.sel .ddot{background:#555;}
.dtab.tod .ddot{background:var(--bd2);}
.dtab.tod{border-color:var(--bd2);}
.dtab.tod .dn{color:var(--t1);}
.dtab.sel{background:#fff;}
.dtab.sel .dw{color:#555;}
.dtab.sel .dn{color:#000;}

/* ── TIME LIST ── */
.tlist{padding:0 0 100px;}
.trow{display:flex;align-items:stretch;border-bottom:1px solid #1a1a1a;min-height:52px;}
.trow.hr{border-bottom:1px solid #222;}
.tcol{width:58px;flex-shrink:0;display:flex;align-items:flex-start;justify-content:flex-end;padding:8px 10px 0 0;border-right:1px solid var(--bd);background:var(--bg1);}
.tlbl{font-size:12px;font-weight:700;color:var(--t2);}

.scol{flex:1;padding:5px 10px;display:flex;flex-direction:column;gap:5px;min-width:0;}
.slot{border-radius:10px;padding:9px 11px;display:flex;align-items:center;gap:8px;}
.si{flex:1;min-width:0;}
.sname{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.smem{font-size:12px;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.sbdgs{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap;}
.tbdg{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;background:rgba(0,0,0,.3);}
.rbdg{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;background:rgba(255,255,255,.1);}
.rbdg.warn{background:rgba(224,85,85,.25);color:#ffaaaa;}
.ot-bdg{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;background:rgba(61,200,122,.2);color:#7de8b0;}
.delx{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.25);border:none;color:inherit;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:.6;}
.delx:active{opacity:1;}
.addbtn{width:100%;background:var(--bg2);border:none;border-radius:9px;color:var(--t3);font-size:12px;padding:8px;cursor:pointer;font-family:inherit;text-align:center;}

.fab{position:fixed;right:18px;bottom:calc(16px + env(safe-area-inset-bottom));width:56px;height:56px;border-radius:50%;background:#fff;color:#000;font-size:28px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,.7);}
.fab:active{transform:scale(.93);}

/* ── MEMBER TAB ── */
.sec-header{font-size:12px;color:var(--t3);font-weight:600;text-align:center;padding:8px 0 12px;letter-spacing:0.5px;}
.trgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.trrole.normal{background:var(--bg2);color:var(--t3);}

.trwarn{font-size:11px;font-weight:700;color:var(--red);}

.mvhdr{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.backbtn{background:var(--bg2);border:1px solid var(--bd2);border-radius:8px;color:var(--t2);font-size:13px;padding:7px 14px;cursor:pointer;}
.mvttl{font-size:16px;font-weight:700;flex:1;}
.memcard{background:var(--bg1);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;margin-bottom:8px;}
.memtop{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
.memnm{font-size:15px;font-weight:700;flex:1;min-width:0;}
.memeditbtn,.memplanbtb{background:var(--bg2);border:1px solid var(--bd2);border-radius:7px;color:var(--t2);font-size:11px;padding:4px 10px;cursor:pointer;white-space:nowrap;}
.mdel{width:28px;height:28px;border-radius:50%;background:var(--bg2);border:1px solid var(--bd);color:var(--t3);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mdel:active{background:#3d1a1a;color:#ffaaaa;}
.planrow{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg2);border-radius:8px;margin-bottom:5px;}

.planrem{font-size:12px;font-weight:700;}

.mphone{font-size:12px;color:var(--t4);margin-top:6px;}
.memwarn{display:inline-block;font-size:11px;font-weight:700;color:var(--red);background:rgba(224,85,85,.15);padding:3px 8px;border-radius:6px;margin-top:4px;}
.dlbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.dlsel{padding:9px 12px;border:1px solid var(--bd2);border-radius:9px;background:var(--bg2);color:var(--t1);font-size:13px;}
.dlbtn{background:var(--bg2);border:1px solid var(--bd2);border-radius:9px;color:var(--t2);font-size:13px;padding:9px 16px;cursor:pointer;}
.addmem{width:100%;padding:12px;background:var(--bg2);border:1px solid var(--bd2);border-radius:10px;color:var(--t2);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;}

/* ── FORMS / ADMIN ── */
.sec{font-size:11px;color:var(--t4);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;margin-top:20px;}
.sec:first-child{margin-top:0;}
.sform{background:var(--bg1);border:1px solid var(--bd);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:10px;}

.sform .sbtn{width:100%;padding:13px;border-radius:10px;border:none;background:#fff;color:#000;font-size:15px;font-weight:700;cursor:pointer;}
.stcard{background:var(--bg1);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:13px;margin-bottom:8px;}

.stnm{font-size:15px;font-weight:600;}

.steditbtn{padding:5px 11px;background:var(--bg2);border:1px solid var(--bd2);border-radius:7px;color:var(--t2);font-size:12px;cursor:pointer;}
.stdel{width:30px;height:30px;border-radius:50%;background:var(--bg2);border:1px solid var(--bd);color:var(--t3);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

.lockbox{background:var(--bg1);border:1px solid var(--bd);border-radius:14px;padding:28px;text-align:center;}

.lockbox small{font-size:12px;color:var(--t4);display:block;margin-bottom:18px;}
.lockbox button{background:var(--bg2);border:1px solid var(--bd2);border-radius:10px;color:var(--t2);font-size:14px;padding:11px 28px;cursor:pointer;}
.adminbar{display:flex;gap:8px;margin-bottom:12px;align-items:center;}
.abadge{font-size:11px;color:#ce93d8;border:1px solid #ce93d8;border-radius:6px;padding:3px 10px;font-weight:700;}

.pwbtn{font-size:12px;color:var(--t4);background:transparent;border:none;cursor:pointer;text-decoration:underline;margin-top:10px;display:block;}
.admsubtabs{display:flex;gap:5px;margin-bottom:16px;background:var(--bg2);border-radius:12px;padding:4px;position:sticky;top:0;z-index:20;}

.pkgcard{background:var(--bg1);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.pkginfo{font-size:14px;font-weight:600;color:var(--t1);}
.pkgprice{font-size:12px;color:var(--t3);margin-top:2px;}
.pkgdel{padding:5px 12px;background:var(--bg2);border:1px solid var(--bd2);border-radius:7px;color:var(--t3);font-size:12px;cursor:pointer;}
.pkgdel:active{background:#3d1a1a;color:#ffaaaa;}

/* ── NOTICE ── */
.ncomp{background:var(--bg1);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:16px;}
.ncomp textarea{width:100%;background:var(--bg2);border:1px solid var(--bd2);border-radius:10px;color:var(--t1);font-size:15px;padding:12px 14px;resize:none;min-height:90px;font-family:inherit;line-height:1.6;}
.ncomp textarea::placeholder{color:var(--t4);}
.ncrow{display:flex;gap:8px;margin-top:10px;}
.ncrow input{flex:1;padding:11px 14px;border:1px solid var(--bd2);border-radius:10px;background:var(--bg2);color:var(--t1);font-size:14px;}

.npinrow input{width:18px;height:18px;accent-color:var(--orange);cursor:pointer;}
.npinrow label{font-size:13px;color:var(--t3);}
.ncard{background:var(--bg1);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:10px;}
.nchdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.ncauth{display:flex;align-items:center;gap:9px;}

.ncdt{font-size:11px;color:var(--t4);margin-top:1px;}
.ncdel{width:28px;height:28px;border-radius:50%;background:var(--bg2);border:1px solid var(--bd);color:var(--t3);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ncdel:active{background:#3d1a1a;}
.nbody{font-size:14px;color:var(--t2);line-height:1.7;white-space:pre-wrap;word-break:break-word;}
.npinbdg{display:inline-flex;font-size:11px;font-weight:700;color:var(--orange);border:1px solid var(--orange);border-radius:6px;padding:2px 8px;margin-bottom:10px;}
.nempty{text-align:center;padding:3rem 0;color:var(--t4);font-size:14px;}

/* ── SHEETS ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:flex;align-items:flex-end;}
.sheet{width:100%;background:var(--bg1);border-radius:20px 20px 0 0;padding:0 18px calc(28px + env(safe-area-inset-bottom));border-top:1px solid var(--bd2);max-height:92vh;overflow-y:auto;}
.shdl{width:40px;height:4px;background:var(--bd2);border-radius:2px;margin:14px auto 16px;}

.trinfo-box{padding:13px 14px;border:1px solid var(--bd2);border-radius:10px;background:var(--bg3);font-size:15px;color:var(--t2);}
.plan-option{padding:12px 14px;border:1px solid var(--bd2);border-radius:10px;background:var(--bg2);display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;cursor:pointer;}
.plan-option.sel{border-color:var(--t1);background:var(--bg3);}
.plan-opt-info{font-size:13px;font-weight:600;color:var(--t1);}
.plan-opt-sub{font-size:11px;color:var(--t3);margin-top:2px;}
.plan-opt-rem{font-size:13px;font-weight:700;}
.pkg-auto{padding:13px 14px;border:1px solid var(--bd2);border-radius:10px;background:var(--bg3);color:var(--t1);font-size:15px;font-weight:600;}
.nmlist{display:flex;flex-direction:column;gap:7px;margin-top:4px;}
.nmbtn{width:100%;padding:12px 16px;border-radius:10px;background:var(--bg2);border:1px solid var(--bd2);color:var(--t1);font-size:15px;font-weight:600;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;}
.nmbtn:active{background:var(--bg3);}
.nmav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.nminf{display:flex;flex-direction:column;}
.nmrl{font-size:11px;color:var(--t3);margin-top:1px;}
.login-hint{font-size:11px;color:var(--t4);text-align:center;margin-top:8px;}


.notice-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.notice-list-title{font-size:15px;font-weight:700;color:var(--t1);}

.read-badge.clickable{cursor:pointer;color:var(--t2);}
.read-badge.clickable:hover{border-color:var(--bd2);}
.read-list{margin-top:10px;padding:10px;background:var(--bg2);border-radius:8px;border:1px solid var(--bd);}

.ncdel{padding:4px 10px;background:transparent;border:1px solid #3d1a1a;border-radius:7px;color:#e05555;font-size:11px;cursor:pointer;white-space:nowrap;}
.ncdel:active{background:#3d1a1a;}


.notice-preview{cursor:pointer;}
.notice-preview:active{opacity:.8;}
.notice-title{font-size:15px;font-weight:700;color:var(--t1);margin-bottom:6px;}

.notice-content.show{display:block;}
.nimg-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.nimg-item{width:calc(50% - 4px);border-radius:8px;overflow:hidden;cursor:pointer;}

/* ── 매출 ── */
.sal-filters{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}

.sal-mode-desc{font-size:11px;color:var(--t4);text-align:center;padding:0 0 8px;}

.sal-card-val{font-size:16px;font-weight:700;color:var(--t1);margin-bottom:4px;}
.sal-card-lbl{font-size:10px;color:var(--t3);}
.sal-chart-wrap{background:var(--bg1);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:14px;}

.sal-dl-btn{width:100%;padding:12px;background:var(--bg2);border:1px solid var(--bd2);border-radius:10px;color:var(--t2);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:12px;}

.sal-tr-section{font-size:11px;color:var(--t4);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;padding:8px 8px 4px;background:var(--bg2);}

.tabs{flex-shrink:0;display:flex;gap:5px;padding:9px 10px;background:var(--bg0);border-bottom:1px solid var(--bd);}

/* ── 회원 조회 ── */

.chist-status-missed{background:rgba(100,150,255,.15);color:#6496ff;}

/* ── 주간 뷰 ── */
.week-grid{display:flex;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;touch-action:pan-x;}

/* ── 스와이프 슬라이드 애니메이션 ── */
@keyframes slideInRight{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideInLeft{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOutRight{from{transform:translateX(0);opacity:1}to{transform:translateX(100%);opacity:0}}
@keyframes slideOutLeft{from{transform:translateX(0);opacity:1}to{transform:translateX(-100%);opacity:0}}
.week-body.slide-in-right{animation:slideInRight .25s cubic-bezier(.4,0,.2,1) forwards;}
.week-body.slide-in-left{animation:slideInLeft .25s cubic-bezier(.4,0,.2,1) forwards;}
#tlist{position:relative;overflow:hidden;}

.pcm-box::-webkit-scrollbar{width:4px;}
.pcm-box::-webkit-scrollbar-thumb{background:#1e2026;border-radius:2px;}
.pcm-ttl{font-size:18px;font-weight:800;color:#e2e8f0;margin-bottom:6px;}
.pcm-sub{font-size:12px;color:#4a5068;margin-bottom:24px;}
.pcm-step-bar{display:flex;gap:8px;margin-bottom:28px;}
.pcm-step{flex:1;height:4px;border-radius:2px;background:#1e2026;transition:background .3s;}
.pcm-step.on{background:#818cf8;}
.pcm-close{position:absolute;top:20px;right:20px;width:28px;height:28px;border-radius:50%;background:#1e2026;border:none;color:#6b7494;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.pcm-close:hover{background:#252830;color:#c4cde8;}
.pcm-field{margin-bottom:16px;}
.pcm-label{font-size:12px;font-weight:600;color:#6b7494;margin-bottom:6px;display:block;}
.pcm-label .req{color:#818cf8;}
.pcm-input{width:100%;padding:12px 14px;border:1px solid #1e2026;border-radius:9px;background:#0f1117;color:#e2e8f0;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;box-sizing:border-box;}
.pcm-input:focus{border-color:#818cf8;}
.pcm-select{width:100%;padding:12px 14px;border:1px solid #1e2026;border-radius:9px;background:#0f1117;color:#e2e8f0;font-size:14px;font-family:inherit;outline:none;cursor:pointer;box-sizing:border-box;}
.pcm-textarea{width:100%;padding:12px 14px;border:1px solid #1e2026;border-radius:9px;background:#0f1117;color:#e2e8f0;font-size:14px;font-family:inherit;outline:none;resize:none;min-height:70px;box-sizing:border-box;}
.pcm-row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.pcm-gender-btns{display:flex;gap:8px;}
.pcm-gender-btn{flex:1;padding:11px;border-radius:9px;border:1px solid #1e2026;background:#0f1117;color:#6b7494;font-size:14px;cursor:pointer;font-family:inherit;transition:all .15s;}
.pcm-gender-btn.on{border-color:#818cf8;background:rgba(129,140,248,.1);color:#818cf8;font-weight:700;}
.pcm-btns{display:flex;gap:10px;margin-top:24px;}
.pcm-btn-pri{flex:1;padding:13px;border-radius:10px;border:none;background:#818cf8;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.pcm-btn-pri:hover{background:#6d59f0;}
.pcm-btn-sec{padding:13px 20px;border-radius:10px;border:1px solid #1e2026;background:transparent;color:#6b7494;font-size:14px;cursor:pointer;font-family:inherit;}
.pcm-btn-sec:hover{background:#16181f;color:#c4cde8;}
/* 회원 상세 패널 */
.pc-cust-wrap{display:flex;gap:16px;height:calc(100vh - 200px);}
.pc-cust-list-area{flex:1;min-width:0;overflow-y:auto;}
.pc-cust-detail-panel{width:340px;flex-shrink:0;background:#111318;border:1px solid #1e2026;border-radius:12px;overflow-y:auto;display:flex;flex-direction:column;}
.pcdp-head{padding:20px;border-bottom:1px solid #1e2026;}
.pcdp-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;background:#1c1f28;color:#818cf8;margin-bottom:12px;}
.pcdp-name{font-size:18px;font-weight:800;color:#e2e8f0;}
.pcdp-info{font-size:12px;color:#4a5068;margin-top:4px;line-height:1.8;}
.pcdp-section{padding:16px 20px;border-bottom:1px solid #1e2026;}
.pcdp-section-ttl{font-size:11px;font-weight:700;color:#4a5068;letter-spacing:1px;margin-bottom:12px;text-transform:uppercase;}
.pcdp-plan{background:#0f1117;border-radius:9px;padding:12px 14px;margin-bottom:8px;}
.pcdp-plan-name{font-size:13px;font-weight:700;color:#e2e8f0;margin-bottom:4px;}
.pcdp-plan-detail{font-size:11px;color:#4a5068;line-height:1.7;}
.pcdp-plan-bar{height:4px;background:#1e2026;border-radius:2px;overflow:hidden;margin-top:8px;}
.pcdp-plan-fill{height:100%;border-radius:2px;background:#818cf8;}
.pcdp-empty{font-size:12px;color:#2a2d45;text-align:center;padding:20px 0;}
.pcdp-add-btn{width:100%;padding:11px;border-radius:9px;border:1px solid #1e2026;background:transparent;color:#818cf8;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px;}
.pcdp-add-btn:hover{background:rgba(129,140,248,.08);}
/* 상품 카드 */
.pc-prod-card{background:#111318;border:1px solid #1e2026;border-radius:10px;padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .15s;}
.pc-prod-card:hover{border-color:#252830;}
.pc-prod-card.sel{border-color:#818cf8;background:rgba(129,140,248,.06);}
.pc-prod-type{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;background:rgba(129,140,248,.15);color:#818cf8;}
.pc-prod-type.ms{background:rgba(52,211,153,.15);color:#34d399;}

/* ── 모바일 사이드바 ── */
#mob-sidebar{display:none;}
.pg{overflow-y:auto;}

</body>
</html>
